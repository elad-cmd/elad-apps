<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SweepApp — ניקוי אנשי קשר</title>
<meta name="description" content="ניקוי, מיזוג וסידור אנשי קשר — CSV ו-vCard">
<meta name="theme-color" content="#179a93">
<link rel="manifest" href="sweepapp.webmanifest">
<link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png">
<link rel="apple-touch-icon" href="apple-touch-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SweepApp">
<style>
  :root{
    --surface:#ffffff;
    --ink:#2f2a3d;
    --muted:#938da3;
    --line:#f0ebf2;
    --keep:#1fb068;   --keep-soft:#d3f4e2;
    --del:#fd4f6f;    --del-soft:#ffe0e7;
    --maybe:#ff9a3d;  --maybe-soft:#ffecd6;
    --teal:#2f9fc4;   --teal-soft:#dcf0f7;
    --purple:#8b7be8; --purple-soft:#e8e2fb;
    --flame1:#ff6b5e; --flame2:#fd3d7a;
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:linear-gradient(165deg,#fdecef 0%,#f6eef4 55%,#efe9f4 100%);
    background-attachment:fixed;
    color:var(--ink);
    overflow:hidden;
    user-select:none;
  }
  #app{height:100dvh;display:flex;flex-direction:column;max-width:540px;margin:0 auto;position:relative;}

  /* ---------- Top bar ---------- */
  .topbar{flex:0 0 auto;padding:18px 20px 8px;display:flex;align-items:center;gap:10px;}
  .brand{font-weight:700;font-size:20px;letter-spacing:-.3px;line-height:1.1;
    background:linear-gradient(135deg,var(--flame1),var(--flame2));-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;}
  .brand small{font-weight:500;color:var(--muted);font-size:12.5px;display:block;letter-spacing:0;margin-top:2px;-webkit-text-fill-color:var(--muted);}
  .menu-btn{margin-inline-start:auto;border:none;background:var(--surface);width:44px;height:44px;border-radius:15px;
    font-size:19px;cursor:pointer;color:var(--ink);box-shadow:0 6px 16px -8px rgba(90,70,130,.3);transition:transform .12s;}
  .menu-btn:active{transform:scale(.9);}
  .menu-btn.rst svg{width:21px;height:21px;color:var(--muted);display:block;}
  .confirm-backdrop{position:absolute;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:30px;background:rgba(45,32,66,0);transition:background .2s;}
  .confirm-backdrop.show{background:rgba(45,32,66,.45);}
  .confirm-box{background:#fff;border-radius:22px;padding:22px;max-width:340px;width:100%;box-shadow:0 20px 50px -16px rgba(40,30,60,.5);transform:scale(.92);opacity:0;transition:transform .2s,opacity .2s;}
  .confirm-backdrop.show .confirm-box{transform:scale(1);opacity:1;}
  .confirm-msg{font-size:16px;font-weight:600;line-height:1.5;margin-bottom:18px;text-align:center;}
  .confirm-actions{display:flex;gap:10px;}
  .confirm-actions .btn{flex:1;padding:13px;font-size:15px;}
  .hbtn{border:none;background:var(--surface);width:44px;height:44px;border-radius:15px;cursor:pointer;color:var(--teal);
    box-shadow:0 6px 16px -8px rgba(90,70,130,.3);transition:transform .12s;display:flex;align-items:center;justify-content:center;}
  .hbtn:active{transform:scale(.9);} .hbtn svg{width:23px;height:23px;}
  .stats{flex:0 0 auto;display:flex;gap:9px;padding:8px 20px 12px;}
  .stat{flex:1;background:var(--surface);border-radius:16px;padding:10px 6px;text-align:center;box-shadow:0 6px 16px -10px rgba(90,70,130,.28);}
  .stat b{display:block;font-size:18px;font-weight:700;line-height:1;}
  .stat span{font-size:11px;color:var(--muted);font-weight:500;}
  .stat.keep b{color:var(--keep);} .stat.del b{color:var(--del);}
  .stat.maybe b{color:var(--maybe);} .stat.left b{color:var(--purple);}

  /* ---------- Deck ---------- */
  .deck{flex:1 1 auto;position:relative;margin:8px 20px;min-height:0;}
  .card{
    position:absolute;inset:0;background:var(--surface);border-radius:32px;
    box-shadow:0 22px 50px -24px rgba(90,70,130,.45), 0 6px 16px -12px rgba(90,70,130,.3);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:36px 30px;text-align:center;will-change:transform;touch-action:none;overflow:hidden;transition:transform .3s cubic-bezier(0.22,1,0.36,1);
  }
  .card.behind1{transform:scale(.95) translateY(16px);}
  .card.behind2{transform:scale(.9) translateY(32px);}
  .tint{position:absolute;inset:0;border-radius:32px;opacity:0;pointer-events:none;}
  .card .avatar{
    width:128px;height:128px;border-radius:50%;
    background:radial-gradient(circle at 50% 32%, #f3eefb, #e7eff7);
    display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:24px;flex:0 0 auto;
  }
  .card .avatar svg{width:74px;height:74px;color:#c2bdd6;}
  .card .avatar img{width:100%;height:100%;object-fit:cover;}
  .card .name{font-size:30px;font-weight:700;line-height:1.15;margin:0 0 6px;word-break:break-word;letter-spacing:-.3px;}
  .card .name.empty{color:var(--muted);font-weight:600;font-size:24px;}
  .card .org{font-size:16px;color:var(--ink);font-weight:600;margin:2px 0;opacity:.78;word-break:break-word;}
  .card .email{font-size:16px;color:var(--teal);font-weight:600;margin:9px 0 2px;word-break:break-all;direction:ltr;}
  .card .phone{font-size:15px;color:var(--muted);font-weight:500;margin:3px 0;direction:ltr;}
  .card .extra{font-size:13px;color:var(--muted);margin-top:10px;}

  /* drag indicator icons (corners — never over the name) */
  .stamp{position:absolute;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    opacity:0;box-shadow:0 8px 18px -8px rgba(90,70,130,.4);}
  .stamp svg{width:30px;height:30px;}
  .stamp.keep{inset-inline-start:22px;top:22px;background:var(--keep-soft);color:var(--keep);}
  .stamp.del{inset-inline-end:22px;top:22px;background:var(--del-soft);color:var(--del);}
  .stamp.maybe{left:50%;transform:translateX(-50%);bottom:22px;background:var(--maybe-soft);color:var(--maybe);}

  /* intro card */
  .card.intro{align-items:stretch;justify-content:center;padding:30px 28px;gap:0;}
  .intro h2{font-size:25px;font-weight:700;margin:0 0 4px;text-align:center;letter-spacing:-.3px;}
  .intro .lead{text-align:center;color:var(--muted);font-size:14px;margin-bottom:14px;}
  .mb-wrap{position:relative;width:248px;height:248px;margin:4px auto 0;}
  .mb-wrap svg{width:100%;height:100%;display:block;filter:drop-shadow(0 10px 22px rgba(90,70,130,.18));}
  .mb-card3{flex:0 0 auto;width:100%;max-width:300px;margin:8px auto 2px;border-radius:16px;overflow:hidden;box-shadow:0 14px 30px -16px rgba(0,0,0,.4);}
  .mb-card3 svg{width:100%;height:auto;display:block;}
  .cta-row{flex:0 0 auto;display:flex;gap:8px;width:100%;max-width:300px;margin:12px auto 0;}
  .cta2{flex:1;border:none;border-radius:12px;padding:10px 8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 8px 18px -10px rgba(20,154,147,.7);transition:transform .12s;}
  .cta2:active{transform:scale(.96);} .cta2 svg{width:16px;height:16px;flex:0 0 auto;}
  .mb-lbl{position:absolute;font-weight:700;font-size:15px;}
  .mb-keep{color:var(--keep);top:41%;right:7%;}
  .mb-del{color:var(--del);top:41%;left:7%;}
  .mb-maybe{color:#7e8498;bottom:8%;left:0;right:0;text-align:center;font-size:14px;}
  .intro .start{margin-top:22px;border:none;border-radius:16px;padding:15px;font-family:inherit;font-size:16px;font-weight:700;
    color:#fff;cursor:pointer;background:linear-gradient(135deg,var(--flame1),var(--flame2));box-shadow:0 14px 28px -12px rgba(253,61,122,.6);}
  .intro .swipehint{text-align:center;color:var(--muted);font-size:12.5px;margin-top:13px;}

  /* ---------- Actions ---------- */
  .actions{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:18px;padding:14px 16px 22px;}
  .act{border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fff;transition:transform .12s;}
  .act:active{transform:scale(.9);}
  .act svg{width:28px;height:28px;}
  .act.keep{width:66px;height:66px;color:var(--keep);box-shadow:0 13px 26px -12px rgba(31,176,104,.55);}
  .act.del{width:66px;height:66px;color:var(--del);box-shadow:0 13px 26px -12px rgba(253,79,111,.6);}
  .act.maybe{width:56px;height:56px;color:var(--maybe);box-shadow:0 11px 22px -12px rgba(255,154,61,.6);}
  .act.maybe svg{width:25px;height:25px;}

  /* floating undo (last card only) — pinned to left wall, auto-fades */
  .float-back{position:absolute;z-index:20;
    border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
    background:rgba(58,42,86,.52);color:#fff;backdrop-filter:blur(7px);border-radius:50%;width:54px;height:54px;
    opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;box-shadow:0 12px 30px -10px rgba(40,30,60,.5);}
  /* position follows the direction the card flew */
  .float-back.fb-left{top:50%;left:14px;right:auto;bottom:auto;transform:translateY(-50%) scale(.85);}
  .float-back.fb-right{top:50%;right:14px;left:auto;bottom:auto;transform:translateY(-50%) scale(.85);}
  .float-back.fb-down{bottom:18px;left:50%;right:auto;top:auto;transform:translateX(-50%) scale(.85);}
  .float-back.fb-left.show,.float-back.fb-right.show{transform:translateY(-50%) scale(1);}
  .float-back.fb-down.show{transform:translateX(-50%) scale(1);}
  .float-back.show{opacity:.82;pointer-events:auto;}
  .float-back svg{width:24px;height:24px;}
  .hint{position:absolute;bottom:5px;left:0;right:0;text-align:center;font-size:11.5px;color:var(--muted);}

  /* ---------- Screens ---------- */
  .screen{position:absolute;inset:0;z-index:30;display:flex;flex-direction:column;background:#f9f7fc;animation:screenIn .3s cubic-bezier(0.22,1,0.36,1);}
  @keyframes screenIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  @keyframes screenOut{to{opacity:0;transform:translateY(16px)}}
  .screen-head{padding:20px 20px 12px;display:flex;align-items:center;gap:10px;}
  .screen-head h2{margin:0;font-size:22px;font-weight:700;color:var(--ink);}
  .screen-head .close{margin-inline-start:auto;border:none;background:#fff;width:42px;height:42px;border-radius:13px;font-size:18px;cursor:pointer;color:var(--ink);box-shadow:0 6px 16px -8px rgba(90,70,130,.3);}
  .screen-body{flex:1;overflow-y:auto;padding:6px 20px 22px;}
  .list-item{background:#fff;border-radius:18px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 18px -14px rgba(90,70,130,.5);}
  .li-av{width:48px;height:48px;border-radius:50%;background:radial-gradient(circle at 50% 32%,#f3eefb,#e7eff7);flex:0 0 auto;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .li-av svg{width:25px;height:25px;color:#c2bdd6;} .li-av img{width:100%;height:100%;object-fit:cover;}
  .li-av.init{background:var(--purple-soft);color:var(--purple);font-weight:700;font-size:20px;}
  .li-txt{flex:1;min-width:0;}
  .li-txt .n{font-weight:600;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .li-txt .s{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:ltr;text-align:right;}
  .li-btn{border:none;border-radius:12px;padding:9px 13px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:transform .12s;}
  .li-btn:active{transform:scale(.92);}
  .list-item{transition:opacity .2s, transform .12s;}
  .screen-head .close{transition:transform .12s;} .screen-head .close:active{transform:scale(.9);}
  .li-btn.keep{background:var(--keep-soft);color:var(--keep);}
  .li-btn.del{background:var(--del-soft);color:var(--del);}
  .empty-note{text-align:center;color:var(--muted);margin-top:46px;font-size:15px;}
  .menu-list{display:flex;flex-direction:column;gap:11px;}
  .menu-list button{font-family:inherit;text-align:start;border:none;background:#fff;border-radius:18px;padding:16px;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 8px 18px -14px rgba(90,70,130,.5);color:var(--ink);display:flex;align-items:center;gap:12px;}
  .menu-list button.danger{color:var(--del);}
  .menu-list button svg{width:22px;height:22px;flex:0 0 auto;}
  .menu-list button:active{transform:scale(.97);}
  .menu-list .i-home svg{color:var(--teal);} .menu-list .i-del svg{color:var(--del);}
  .menu-list .i-maybe svg{color:var(--maybe);} .menu-list .i-keep svg{color:var(--keep);}
  .menu-list .i-export svg{color:var(--purple);}

  /* side drawer */
  .drawer-backdrop{position:absolute;inset:0;z-index:40;background:rgba(45,32,66,0);transition:background .28s;}
  .drawer-backdrop.show{background:rgba(45,32,66,.42);}
  .drawer{position:absolute;left:0;top:0;bottom:0;width:82%;max-width:322px;background:#f9f7fc;
    box-shadow:12px 0 50px -12px rgba(45,32,66,.55);transform:translateX(-100%);
    transition:transform .34s cubic-bezier(0.22,1,0.36,1);display:flex;flex-direction:column;padding:22px 16px;overflow-y:auto;}
  .drawer.show{transform:translateX(0);}
  .drawer .dhead{display:flex;align-items:center;margin-bottom:18px;padding-inline:4px;}
  .drawer .dhead .dt{font-size:21px;font-weight:700;
    background:linear-gradient(135deg,var(--flame1),var(--flame2));-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;}
  .drawer .dhead .close{margin-inline-start:auto;}
  .drawer.show .menu-list button{animation:itemIn .42s both;}
  .drawer.show .menu-list button:nth-child(1){animation-delay:.05s}
  .drawer.show .menu-list button:nth-child(2){animation-delay:.09s}
  .drawer.show .menu-list button:nth-child(3){animation-delay:.13s}
  .drawer.show .menu-list button:nth-child(4){animation-delay:.17s}
  .drawer.show .menu-list button:nth-child(5){animation-delay:.21s}
  .drawer.show .menu-list button:nth-child(6){animation-delay:.25s}
  .drawer.show .menu-list button:nth-child(7){animation-delay:.29s}
  .drawer.show .menu-list button:nth-child(8){animation-delay:.33s}
  @keyframes itemIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}
  .menu-list .i-dup svg{color:var(--purple);} .menu-list .i-filt svg{color:var(--teal);}
  .menu-list .i-filt-all svg{color:var(--keep);}
  .sub2{color:var(--muted);font-size:14px;margin:0 2px 16px;line-height:1.5;}
  .filter-bar{flex:0 0 auto;display:flex;align-items:center;gap:8px;margin:0 18px 6px;background:var(--maybe-soft);color:#9a6c12;border-radius:13px;padding:9px 13px;font-size:13.5px;font-weight:600;}
  .filter-bar b{font-weight:800;}
  .filter-bar svg{width:18px;height:18px;flex:0 0 auto;}
  .filter-bar button{margin-inline-start:auto;border:none;background:rgba(154,108,18,.14);color:inherit;border-radius:9px;padding:5px 11px;font-family:inherit;font-weight:700;cursor:pointer;font-size:12.5px;transition:transform .12s;}
  .filter-bar button:active{transform:scale(.94);}
  /* duplicates screen */
  .dup-group{background:#fff;border-radius:20px;padding:14px;margin-bottom:14px;box-shadow:0 8px 18px -14px rgba(90,70,130,.5);}
  .dup-title{font-size:13px;color:var(--muted);font-weight:600;margin:0 2px 10px;}
  .dup-member{display:flex;align-items:center;gap:12px;padding:10px;border-radius:14px;border:2px solid transparent;cursor:pointer;transition:background .15s,border-color .15s;}
  .dup-member .dot{width:20px;height:20px;border-radius:50%;border:2px solid #cfc8de;flex:0 0 auto;transition:all .15s;}
  .dup-member.selected{background:var(--keep-soft);border-color:var(--keep);}
  .dup-member.selected .dot{border-color:var(--keep);background:var(--keep);box-shadow:inset 0 0 0 3px #fff;}
  .dup-member .li-txt{flex:1;min-width:0;}
  .dup-member .li-txt .n{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .dup-member .li-txt .s{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:ltr;text-align:right;}
  .dup-member .kept-badge{font-size:11px;font-weight:700;color:var(--keep);opacity:0;flex:0 0 auto;}
  .dup-member.selected .kept-badge{opacity:1;}
  .dup-actions{display:flex;gap:10px;margin-top:12px;}
  .dup-actions .btn{flex:1;padding:12px;font-size:15px;border-radius:14px;}
  .dup-cta{margin-top:14px;border:none;border-radius:14px;padding:13px;font-family:inherit;font-size:14.5px;font-weight:700;cursor:pointer;
    background:var(--teal-soft);color:var(--teal);display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s;}
  .dup-cta:active{transform:scale(.97);} .dup-cta svg{width:20px;height:20px;}
  /* merge picker */
  .mp-section{margin-bottom:18px;}
  .mp-section h3{font-size:14px;color:var(--muted);font-weight:700;margin:0 0 8px 2px;}
  .mp-opt{display:flex;align-items:center;gap:12px;background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:8px;border:2px solid transparent;cursor:pointer;transition:border-color .15s,background .15s;box-shadow:0 6px 14px -12px rgba(90,70,130,.4);}
  .mp-opt .chk{width:23px;height:23px;border-radius:8px;border:2px solid #cfc8de;flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;transition:all .15s;}
  .mp-opt .chk svg{width:14px;height:14px;opacity:0;}
  .mp-opt.on{border-color:var(--keep);background:var(--keep-soft);}
  .mp-opt.on .chk{background:var(--keep);border-color:var(--keep);} .mp-opt.on .chk svg{opacity:1;}
  .mp-opt .v{flex:1;min-width:0;font-weight:600;font-size:15px;word-break:break-word;}
  .mp-opt .v.ltr{direction:ltr;text-align:right;}
  .mp-auto{background:var(--teal-soft);color:var(--teal);border-radius:12px;padding:10px 14px;font-size:13px;margin-bottom:16px;line-height:1.5;word-break:break-word;}
  .mp-confirm{width:100%;margin-top:6px;}

  /* ---------- Upload / done ---------- */
  .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center;gap:15px;overflow-y:auto;}
  .title-xl{font-size:30px;font-weight:700;letter-spacing:-.4px;color:var(--ink);}
  .sub{color:var(--muted);font-size:15px;max-width:390px;line-height:1.55;}
  .drop{width:100%;max-width:370px;border:2px dashed #d7d0e6;border-radius:22px;padding:26px 20px;background:rgba(255,255,255,.55);color:var(--ink);cursor:pointer;}
  .drop.over{border-color:var(--teal);background:#fff;}
  .drop .di{font-size:32px;margin-bottom:6px;}
  .drop .dt{font-weight:600;font-size:15px;}
  .file-name{font-size:13px;color:var(--muted);}
  .btn{font-family:inherit;border:none;border-radius:16px;padding:15px 22px;font-size:16px;font-weight:700;cursor:pointer;transition:transform .12s, box-shadow .2s;}
  .btn:active{transform:scale(.96);}
  .btn.primary{color:#fff;background:linear-gradient(135deg,var(--flame1),var(--flame2));box-shadow:0 14px 28px -12px rgba(253,61,122,.6);}
  .btn.ghost{background:#fff;color:var(--ink);box-shadow:0 8px 18px -12px rgba(90,70,130,.35);}
  .btn.keepc{color:#fff;background:linear-gradient(135deg,#36c984,var(--keep));box-shadow:0 14px 28px -12px rgba(31,176,104,.6);}
  .resume-box{background:#fff;border-radius:18px;padding:15px 16px;max-width:370px;width:100%;font-size:14px;box-shadow:0 10px 24px -16px rgba(90,70,130,.5);}
  .done-emoji{font-size:54px;}
  .warn{background:var(--maybe-soft);color:#9a6c12;border-radius:14px;padding:11px 15px;font-size:13px;max-width:390px;line-height:1.5;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:14px;font-weight:600;font-size:14px;z-index:99;opacity:0;transition:opacity .2s;pointer-events:none;}
  .toast.show{opacity:1;}

  if(baseName)state.names.add(baseName);else if(fields.names[0])state.names.add(fields.names[0]);

  const sets={names:state.names,emails:state.emails,phones:state.phones,orgs:state.orgs};
  function section(key,title,values,ltr){
    if(!values.length)return '';
    const same=values.length===1?' <span class="mp-same">(זהה בכפילויות)</span>':'';
    return `<div class="mp-section"><h3>${title}${same}</h3>`+values.map((v,i)=>
      `<div class="mp-opt${sets[key].has(v)?' on':''}" data-key="${key}" data-idx="${i}"><div class="chk">${ICON.check}</div><div class="v${ltr?' ltr':''}">${escapeHtml(v)}</div></div>`).join('')+`</div>`;
  }
  ov.innerHTML=`<div class="screen-head"><h2>מה לשמור במיזוג?</h2><button class="close">✕</button></div>
    <div class="screen-body">
      <div class="mp-hint">סמן מה לשמור. שדה זהה בכל הכפילויות נשמר פעם אחת; בשדה עם ערכים שונים אפשר לסמן ולשמור כמה.</div>
      ${section('names','שמות',fields.names,false)}
      ${section('emails','אימיילים',fields.emails,true)}
      ${section('phones','טלפונים',fields.phones,true)}
      ${section('orgs','חברה',fields.orgs,false)}
      <button class="btn keepc mp-confirm" id="mpDo">אשר מיזוג</button>
    </div>`;
  app.appendChild(ov);
  ov.querySelector('.close').onclick=()=>closeScreen(ov);
  ov.querySelectorAll('.mp-opt').forEach(o=>{o.onclick=()=>{const key=o.dataset.key,idx=+o.dataset.idx,val=fields[key][idx];
    if(sets[key].has(val))sets[key].delete(val);else sets[key].add(val);o.classList.toggle('on',sets[key].has(val));};});
  ov.querySelector('#mpDo').onclick=()=>{
    const pick=(key)=>fields[key].filter(v=>sets[key].has(v));
    const sel={names:pick('names'),emails:pick('emails'),phones:pick('phones'),orgs:pick('orgs')};
    if(!sel.names.length&&recById(keepId).name)sel.names=[recById(keepId).name];
    applyMergeSelections(ids,keepId,sel);
    closeScreen(ov,onConfirm);
  };
}

/* ===== drag ===== */
function attachDrag(card,isIntro){
  let sx=0,sy=0,dx=0,dy=0,active=false;
  const tint=card.querySelector('.tint');
  const sKeep=card.querySelector('.stamp.keep'),sDel=card.querySelector('.stamp.del'),sMaybe=card.querySelector('.stamp.maybe');
  function setTint(col,op){if(!tint)return;tint.style.background=col;tint.style.opacity=op;}
  function down(e){if(isIntro&&e.target.closest('button'))return;active=true;const p=pt(e);sx=p.x;sy=p.y;card.style.transition='none';try{card.setPointerCapture(e.pointerId);}catch(_){}}
  function move(e){
    if(!active)return;const p=pt(e);dx=p.x-sx;dy=p.y-sy;
    card.style.transform=`translate(${dx}px,${dy}px) rotate(${dx/20}deg)`;
    const ax=Math.abs(dx),ay=Math.abs(dy);
    if(sKeep){
      if(ax>ay){sKeep.style.opacity=dx>0?Math.min(1,dx/85):0;sDel.style.opacity=dx<0?Math.min(1,-dx/85):0;sMaybe.style.opacity=0;
        setTint(dx>0?'var(--keep)':'var(--del)',Math.min(.1,ax/700));}
      else{sMaybe.style.opacity=Math.min(1,ay/85);sKeep.style.opacity=0;sDel.style.opacity=0;setTint('var(--maybe)',Math.min(.1,ay/700));}
    }
  }
  function up(){
    if(!active)return;active=false;
    const ax=Math.abs(dx),ay=Math.abs(dy),TH=86;let dir=null;
    if(ax>ay&&ax>TH)dir=dx>0?'keep':'delete';else if(ay>=ax&&ay>TH)dir='maybe';
    if(dir){flyOut(card,dir);if(isIntro)setTimeout(dismissIntro,180);else decide(dir,true);}
    else{card.style.transition='transform .25s';card.style.transform='';if(sKeep)sKeep.style.opacity=sDel.style.opacity=sMaybe.style.opacity=0;setTint('transparent',0);}
    dx=dy=0;
  }
  function pt(e){return e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};}
  card.addEventListener('pointerdown',down);card.addEventListener('pointermove',move);
  card.addEventListener('pointerup',up);card.addEventListener('pointercancel',up);
}
function flyOut(card,dir){card.style.transition='transform .35s ease-out, opacity .35s';
  let tx=0,ty=0;if(dir==='keep')tx=640;else if(dir==='delete')tx=-640;else ty=680;
  card.style.transform=`translate(${tx}px,${ty}px) rotate(${tx/14}deg)`;card.style.opacity='0';}

/* ===== decisions ===== */
function decide(dir,fromDrag){
  if(S.pos>=S.order.length)return;
  const id=S.order[S.pos];
  S.decisions[id]=dir;S.history.push({id,dir});S.pos++;persist();
  const go=()=>{if(S.pos>=S.order.length){if(S.filterLabel){toast('סיימת את הסינון');renderFilters();}else renderDone();}else{refreshCounts();renderDeck();showFloatBack(dir);}};
  if(fromDrag)setTimeout(go,180);else go();
}
function undo(){
  if(S.history.length===0)return;
  const last=S.history.pop();delete S.decisions[last.id];S.pos--;persist();
  hideFloatBack();
  if(document.getElementById('deck')){
    refreshCounts();renderDeck();
    const deck=document.getElementById('deck');const live=deck.lastElementChild;
    if(live&&!live.classList.contains('intro'))animateInFrom(live,last.dir);
  }else renderMain();
}
let floatT;
function showFloatBack(dir){
  const fb=document.getElementById('floatBack');if(!fb)return;
  fb.classList.remove('fb-left','fb-right','fb-down');
  if(dir==='delete'){fb.classList.add('fb-left');fb.innerHTML=ICON.backRight;}      // עף שמאלה → פרסה חזרה ימינה

function animateInFrom(card,dir){

function attachRowSwipe(row,type,afterRemove,onTap){
  const fg=row.querySelector('.swipe-fg');const bg=row.querySelector('.swipe-bg');const id=row.dataset.id;
  let sx=0,dx=0,drag=false,dir=0,moved=false;
  const KEEP_HTML=`${ICON.check}<span class="sa-arrow">${ICON.chevR}</span>`;
  const DEL_HTML=`<span class="sa-arrow">${ICON.chevL}</span>${ICON.trash}`;
  function setDir(d){if(d===dir)return;dir=d;
    if(d>0){bg.className='swipe-bg keepbg';bg.innerHTML=KEEP_HTML;}
    else if(d<0){bg.className='swipe-bg delbg';bg.innerHTML=DEL_HTML;}}
  function snap(){fg.style.transition='transform .22s';fg.style.transform='';dx=0;}
  function commit(decision,sgn){
    if(decision===type){snap();return;}
    S.decisions[id]=decision;persist();
    fg.style.transition='transform .25s ease-out';fg.style.transform=`translateX(${sgn*420}px)`;
    row.style.transition='opacity .25s';row.style.opacity='0';
    setTimeout(()=>{row.remove();afterRemove&&afterRemove();},240);
    toast(decision==='delete'?'נמחק':(type==='delete'?'הוחזר':'נשמר'));}
  fg.addEventListener('pointerdown',e=>{drag=true;moved=false;sx=e.clientX;dx=0;try{fg.setPointerCapture(e.pointerId);}catch(_){}fg.style.transition='none';});
  fg.addEventListener('pointermove',e=>{if(!drag)return;dx=e.clientX-sx;if(Math.abs(dx)>6)moved=true;setDir(Math.sign(dx));fg.style.transform=`translateX(${dx}px)`;});
  const end=()=>{if(!drag)return;drag=false;const TH=88;
    if(dx<=-TH)commit('delete',-1);else if(dx>=TH)commit('keep',1);
    else{snap();if(!moved&&onTap)onTap(id);}};
  fg.addEventListener('pointerup',end);fg.addEventListener('pointercancel',end);
}

function detailCardInner(rec){
  const emails=[...new Set(rec.emails||[])];
  const phones=[...new Set(rec.phones||[])];
  let title='',notes='',labels='';
  if(rec.raw&&typeof rec.raw==='object'){
    for(const k in rec.raw){const v=(rec.raw[k]==null?'':String(rec.raw[k])).trim();if(!v)continue;
      if(/title/i.test(k)&&!title)title=v;
      else if(/note/i.test(k)&&!notes)notes=v;
      else if(/label/i.test(k)&&!labels)labels=v;}
  }else if(typeof rec.raw==='string'){
    try{const re=parseVBlock(rec.raw);title=re.title||'';}catch(e){}
    rec.raw.split(/\r\n|\n/).forEach(l=>{if(/^NOTE[;:]/i.test(l)&&!notes)notes=l.slice(l.indexOf(':')+1).trim();});
  }
  labels=labels.replace(/\*?\s*myContacts/gi,'').replace(/[;:]+/g,' ').replace(/\s+/g,' ').trim();
  const field=(lbl,val,ltr)=>`<div class="cd-field"><div class="lbl">${escapeHtml(lbl)}</div><div class="val${ltr?' ltr':''}">${escapeHtml(val)}</div></div>`;
  const orgline=[rec.org,title].filter(Boolean).join(' · ');
  let h=`<div class="tint"></div><div class="stamp keep">${ICON.check}</div><div class="stamp del">${ICON.trash}</div>`;
  h+=`<div class="cd-top">${rec.photo?avatarHTML(rec,'cd-av'):initialBadge(rec,'cd-av')}`;
  h+= rec.name?`<div class="cd-name">${escapeHtml(rec.name)}</div>`:`<div class="cd-name empty">(אין שם)</div>`;
  if(orgline)h+=`<div class="cd-org">${escapeHtml(orgline)}</div>`;
  h+=`</div><div class="cd-fields">`;
  if(emails.length)h+=emails.map((e,i)=>field(emails.length>1?`אימייל ${i+1}`:'אימייל',e,true)).join('');
  if(phones.length)h+=phones.map((p,i)=>field(phones.length>1?`טלפון ${i+1}`:'טלפון',p,true)).join('');
  if(notes)h+=field('הערות',notes,false);
  if(labels)h+=field('תוויות',labels,false);
  if(!emails.length&&!phones.length&&!notes&&!labels&&!orgline)h+=`<div class="cd-empty">אין פרטים נוספים</div>`;
  h+=`</div>`;
  return h;
}
function attachDetailSwipe(card,id,onDone){
  const tint=card.querySelector('.tint');
  const sKeep=card.querySelector('.stamp.keep'),sDel=card.querySelector('.stamp.del');
  let sx=0,dx=0,active=false;
  function down(e){active=true;sx=e.clientX;dx=0;card.style.transition='none';try{card.setPointerCapture(e.pointerId);}catch(_){}}
  function move(e){if(!active)return;dx=e.clientX-sx;card.style.transform=`translateX(${dx}px) rotate(${dx/26}deg)`;
    const a=Math.abs(dx);sKeep.style.opacity=dx>0?Math.min(1,a/85):0;sDel.style.opacity=dx<0?Math.min(1,a/85):0;
    if(tint){tint.style.background=dx>0?'var(--keep)':'var(--del)';tint.style.opacity=Math.min(.12,a/600);}}
  function up(){if(!active)return;active=false;const TH=90;
    if(dx>=TH)fly('keep');else if(dx<=-TH)fly('delete');
    else{card.style.transition='transform .25s';card.style.transform='';sKeep.style.opacity=sDel.style.opacity=0;if(tint)tint.style.opacity=0;}
    dx=0;}
  function fly(decision){S.decisions[id]=decision;persist();
    card.style.transition='transform .35s ease-out, opacity .35s';
    card.style.transform=`translateX(${decision==='keep'?660:-660}px) rotate(${decision==='keep'?20:-20}deg)`;card.style.opacity='0';
    toast(decision==='keep'?'נשמר':'נמחק');
    setTimeout(()=>onDone&&onDone(id,decision),300);}
  card.addEventListener('pointerdown',down);card.addEventListener('pointermove',move);
  card.addEventListener('pointerup',up);card.addEventListener('pointercancel',up);
}

      <div class="warn">קובץ הייצוא כולל את <b>כל מי שלא נמחק</b> — גם אנשי קשר שעדיין לא מוינו וגם "לבדיקה" — כדי שלא תאבד אף אחד בטעות.</div>
      <button class="btn keepc" id="exportClean" style="min-width:290px;">ייצוא רשימה נקייה (${clean})</button>
      <button class="btn ghost" id="exportDel" style="min-width:290px;">ייצוא רשימת הנמחקים (${c.del})</button>
      ${c.left>0?`<button class="btn primary" id="continue" style="min-width:290px;">המשך מיון</button>`:''}
      <button class="small-link" id="reset">התחל מחדש</button>
    </div>
    <div class="screen-foot">לאחר ההורדה: ב-Google Contacts מחק את כל אנשי הקשר ואז ייבא את הקובץ הנקי. לגוגל יש שחזור עד 30 יום.</div>`;
  showFab(true);
  document.getElementById('exportClean').onclick=()=>renderExportScreen('keep');
  document.getElementById('exportDel').onclick=()=>renderExportScreen('deleted');
  const cont=document.getElementById('continue');if(cont)cont.onclick=renderMain;
  document.getElementById('reset').onclick=()=>uiConfirm('לאפס? כל המיון יימחק ותחזור למסך ההעלאה.',resetApp);
}
function renderExportScreen(which){
  const c=counts();const clean=S.records.filter(r=>S.decisions[r.id]!=='delete').length;
  const isDel=which==='deleted';const cnt=isDel?c.del:clean;
  const ov=document.createElement('div');ov.className='screen';
  ov.innerHTML=`<div class="screen-head"><h2>הורדת הרשימה</h2><button class="close">✕</button></div>
    <div class="screen-body">
      <div class="exp-card">
        <div class="exp-emoji">${isDel?'🗑️':'📥'}</div>
        <div class="exp-title">${isDel?'רשימת הנמחקים מוכנה':'הרשימה הנקייה מוכנה'}</div>
        <div class="exp-sub">${cnt} אנשי קשר יישמרו בקובץ ${S.format==='vcard'?'vCard':'CSV'}.</div>
        <button class="btn keepc" id="doDownload" style="width:100%;">הורדת הרשימה (${cnt})</button>
      </div>
      ${isDel?'':`<div class="exp-note">
        <div class="exp-note-h">⚠️ חשוב לפני העלאה ל-Gmail / Google Contacts</div>
        <p>כדי שהרשימה <b>תחליף</b> את אנשי הקשר הקיימים ולא רק תתווסף אליהם — צריך קודם <b>למחוק את כל אנשי הקשר הקיימים</b> ב-Gmail, ורק אז לייבא את הקובץ החדש.</p>
        <p>אם לא תמחק קודם, השמות פשוט <b>יתווספו</b> לרשימה הקיימת ותקבל כפילויות.</p>
        <ol class="exp-steps">
          <li>היכנס ל-<b>contacts.google.com</b></li>
          <li>סמן הכול ← מחק את כל אנשי הקשר</li>
          <li>ייבוא ← בחר את הקובץ שהורדת כאן</li>
        </ol>
        <div class="exp-tip">לגוגל יש שחזור אנשי קשר עד 30 יום, אז אפשר לחזור אחורה אם משהו השתבש.</div>
      </div>`}
    </div>`;
  app.appendChild(ov);
  ov.querySelector('.close').onclick=()=>closeScreen(ov);
  ov.querySelector('#doDownload').onclick=()=>exportCSV(which);
}
function exportCSV(which){
  let recs=which==='deleted'?S.records.filter(r=>S.decisions[r.id]==='delete'):S.records.filter(r=>S.decisions[r.id]!=='delete');
  if(recs.length===0){toast('אין רשומות לייצוא');return;}
  const base=S.fileName.replace(/\.(csv|vcf)$/i,'');
  if(S.format==='vcard'){
    const text=recs.map(r=>r.raw.replace(/\r?\n$/,'')).join('\r\n')+'\r\n';
    download(text,which==='deleted'?base+'_נמחקו.vcf':base+'_נקי.vcf','text/vcard;charset=utf-8;');
  } else {
    const csv=toCSV(S.headers,recs.map(r=>r.raw));
    download(csv,which==='deleted'?base+'_נמחקו.csv':base+'_נקי.csv','text/csv;charset=utf-8;');
  }
}
function buildSaveModal(blob,text,name,type){
  const ov=document.createElement('div');
  ov.style.cssText='position:absolute;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;padding:26px;background:rgba(20,40,42,.55);';
  ov.innerHTML=`<div style="background:#fff;border-radius:22px;max-width:340px;width:100%;padding:22px;box-shadow:0 24px 60px -20px rgba(0,0,0,.5);text-align:right;color:#234a4e;">
    <div style="font-weight:800;font-size:17px;margin-bottom:8px;">שמירת הקובץ</div>
    <div style="font-size:13.5px;line-height:1.55;color:#4a6c6e;margin-bottom:16px;">פתחת את האפליקציה ישירות מקובץ בהורדות, ולכן הדפדפן חוסם הורדה אוטומטית. בחר דרך לשמור:</div>
    <button id="sv-share" style="width:100%;border:none;border-radius:14px;padding:13px;font-size:15px;font-weight:700;background:#179a93;color:#fff;margin-bottom:10px;">שתף / שמור קובץ</button>
    <button id="sv-open" style="width:100%;border:none;border-radius:14px;padding:13px;font-size:15px;font-weight:700;background:#eaf4f3;color:#234a4e;margin-bottom:10px;">פתח בכרטיסייה ושמור משם</button>
    <button id="sv-copy" style="width:100%;border:none;border-radius:14px;padding:13px;font-size:15px;font-weight:700;background:#eaf4f3;color:#234a4e;margin-bottom:10px;">העתק את כל הנתונים</button>
    <button id="sv-close" style="width:100%;border:none;background:none;color:#7a9a9c;font-size:14px;padding:6px;">סגור</button>
    <div style="font-size:11.5px;color:#9fb6b7;margin-top:8px;line-height:1.5;">הכי אמין: להעלות את הקובץ לאתר (כתובת https) ולפתוח משם — אז ההורדה עובדת רגיל.</div>
  </div>`;
  app.appendChild(ov);
  ov.querySelector('#sv-close').onclick=()=>ov.remove();
  ov.querySelector('#sv-share').onclick=async()=>{
    try{ if(navigator.canShare&&typeof File!=='undefined'){const f=new File([blob],name,{type});if(navigator.canShare({files:[f]})){await navigator.share({files:[f],title:name});return;}} toast('שיתוף לא נתמך כאן'); }
    catch(e){ if(!(e&&e.name==='AbortError'))toast('שיתוף נכשל'); }
  };
  ov.querySelector('#sv-open').onclick=()=>{ try{ const u=URL.createObjectURL(blob); window.open(u,'_blank'); }catch(e){ toast('לא ניתן לפתוח'); } };
  ov.querySelector('#sv-copy').onclick=async()=>{
    try{ await navigator.clipboard.writeText(text); toast('הועתק ✓'); }
    catch(e){ const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px;';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('הועתק ✓');}catch(_){toast('העתקה נכשלה');}document.body.removeChild(ta); }
  };
}
async function download(text,name,mime){
  const type=mime||'text/csv;charset=utf-8;';
  const blob=new Blob([text],{type});
  try{
    if(navigator.canShare&&typeof File!=='undefined'){
      const f=new File([blob],name,{type});
      if(navigator.canShare({files:[f]})){ await navigator.share({files:[f],title:name}); toast('הקובץ נשמר / שותף ✓'); return; }
    }
  }catch(e){ if(e&&e.name==='AbortError') return; }
  try{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=name;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{try{document.body.removeChild(a);}catch(_){}URL.revokeObjectURL(url);},2000);
  }catch(e){}
  if(!/^https?:$/.test(location.protocol)){ buildSaveModal(blob,text,name,type); }
  else { toast('הקובץ הורד ✓'); }
}

/* ===== toast & keyboard ===== */
let tT;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),1800);}
document.addEventListener('keydown',e=>{
  if(!S||!document.getElementById('deck'))return;
  if(!S.introDone){if(['ArrowRight','ArrowLeft','ArrowUp','ArrowDown','Enter',' '].includes(e.key)){e.preventDefault();dismissIntro();}return;}
  if(S.pos>=S.order.length){if(e.key==='Backspace'){e.preventDefault();undo();}return;}
  if(e.key==='ArrowRight'){e.preventDefault();decide('keep');}
  else if(e.key==='ArrowLeft'){e.preventDefault();decide('delete');}
  else if(e.key==='ArrowUp'||e.key==='ArrowDown'){e.preventDefault();decide('maybe');}
  else if(e.key==='Backspace'){e.preventDefault();undo();}
});

renderUpload(loadPersisted());
</script>

  window.addEventListener('load',()=>{navigator.serviceWorker.register('sw-sweepapp.js').catch(()=>{});});
}
