<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>פסיכו · ציר הזמן של ההיסטוריה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#80c6cf; --teal-dark:#5fa3ac; --teal-light:#b6dde2; --teal-bg:#d4ecf0;
    --mint:#a4e9d6; --mint-soft:#d6f6e8; --yellow:#fae45d; --yellow-light:#fff5b0;
    --blue:#96d7e8; --purple:#b9bafb; --pink:#f7a5b8;
    --text:#151515; --text-soft:#383636; --text-light:#686868;
    --bg:#ffffff; --bg-soft:#f6f7fb; --border:#e2e4e9;
    --shadow-sm:0 3px 10px rgba(0,0,0,.04); --shadow-md:0 6px 24px rgba(0,0,0,.06); --shadow-lg:0 20px 60px rgba(0,0,0,.10);
    --radius-sm:8px; --radius-md:18px; --radius-pill:999px;
    --blob:60% 40% 55% 45% / 50% 60% 40% 50%; /* "המפרט של פסיכו" — הצורה החוזרת */
    --font:'Assistant','Heebo',system-ui,-apple-system,'Segoe UI',sans-serif;
    --c-cosmos:var(--purple); --c-civ:var(--teal); --c-rel:var(--blue); --c-war:var(--pink); --c-sci:var(--mint);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--bg-soft);color:var(--text);font-family:var(--font);overflow:hidden;-webkit-font-smoothing:antialiased;}
  body{display:flex;flex-direction:column;}
  .site-header{background:#fff;padding:11px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;z-index:50;flex-shrink:0;}
  .app-title{font-weight:800;font-size:19px;color:var(--text);line-height:1.15;}
  .app-title small{display:block;font-size:11px;font-weight:600;color:var(--text-light);margin-top:1px;}
  .spacer{flex:1;}
  .hbtn{background:var(--bg-soft);color:var(--text);padding:7px 13px;border-radius:var(--radius-pill);border:1.5px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
  .hbtn:hover{background:var(--teal-bg);border-color:var(--teal);color:var(--teal-dark);}
  #tier{background:#fff;border:1.5px solid var(--teal);border-radius:var(--radius-pill);padding:6px 13px;font-size:12px;font-weight:800;color:var(--teal-dark);letter-spacing:.3px;white-space:nowrap;}
  /* סרגל סינון */
  #filters{display:flex;gap:8px;padding:10px 14px;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  #filters::-webkit-scrollbar{display:none;}
  .chip{white-space:nowrap;padding:7px 14px;border-radius:var(--radius-pill);border:1.5px solid var(--border);background:var(--bg-soft);color:var(--text-soft);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;flex-shrink:0;}
  .chip:hover{border-color:var(--teal);color:var(--teal-dark);}
  .chip.active{background:var(--text);border-color:var(--text);color:var(--yellow);}
  /* ציר */
  #stage{position:relative;flex:1;overflow-y:auto;overflow-x:hidden;touch-action:pan-y;-webkit-overflow-scrolling:touch;}
  #content{position:relative;width:100%;}
  #axis{position:absolute;top:0;bottom:0;right:56px;width:3px;border-radius:3px;background:linear-gradient(var(--teal-light),var(--teal),var(--teal-light));}
  .ev{position:absolute;right:0;left:0;height:0;transition:opacity .2s ease;will-change:opacity;}
  .ev .dot{position:absolute;right:57px;border-radius:50%;background:#fff;border:2.5px solid var(--c);transform:translate(50%,-50%);z-index:2;box-shadow:var(--shadow-sm);transition:width .2s,height .2s,background .2s,border-width .2s;}
  .ev .card{position:absolute;right:80px;left:14px;top:0;transform:translateY(-50%);background:#fff;border:1.5px solid var(--border);border-right:4px solid var(--c);border-radius:var(--radius-md);padding:9px 14px;text-align:right;box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .12s,box-shadow .12s;}
  .ev .card:hover{transform:translateY(-50%) translateX(-3px);box-shadow:var(--shadow-md);}
  .ev .year{font-size:11px;font-weight:700;color:var(--text-light);letter-spacing:.2px;}
  .ev .title{font-weight:700;line-height:1.25;margin-top:2px;color:var(--text);}
  .cat-cosmos{--c:var(--c-cosmos)} .cat-civ{--c:var(--c-civ)} .cat-rel{--c:var(--c-rel)} .cat-war{--c:var(--c-war)} .cat-sci{--c:var(--c-sci)}
  /* אירוע מסונן החוצה — נעלם לגמרי */
  .ev.hidden{opacity:0;pointer-events:none;}
  /* אירוע נסתר (אין מקום לכרטיס) — מוצג כנקודה קטנה על הקו בלבד */
  .ev.mini .card{display:none;}
  .ev.mini .dot{width:8px!important;height:8px!important;border-width:0;background:var(--c);box-shadow:none;opacity:.7;}
  #hud{position:fixed;bottom:20px;left:16px;display:flex;flex-direction:column;gap:10px;z-index:10;}
  .zbtn{width:48px;height:48px;border-radius:50%;border:0;background:var(--text);color:var(--yellow);font-size:24px;font-weight:800;cursor:pointer;box-shadow:var(--shadow-md);display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit;}
  .zbtn:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
  .zbtn:active{transform:scale(.94);}
  /* חיווי "יש עוד אירועים" — חץ גלילה */
  #navhint{position:fixed;left:50%;transform:translateX(-50%);z-index:15;display:none;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--teal);color:var(--teal-dark);font-weight:800;font-size:13px;padding:9px 16px;border-radius:var(--radius-pill);box-shadow:var(--shadow-md);cursor:pointer;font-family:inherit;}
  #navhint.show{display:inline-flex;}
  #navhint.down{bottom:26px;} #navhint.up{top:112px;}
  #navhint .ar{font-size:15px;line-height:1;animation:bob 1.1s infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
  #hint{position:fixed;top:54%;left:50%;transform:translate(-50%,-50%);z-index:20;background:linear-gradient(135deg,var(--teal-bg),#fff);border:1.5px solid var(--teal);border-radius:var(--radius-md);padding:20px 24px;text-align:center;max-width:290px;box-shadow:var(--shadow-lg);transition:opacity .5s;pointer-events:none;}
  #hint .big{font-size:30px;margin-bottom:8px;} #hint b{color:var(--text);} #hint .sm{color:var(--text-soft);font-size:14px;line-height:1.55;}
  /* מודאל (רכיב "עשיר" של פסיכו) */
  .modal-backdrop{position:fixed;inset:0;background:rgba(20,21,21,.55);z-index:100;display:none;align-items:center;justify-content:center;padding:18px;}
  .modal-backdrop.show{display:flex;}
  .modal{background:var(--bg);border-radius:var(--radius-md);box-shadow:var(--shadow-lg);width:560px;max-width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;animation:pop .25s ease-out;}
  @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98);}to{opacity:1;transform:none;}}
  .modal-header{background:linear-gradient(135deg,var(--teal-bg),var(--mint-soft));padding:20px 22px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--teal-light);}
  .modal-icon{width:56px;height:56px;border-radius:var(--blob);background:#fff;border:3px solid var(--teal);display:flex;align-items:center;justify-content:center;font-size:27px;flex-shrink:0;filter:drop-shadow(0 6px 14px rgba(0,0,0,.10));}
  .modal-title-block{flex:1;min-width:0;}
  .modal-eyebrow{font-size:11px;color:var(--teal-dark);font-weight:800;letter-spacing:1px;margin-bottom:2px;}
  .modal-title{font-size:21px;font-weight:800;color:var(--text);margin:0;line-height:1.15;}
  .modal-close{width:32px;height:32px;border-radius:50%;background:#fff;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--text-light);font-family:inherit;flex-shrink:0;}
  .modal-close:hover{color:var(--text);border-color:var(--text-light);}
  .modal-body{padding:20px 22px;overflow-y:auto;}
  .m-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .m-pill{padding:4px 12px;border-radius:var(--radius-pill);background:var(--bg-soft);border:1.5px solid var(--border);font-size:12px;font-weight:800;color:var(--text-soft);}
  .m-pill.cat{background:#fff;border-color:var(--c);color:var(--text);}
  .m-pill.cat .sw{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--c);margin-inline-start:5px;vertical-align:middle;}
  .m-summary{margin:0;font-size:15px;line-height:1.8;color:var(--text);}
  .modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg-soft);gap:12px;flex-wrap:wrap;}
  .modal-footer-hint{font-size:12px;color:var(--text-light);font-weight:700;}
  .modal-action-btn{padding:10px 22px;background:var(--text);border:0;border-radius:var(--radius-pill);color:var(--yellow);font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;transition:all .15s;box-shadow:var(--shadow-sm);}
  .modal-action-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
  /* מקרא */
  .legend-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:14px;}
  .legend-row .sw{width:16px;height:16px;border-radius:50%;border:2.5px solid var(--c);background:#fff;flex-shrink:0;}
  .legend-row b{font-weight:800;} .legend-row span{color:var(--text-light);}
  .legend-sizes{display:flex;align-items:flex-end;gap:14px;margin-top:6px;padding:14px;background:var(--bg-soft);border-radius:var(--radius-sm);}
  .legend-sizes .col{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:11px;color:var(--text-light);font-weight:700;}
  .legend-sizes .d{border-radius:50%;border:2.5px solid var(--teal-dark);background:#fff;}
</style>
</head>
<body>
<header class="site-header">
  <div class="app-title">ציר הזמן<small>של ההיסטוריה</small></div>
  <div class="spacer"></div>
  <button class="hbtn" id="info">מקרא</button>
  <div id="tier">…</div>
</header>
<div id="filters"></div>
<div id="stage"><div id="content"><div id="axis"></div></div></div>
<div id="hud">
  <button class="zbtn" id="zin">+</button>
  <button class="zbtn" id="zout">−</button>
</div>
<div id="navhint"><span class="ar" id="navar">▾</span><span id="navtxt">גלול לאירועים</span></div>
<div id="hint">
  <div class="big">🤏</div>
  <div class="sm"><b>צבטו להרחבה או כיווץ</b><br>פינץ' אאוט → מאורעות גדולים בלבד.<br>פינץ' אין → נחשפים אירועי הביניים.<br>הקישו על אירוע לתקציר.</div>
</div>
<div class="modal-backdrop" id="modal"></div>

<script src="events.js"></script>
<script src="people.js"></script>
<script>
const CAT={
  cosmos:{name:"קוסמוס וטבע",emoji:"🌌"},
  civ:{name:"ציוויליזציה",emoji:"🏛️"},
  rel:{name:"דת והגות",emoji:"🕊️"},
  war:{name:"מלחמה ופוליטיקה",emoji:"⚔️"},
  sci:{name:"מדע וטכנולוגיה",emoji:"🔬"},
};
const DATA = (window.TIMELINE_DATA || []).slice();
if(!DATA.length){ document.body.innerHTML='<p style="padding:24px;font-family:sans-serif">לא נטען מאגר האירועים (events.js). ודאו שהקובץ נמצא לצד histo-timeline.html.</p>'; }
DATA.sort((a,b)=>a.y-b.y);

const UNIT=66, PAD=60, GAP=12, MAXZ=9;
let MINZ=0.02;
let zoom=0.4;
const stage=document.getElementById('stage'), content=document.getElementById('content'), tierTxt=document.getElementById('tier');

function fmtYear(y){
  if(y<0){const a=-y;
    if(a>=1e9) return 'לפני '+(a/1e9).toFixed(1).replace(/\.0$/,'')+' מיליארד שנה';
    if(a>=1e6) return 'לפני '+(a/1e6).toFixed(0)+' מיליון שנה';
    if(a>=1e5) return 'לפני '+Math.round(a/1e3)+' אלף שנה';
    return a.toLocaleString('he-IL')+' לפנה״ס';}
  if(y<1500) return y+' לספירה';
  return ''+y;
}

const nodes=DATA.map((e,idx)=>{
  const el=document.createElement('div');
  el.className='ev cat-'+e.c;
  const sz=8+e.i*3;
  const fs=14+(e.i>=5?4:e.i>=4?2:0);
  el.innerHTML=`<div class="dot" style="width:${sz}px;height:${sz}px"></div>`+
    `<div class="card"><div class="year">${fmtYear(e.y)}</div>`+
    `<div class="title" style="font-size:${fs}px">${e.t}</div></div>`;
  el.querySelector('.card').addEventListener('click',()=>openEvent(e));
  content.appendChild(el);
  return {el,card:el.querySelector('.card'),e,idx};
});
const order=nodes.slice().sort((a,b)=> b.e.i-a.e.i || a.e.y-b.e.y);

/* ---------- סינון ---------- */
const JEWISH=new Set(["ממלכת ישראל המאוחדת","יציאת מצרים","חורבן ממלכת ישראל","חורבן בית ראשון","חורבן בית שני","מרד בר כוכבא","מרד החשמונאים","הקמת מדינת ישראל","מלחמת ששת הימים","מלחמת יום כיפור ומשבר הנפט"]);
const hasPerson=e=>!!(window.PEOPLE && window.PEOPLE[e.t]);
const FILTERS=[
  {id:"all",   label:"הכול",            test:()=>true},
  {id:"inv",   label:"ממציאים ומדענים", test:hasPerson},
  {id:"jew",   label:"תולדות עם ישראל", test:e=>JEWISH.has(e.t)||(e.f&&e.f.indexOf("jew")>-1)},
  {id:"rel",   label:"דתות העולם",      test:e=>e.c==="rel"},
  {id:"cosmos",label:"קוסמוס וטבע",     test:e=>e.c==="cosmos"},
  {id:"civ",   label:"ציוויליזציה",     test:e=>e.c==="civ"},
  {id:"war",   label:"מלחמה ופוליטיקה", test:e=>e.c==="war"},
  {id:"sci",   label:"מדע וטכנולוגיה",  test:e=>e.c==="sci"},
];
let activeFilter=FILTERS[0];
const filtersEl=document.getElementById('filters');
FILTERS.forEach(f=>{
  const b=document.createElement('button');
  b.className='chip'+(f.id==='all'?' active':''); b.textContent=f.label;
  b.onclick=()=>{ activeFilter=f; [...filtersEl.children].forEach(c=>c.classList.remove('active')); b.classList.add('active'); render(); };
  filtersEl.appendChild(b);
});

function render(){
  content.style.height=((DATA.length-1)*UNIT*zoom+PAD*2)+'px';
  nodes.forEach(n=>{ n.y=PAD+n.idx*UNIT*zoom; n.el.style.top=n.y+'px'; n.el.classList.remove('hidden','mini'); });
  const placed=[]; const placedSet=new Set(); let shownCount=0;
  const ends = activeFilter.id==='all' ? [nodes[0], nodes[nodes.length-1]] : [];
  ends.forEach(n=>{ placed.push({y:n.y,half:n.card.offsetHeight/2+GAP/2}); placedSet.add(n); shownCount++; });
  order.forEach(n=>{
    if(placedSet.has(n)) return;
    if(!activeFilter.test(n.e)){ n.el.classList.add('hidden'); return; }
    const half=n.card.offsetHeight/2 + GAP/2;
    let fits=true;
    for(const p of placed){ if(Math.abs(n.y-p.y) < half+p.half){ fits=false; break; } }
    if(fits){ placed.push({y:n.y,half}); placedSet.add(n); shownCount++; }
  });
  // אירוע שתואם את הסינון אך אין לו מקום לכרטיס — נקודה קטנה על הקו
  nodes.forEach(n=>{ if(!n.el.classList.contains('hidden') && !placedSet.has(n)) n.el.classList.add('mini'); });
  tierTxt.textContent = DATA.filter(e=>activeFilter.test(e)).length+' אירועים';
}
function setZoom(nz, focalClientY){
  nz=Math.max(MINZ,Math.min(MAXZ,nz));
  const rect=stage.getBoundingClientRect();
  const fy=(focalClientY??(rect.top+rect.height/2))-rect.top;
  const frac=(stage.scrollTop+fy-PAD)/((DATA.length-1)*UNIT*zoom||1);
  zoom=nz; render();
  stage.scrollTop = PAD + frac*(DATA.length-1)*UNIT*zoom - fy;
}
document.getElementById('zin').onclick =()=>setZoom(zoom*1.4);
document.getElementById('zout').onclick=()=>setZoom(zoom/1.4);
stage.addEventListener('wheel',ev=>{ if(ev.ctrlKey||ev.metaKey){ev.preventDefault();setZoom(zoom*(ev.deltaY<0?1.12:0.89),ev.clientY);} },{passive:false});

let pStartDist=0,pStartZoom=1,pinching=false,hintDone=false;
const dist=t=>Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
const mid =t=>(t[0].clientY+t[1].clientY)/2;
stage.addEventListener('touchstart',ev=>{ if(ev.touches.length===2){pinching=true;pStartDist=dist(ev.touches);pStartZoom=zoom;} },{passive:false});
stage.addEventListener('touchmove',ev=>{ if(pinching&&ev.touches.length===2){ev.preventDefault();setZoom(pStartZoom*dist(ev.touches)/pStartDist, mid(ev.touches));hideHint();} },{passive:false});
stage.addEventListener('touchend',ev=>{if(ev.touches.length<2)pinching=false;});

/* ---------- מודאל ---------- */
const modal=document.getElementById('modal');
function showModal(html){ modal.innerHTML='<div class="modal">'+html+'</div>'; modal.classList.add('show');
  modal.querySelectorAll('[data-close]').forEach(b=>b.onclick=closeModal); }
function closeModal(){ modal.classList.remove('show'); modal.innerHTML=''; }
modal.addEventListener('click',e=>{ if(e.target===modal) closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

function openEvent(e){
  const cat=CAT[e.c];
  const p = window.PEOPLE && window.PEOPLE[e.t];
  if(p){
    const inv=(p.inv||[]).map(x=>`<span class="m-pill">${x}</span>`).join('');
    showModal(
      `<div class="modal-header" style="--c:var(--c-${e.c})">
         <div class="modal-icon" style="border-color:var(--c-${e.c})">🔬</div>
         <div class="modal-title-block">
           <div class="modal-eyebrow">ממציא · ${p.field}</div>
           <h2 class="modal-title">${p.name}</h2>
         </div>
         <button class="modal-close" data-close aria-label="סגירה">✕</button>
       </div>
       <div class="modal-body" style="--c:var(--c-${e.c})">
         <div class="m-meta">
           <span class="m-pill">${p.life}</span>
           <span class="m-pill cat"><span class="sw"></span>${p.field}</span>
         </div>
         <p class="m-summary">${p.bio}</p>
         <div style="margin-top:16px">
           <div style="font-weight:800;font-size:14px;margin-bottom:8px">המצאות ותרומות מרכזיות</div>
           <div class="m-meta" style="margin:0">${inv}</div>
         </div>
       </div>
       <div class="modal-footer">
         <span class="modal-footer-hint">בציר: ${e.t} · ${fmtYear(e.y)}</span>
         <button class="modal-action-btn" data-close>סגירה</button>
       </div>`
    );
    return;
  }
  showModal(
    `<div class="modal-header" style="--c:var(--c-${e.c})">
       <div class="modal-icon" style="border-color:var(--c-${e.c})">${cat.emoji}</div>
       <div class="modal-title-block">
         <div class="modal-eyebrow">${cat.name}</div>
         <h2 class="modal-title">${e.t}</h2>
       </div>
       <button class="modal-close" data-close aria-label="סגירה">✕</button>
     </div>
     <div class="modal-body" style="--c:var(--c-${e.c})">
       <div class="m-meta">
         <span class="m-pill">${fmtYear(e.y)}</span>
         <span class="m-pill cat"><span class="sw"></span>${cat.name}</span>
       </div>
       <p class="m-summary">${e.s}</p>
     </div>
     <div class="modal-footer">
       <span class="modal-footer-hint">דרגת חשיבות: ${e.i}/5</span>
       <button class="modal-action-btn" data-close>הבנתי</button>
     </div>`
  );
}
document.getElementById('info').onclick=()=>{
  const rows=Object.entries(CAT).map(([k,v])=>
    `<div class="legend-row" style="--c:var(--c-${k})"><span class="sw"></span><b>${v.name}</b> <span>${v.emoji}</span></div>`).join('');
  showModal(
    `<div class="modal-header">
       <div class="modal-icon">🗺️</div>
       <div class="modal-title-block"><div class="modal-eyebrow">איך לקרוא את הציר</div><h2 class="modal-title">מקרא</h2></div>
       <button class="modal-close" data-close aria-label="סגירה">✕</button>
     </div>
     <div class="modal-body">
       <p class="m-summary" style="margin-bottom:12px;font-size:14px"><b>צבע העיגול</b> מציין את הקטגוריה של האירוע:</p>
       ${rows}
       <p class="m-summary" style="margin:16px 0 4px;font-size:14px"><b>גודל העיגול</b> מציין את דרגת החשיבות (1–5). ככל שהאירוע חשוב יותר, העיגול גדול יותר והוא נשאר על הציר גם בזום אאוט.</p>
       <div class="legend-sizes">
         <div class="col"><span class="d" style="width:14px;height:14px"></span>1–2</div>
         <div class="col"><span class="d" style="width:20px;height:20px"></span>3</div>
         <div class="col"><span class="d" style="width:26px;height:26px"></span>4</div>
         <div class="col"><span class="d" style="width:32px;height:32px"></span>5</div>
       </div>
       <p class="m-summary" style="margin:16px 0 0;font-size:14px"><b>סינון</b>: בסרגל העליון אפשר לבחור סוג תוכן (למשל "ממציאים ומדענים" או "תולדות עם ישראל"). הקשה על ממציא פותחת פרופיל.</p>
     </div>
     <div class="modal-footer"><span class="modal-footer-hint">צביטה לזום · הקשה על אירוע לפרטים</span><button class="modal-action-btn" data-close>סגירה</button></div>`
  );
};

const hintEl=document.getElementById('hint');
function hideHint(){if(hintDone)return;hintDone=true;hintEl.style.opacity='0';setTimeout(()=>hintEl.remove(),600);}
setTimeout(hideHint,6000);

/* ---------- חיווי גלילה לאירועים (כשהמסך ריק) ---------- */
const navhint=document.getElementById('navhint');
const navtxt=document.getElementById('navtxt');
const navar=document.getElementById('navar');
function updateNavHint(){
  const top=stage.scrollTop, bot=top+stage.clientHeight;
  let inView=false, below=null, above=null;
  nodes.forEach(n=>{
    if(n.el.classList.contains('hidden')) return;
    const y=n.y;
    if(y>=top+8 && y<=bot-8) inView=true;
    else if(y>bot-8){ if(below===null||y<below) below=y; }
    else { if(above===null||y>above) above=y; }
  });
  if(inView){ navhint.className=''; return; }
  if(below!==null){ navhint.className='show down'; navar.textContent='▾'; navtxt.textContent='גלול מטה לאירועים'; navhint._t=below; }
  else if(above!==null){ navhint.className='show up'; navar.textContent='▴'; navtxt.textContent='גלול מעלה לאירועים'; navhint._t=above; }
  else navhint.className='';
}
navhint.onclick=()=>{ if(navhint._t!=null) stage.scrollTo({top:Math.max(0,navhint._t-stage.clientHeight*0.35),behavior:'smooth'}); };
stage.addEventListener('scroll',updateNavHint,{passive:true});
const _render0=render; render=function(){ _render0(); updateNavHint(); };

render();
setTimeout(()=>{
  MINZ = (stage.clientHeight - PAD*2) / ((DATA.length-1)*UNIT) * 0.98;
  zoom = MINZ;
  render();
  stage.scrollTop = 0;
},60);
</script>
<style>
  #searchwrap{position:relative;background:#fff;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
  #search{width:100%;padding:9px 16px;border:1.5px solid var(--border);border-radius:var(--radius-pill);font-family:inherit;font-size:14px;color:var(--text);background:var(--bg-soft);outline:none;}
  #search:focus{border-color:var(--teal);background:#fff;}
  #results{position:absolute;left:14px;right:14px;top:54px;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-md);box-shadow:var(--shadow-lg);z-index:30;max-height:55vh;overflow-y:auto;display:none;}
  #results.show{display:block;}
  .res{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);text-align:right;}
  .res:last-child{border-bottom:0;}
  .res:hover{background:var(--teal-bg);}
  .res b{font-weight:700;color:var(--text);}
  .res span{font-size:12px;color:var(--text-light);display:block;margin-top:2px;}
</style>
<script>
(function(){
  const sw=document.createElement('div'); sw.id='searchwrap';
  sw.innerHTML='<input id="search" placeholder="חיפוש אירוע…" autocomplete="off"><div id="results"></div>';
  filtersEl.parentNode.insertBefore(sw, filtersEl);
  const inp=sw.querySelector('#search'), res=sw.querySelector('#results');
  inp.addEventListener('input',function(){
    const q=inp.value.trim().toLowerCase();
    if(q.length<2){ res.className=''; res.innerHTML=''; return; }
    const m=nodes.filter(n=>(n.e.t+' '+(n.e.s||'')).toLowerCase().indexOf(q)>-1).slice(0,10);
    if(!m.length){ res.innerHTML='<div class="res"><span>לא נמצאו תוצאות</span></div>'; res.className='show'; return; }
    res.innerHTML=m.map(n=>'<div class="res" data-i="'+nodes.indexOf(n)+'"><b>'+n.e.t+'</b><span>'+fmtYear(n.e.y)+'</span></div>').join('');
    res.className='show';
  });
  res.addEventListener('click',function(e){
    const d=e.target.closest('.res'); if(!d||!d.dataset.i) return;
    const n=nodes[+d.dataset.i];
    res.className=''; inp.value=''; inp.blur();
    stage.scrollTo({top:Math.max(0,n.y - stage.clientHeight/2), behavior:'smooth'});
    setTimeout(function(){ openEvent(n.e); },350);
  });
  document.addEventListener('click',function(e){ if(!sw.contains(e.target)) res.className=''; });
})();
</script>
</body>
</html>
