<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sweep</title>
<meta name="theme-color" content="#0C2A2B">
<link rel="manifest" href="myshare.webmanifest">
<link rel="icon" type="image/png" sizes="64x64" href="myshare-favicon-64.png">
<link rel="icon" type="image/png" sizes="192x192" href="myshare-192.png">
<link rel="apple-touch-icon" href="myshare-apple-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sweep">
<style>
  :root{
    --tq:#7BBFC0; --tq-deep:#00C2A8; --tq-ink:#1E5A64; --white:#ffffff; --tq-top:#0C2A2B; --tq-bot:#1C4B4D;
    --soft:#EAF5F4; --line:#e7f0ef; --dim:rgba(8,40,42,.42);
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:linear-gradient(180deg,var(--tq-top),var(--tq-bot)) fixed;color:var(--white);overflow:hidden;-webkit-user-select:none;user-select:none;touch-action:none;}

  .top{padding:16px 18px 6px;}
  .top h1{font-size:18px;font-weight:700;letter-spacing:-.2px;}
  .brand{text-align:center;line-height:1;margin:4px 0 2px;}
  .brandlogo{height:38px;width:auto;display:inline-block;vertical-align:middle;filter:drop-shadow(0 2px 14px rgba(0,194,168,.35));}
  .brand .b-s{font-size:34px;font-weight:800;color:#fff;}
  .brand .b-rest{font-size:25px;font-weight:600;letter-spacing:3px;color:rgba(255,255,255,.9);}
  .seg{margin-top:10px;display:flex;width:100%;gap:0;position:relative;background:rgba(255,255,255,.1);border-radius:14px;padding:3px;}
  .seg-ind{position:absolute;top:3px;bottom:3px;left:3px;width:30%;background:#fff;border-radius:11px;z-index:0;transition:left .32s cubic-bezier(.22,1,.36,1), width .32s cubic-bezier(.22,1,.36,1);}
  .seg-btn{flex:1;position:relative;z-index:1;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:rgba(255,255,255,.85);padding:9px 0;border-radius:11px;cursor:pointer;transition:color .2s;}
  .seg-btn svg{width:20px;height:20px;}
  .seg-btn.on{color:var(--tq-ink);}
  .scr{position:fixed;inset:0;z-index:70;background:linear-gradient(180deg,var(--tq-top),var(--tq-bot));color:#fff;transform:translateX(100%);transition:transform .52s cubic-bezier(.34,1.45,.5,1);display:flex;flex-direction:column;}
  .scr.show{transform:none;}
  .scr-head{display:flex;align-items:center;gap:10px;padding:16px 18px 8px;}
  .scr-head h2{font-size:18px;font-weight:700;flex:1;}
  .scr-back{width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,.14);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .scr-back svg{width:20px;height:20px;}
  .scr-body{flex:1;overflow-y:auto;padding:6px 18px 24px;}
  .seder-intro{color:rgba(255,255,255,.85);font-size:14px;line-height:1.6;margin:4px 0 18px;}
  .opt{display:flex;align-items:center;gap:14px;width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:16px;margin-bottom:12px;cursor:pointer;color:#fff;font-family:inherit;text-align:right;transition:transform .12s, background .15s;}
  .opt:active{transform:scale(.98);background:rgba(255,255,255,.13);}
  .opt .oic{width:46px;height:46px;border-radius:50%;background:#fff;color:var(--tq-ink);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .opt .oic svg{width:30px;height:30px;}
  .opt .otitle{font-size:16px;font-weight:700;display:block;}
  .opt .odesc{font-size:12.5px;color:rgba(255,255,255,.78);margin-top:2px;display:block;}
  .opt .ostep{margin-inline-start:auto;font-size:12px;font-weight:700;color:var(--tq-ink);background:#fff;border-radius:999px;padding:3px 9px;flex:0 0 auto;}
  .chip{margin-top:8px;display:inline-flex;align-items:center;gap:7px;background:var(--white);color:var(--tq-ink);font-size:12.5px;font-weight:600;padding:5px 12px;border-radius:10px;max-width:100%;}
  .chip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .chip svg{width:15px;height:15px;flex:0 0 auto;}

  .list{position:absolute;inset:84px 0 0 0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;touch-action:pan-y;display:flex;flex-direction:column;align-items:stretch;gap:14px;padding:18px 0 120px;}
  .row{position:relative;flex:0 0 auto;width:100%;height:58px;touch-action:pan-y;transition:opacity .22s ease;}
  .row .av{position:absolute;top:50%;transform:translateY(-50%);width:54px;height:54px;border-radius:50%;background:var(--white);color:var(--tq-ink);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;box-shadow:0 8px 18px -10px rgba(8,50,50,.5);touch-action:none;cursor:pointer;}
  body.hand-right .row .av{right:14px;}
  body.hand-left .row .av{left:14px;}
  .row .meta{position:absolute;top:50%;transform:translateY(-50%);}
  body.hand-right .row .meta{right:82px;left:16px;text-align:right;}
  body.hand-left .row .meta{left:82px;right:16px;text-align:left;}
  .row .ml{line-height:1.32;}
  .row .nm{display:inline-block;max-width:100%;font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:bottom;}
  .row .sub{display:inline-block;max-width:100%;font-size:12.5px;font-weight:400;color:rgba(255,255,255,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:bottom;}
  body.picking .row{opacity:.18;}
  body.picking .row.active{opacity:0;}

  .stage{position:fixed;inset:0;z-index:40;pointer-events:none;opacity:0;transition:opacity .34s ease;}
  .stage.show{opacity:1;pointer-events:auto;}
  .stage .veil{position:absolute;inset:0;background:var(--dim);}
  .bigav{position:absolute;width:81px;height:81px;border-radius:50%;background:var(--white);border:2.5px solid var(--tq-deep);color:var(--tq-ink);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;transform:translate(-50%,-50%);will-change:left,top;box-shadow:0 0 14px 2px rgba(255,255,255,.18), 0 16px 34px -12px rgba(8,50,50,.6);}
  .bigav::after{content:"";position:absolute;inset:-22px;border-radius:50%;background:radial-gradient(circle, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 70%);filter:blur(6px);z-index:-1;pointer-events:none;}
  .bigname{position:absolute;transform:translate(-50%,0);font-size:14px;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.3);white-space:nowrap;}

  .dirc{position:absolute;width:50px;height:50px;transform:translate(-50%,-50%);animation:coinIn .26s cubic-bezier(.22,1,.36,1) both;}
  @keyframes coinIn{0%{opacity:0;transform:translate(-50%,-50%) scale(.5);}100%{opacity:1;transform:translate(-50%,-50%) scale(1);}}
  @keyframes railIn{0%{opacity:0;transform:translateX(-16px) scale(.6);}100%{opacity:1;transform:none;}}
  .dirc .coin{width:50px;height:50px;border-radius:50%;background:var(--white);color:var(--tq-ink);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 22px -8px rgba(8,50,50,.55);transition:transform .13s ease-out, box-shadow .13s ease-out, background .13s, color .13s;will-change:transform;}
  .dirc .coin svg{width:24px;height:24px;}
  .dirc .lbl{position:absolute;top:50%;right:calc(100% + 10px);transform:translateY(-50%);line-height:1;white-space:nowrap;font-size:12px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.45);}
  .dirc.disabled{opacity:.3;filter:grayscale(1);pointer-events:none;}
  .dirc.add .coin{background:var(--white);border:1.6px dashed var(--tq-deep);color:var(--tq-deep);}
  .dirc.hot .coin{background:var(--tq-deep);color:#fff;box-shadow:0 16px 34px -8px rgba(8,50,50,.85);}
  .dirc.bank{width:36px;height:36px;}
  .dirc.bank .coin{width:36px;height:36px;background:transparent;border:1.6px solid rgba(255,255,255,.6);color:rgba(255,255,255,.85);box-shadow:none;}
  .dirc.bank .coin svg{width:17px;height:17px;}
  .dirc.bank.hot .coin{background:var(--tq-deep);border-color:var(--tq-deep);color:#fff;transform:scale(1.12);}
  .dirc.hot .lbl{opacity:1;font-weight:800;background:var(--tq-deep);color:#fff;padding:3px 9px;border-radius:9px;}

  .rail{position:absolute;bottom:96px;left:10px;display:flex;flex-direction:column-reverse;align-items:flex-start;gap:20px;}
  .rail.rl{left:auto;right:10px;align-items:flex-end;}
  .rail.rl .rlbl{left:auto;right:48px;transform:translate(8px,-50%);}
  .rail.rl .ritem.hot .rlbl{transform:translate(0,-50%);}
  .rail .ritem{position:relative;display:flex;align-items:center;justify-content:center;animation:railIn .28s cubic-bezier(.22,1,.36,1) both;}
  .rail .rc{width:38px;height:38px;border-radius:50%;border:1.6px solid rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;color:#fff;background:transparent;transition:transform .13s ease-out, background .13s;will-change:transform;}
  .rail .rc svg{width:18px;height:18px;}
  .rail .rc.add{border-style:dashed;}
  .rail .ritem.hot .rc{background:var(--tq-deep);border-color:var(--tq-deep);color:#fff;}
  .rail .rlbl{position:absolute;left:48px;top:50%;transform:translate(-8px,-50%);white-space:nowrap;font-size:12px;font-weight:700;color:#fff;background:rgba(8,40,42,.74);padding:5px 11px;border-radius:999px;opacity:0;transition:opacity .14s, transform .14s;pointer-events:none;}
  .rail .ritem.hot .rlbl{opacity:1;transform:translate(0,-50%);}

  .fab-menu{position:fixed;bottom:26px;left:16px;right:auto;z-index:95;width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;background:var(--white);color:var(--tq-ink);box-shadow:0 20px 44px 2px rgba(0,0,0,.72), 0 8px 18px rgba(0,0,0,.6);transition:transform .12s;transform-origin:50% 80%;}
  .dotmorph{position:absolute;inset:0;transform-origin:50% 50%;transition:transform .55s cubic-bezier(.34,1.4,.5,1);}
  .dm{position:absolute;left:0;top:0;width:5px;height:5px;border-radius:50%;background:var(--tq-ink);transition:transform .5s cubic-bezier(.34,1.4,.5,1);will-change:transform;}
  .fab-menu.left{left:auto;right:16px;}
  .fab-menu:active{transform:scale(.9);}
  .fab-menu svg{width:24px;height:24px;color:var(--tq-ink);}
  @keyframes dotSpinCCW{
    0%{transform:rotate(calc(var(--r1) + 90.0deg));}
    6.2%{transform:rotate(calc(var(--r1) + 46.9deg));}
    12.5%{transform:rotate(calc(var(--r1) + 1.8deg));}
    18.8%{transform:rotate(calc(var(--r1) - 22.5deg));}
    25%{transform:rotate(calc(var(--r1) - 24.5deg));}
    31.2%{transform:rotate(calc(var(--r1) - 13.7deg));}
    37.5%{transform:rotate(calc(var(--r1) - 1.5deg));}
    43.8%{transform:rotate(calc(var(--r1) + 5.6deg));}
    50%{transform:rotate(calc(var(--r1) + 6.6deg));}
    56.2%{transform:rotate(calc(var(--r1) + 4.0deg));}
    62.5%{transform:rotate(calc(var(--r1) + 0.7deg));}
    68.8%{transform:rotate(calc(var(--r1) - 1.4deg));}
    75%{transform:rotate(calc(var(--r1) - 1.8deg));}
    81.2%{transform:rotate(calc(var(--r1) - 1.1deg));}
    87.5%{transform:rotate(calc(var(--r1) - 0.3deg));}
    93.8%{transform:rotate(calc(var(--r1) + 0.3deg));}
    100%{transform:rotate(var(--r1));}
  }
  @keyframes dotSpinCW{
    0%{transform:rotate(calc(var(--r1) - 90.0deg));}
    6.2%{transform:rotate(calc(var(--r1) - 46.9deg));}
    12.5%{transform:rotate(calc(var(--r1) - 1.8deg));}
    18.8%{transform:rotate(calc(var(--r1) + 22.5deg));}
    25%{transform:rotate(calc(var(--r1) + 24.5deg));}
    31.2%{transform:rotate(calc(var(--r1) + 13.7deg));}
    37.5%{transform:rotate(calc(var(--r1) + 1.5deg));}
    43.8%{transform:rotate(calc(var(--r1) - 5.6deg));}
    50%{transform:rotate(calc(var(--r1) - 6.6deg));}
    56.2%{transform:rotate(calc(var(--r1) - 4.0deg));}
    62.5%{transform:rotate(calc(var(--r1) - 0.7deg));}
    68.8%{transform:rotate(calc(var(--r1) + 1.4deg));}
    75%{transform:rotate(calc(var(--r1) + 1.8deg));}
    81.2%{transform:rotate(calc(var(--r1) + 1.1deg));}
    87.5%{transform:rotate(calc(var(--r1) + 0.3deg));}
    93.8%{transform:rotate(calc(var(--r1) - 0.3deg));}
    100%{transform:rotate(var(--r1));}
  }
  @keyframes fabHop{
    0%{transform:translate(0,0) scale(1,1);}
    8%{transform:translate(calc(var(--dx)*0.04),5px) scale(1.18,0.84);}
    26%{transform:translate(calc(var(--dx)*0.30),-32px) scale(0.86,1.16);}
    42%{transform:translate(calc(var(--dx)*0.52),3px) scale(1.18,0.84);}
    58%{transform:translate(calc(var(--dx)*0.70),-20px) scale(0.9,1.12);}
    72%{transform:translate(calc(var(--dx)*0.85),3px) scale(1.14,0.88);}
    87%{transform:translate(calc(var(--dx)*0.96),-9px) scale(0.96,1.05);}
    100%{transform:translate(var(--dx),0) scale(1,1);}
  }

  .hbar-backdrop{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,0);transition:background .45s ease, backdrop-filter .45s ease;}
  .hbar-backdrop.show{background:rgba(0,0,0,.90);}
  .hbar-backdrop.show.reveal{background:rgba(0,0,0,.22);}
  .hbar{position:fixed;inset:0;z-index:91;pointer-events:none;}
  .hm-item{position:absolute;pointer-events:auto;background:none;border:none;cursor:pointer;width:50px;height:50px;padding:0;opacity:0;}
  .hbar.run .hm-item{animation:hmIn var(--dur,.5s) linear both;}
  .hbar.closing .hm-item{animation:hmOut var(--cdur,.4s) cubic-bezier(.5,.04,.7,.32) both;animation-delay:calc(var(--r,0)*.04s);}
  @keyframes hmIn{
    0%{opacity:0;transform:translate(var(--sx,0px),var(--sy,0px)) scale(0.4);}
    5.6%{opacity:0.19;transform:translate(calc(var(--sx,0px) * 0.587),calc(var(--sy,0px) * 0.587)) scale(0.648);}
    11.1%{opacity:0.37;transform:translate(calc(var(--sx,0px) * 0.23),calc(var(--sy,0px) * 0.23)) scale(0.862);}
    16.7%{opacity:0.56;transform:translate(calc(var(--sx,0px) * 0.0),calc(var(--sy,0px) * 0.0)) scale(1.0);}
    22.2%{opacity:0.74;transform:translate(calc(var(--sx,0px) * -0.106),calc(var(--sy,0px) * -0.106)) scale(1.063);}
    27.8%{opacity:0.93;transform:translate(calc(var(--sx,0px) * -0.124),calc(var(--sy,0px) * -0.124)) scale(1.074);}
    33.3%{opacity:1.0;transform:translate(calc(var(--sx,0px) * -0.097),calc(var(--sy,0px) * -0.097)) scale(1.058);}
    38.9%{opacity:1.0;transform:translate(calc(var(--sx,0px) * -0.057),calc(var(--sy,0px) * -0.057)) scale(1.034);}
    44.4%{opacity:1.0;transform:translate(calc(var(--sx,0px) * -0.022),calc(var(--sy,0px) * -0.022)) scale(1.013);}
    50%{opacity:1.0;transform:translate(calc(var(--sx,0px) * 0.0),calc(var(--sy,0px) * 0.0)) scale(1.0);}
    55.6%{opacity:1.0;transform:translate(calc(var(--sx,0px) * 0.01),calc(var(--sy,0px) * 0.01)) scale(0.994);}
    61.1%{opacity:1.0;transform:translate(calc(var(--sx,0px) * 0.012),calc(var(--sy,0px) * 0.012)) scale(0.993);}
    66.7%{opacity:1.0;transform:translate(calc(var(--sx,0px) * 0.009),calc(var(--sy,0px) * 0.009)) scale(0.994);}
    72.2%{opacity:1.0;transform:translate(calc(var(--sx,0px) * 0.006),calc(var(--sy,0px) * 0.006)) scale(0.997);}
    77.8%{opacity:1.0;transform:translate(calc(var(--sx,0px) * 0.002),calc(var(--sy,0px) * 0.002)) scale(0.999);}
    83.3%{opacity:1.0;transform:translate(calc(var(--sx,0px) * 0.0),calc(var(--sy,0px) * 0.0)) scale(1.0);}
    88.9%{opacity:1.0;transform:translate(calc(var(--sx,0px) * -0.001),calc(var(--sy,0px) * -0.001)) scale(1.001);}
    94.4%{opacity:1.0;transform:translate(calc(var(--sx,0px) * -0.001),calc(var(--sy,0px) * -0.001)) scale(1.001);}
    100%{opacity:1;transform:translate(0,0) scale(1);}
  }
  @keyframes hmOut{0%{opacity:1;transform:translate(0,0) scale(1);}18%{transform:translate(0,0) scale(1.08);}100%{opacity:0;transform:translate(var(--sx,0),var(--sy,0)) scale(.4);}}
  .hm-ic{width:50px;height:50px;border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 22px -8px rgba(8,50,50,.6);color:var(--tq-ink);transition:transform .16s cubic-bezier(.34,1.56,.64,1), background .16s ease, color .16s ease;}
  .hm-item.tapped .hm-ic{transform:scale(1.22);background:var(--tq-deep);color:#fff;box-shadow:0 16px 34px -8px rgba(8,50,50,.75);}
  .hm-ic svg{width:23px;height:23px;}
  .hm-ic.big svg{width:34px;height:34px;}
  .hm-label{position:absolute;top:50%;right:56px;transform:translateY(-50%);line-height:1;white-space:nowrap;font-size:13.5px;font-weight:700;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.8),0 0 2px rgba(0,0,0,.5);}
  .palbar{position:fixed;inset:0;z-index:92;pointer-events:none;opacity:0;transition:opacity .2s ease;}
  .palbar.show{opacity:1;}
  .pal-sw{position:absolute;pointer-events:auto;width:34px;height:34px;border-radius:50%;border:2px solid rgba(255,255,255,.6);cursor:pointer;padding:0;box-shadow:0 6px 16px -6px rgba(0,0,0,.55);transform:scale(.5);transition:transform .28s cubic-bezier(.34,1.5,.5,1);}
  .palbar.show .pal-sw{transform:scale(1);}
  .pal-sw.on{border-color:#fff;border-width:3px;}
  .hbar.hand-left .hm-label{right:auto;left:56px;}

  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--tq-ink);color:#fff;padding:11px 20px;border-radius:14px;font-weight:600;font-size:14px;z-index:99;opacity:0;transition:opacity .2s;pointer-events:none;box-shadow:0 12px 28px -10px rgba(0,0,0,.4);}
  .toast.show{opacity:1;}

  .hint{position:fixed;bottom:30px;right:18px;left:84px;text-align:center;font-size:12px;color:rgba(255,255,255,.85);z-index:5;}

  .ovl{position:fixed;inset:0;z-index:60;background:rgba(8,40,42,0);transition:background .2s;display:flex;align-items:flex-end;justify-content:center;pointer-events:none;}
  .ovl.show{background:rgba(8,40,42,.45);pointer-events:auto;}
  .sheet{width:100%;max-width:520px;background:#fff;color:var(--tq-ink);border-radius:22px 22px 0 0;padding:16px 16px 26px;transform:translateY(100%);transition:transform .5s cubic-bezier(.34,1.45,.5,1);max-height:82%;overflow-y:auto;}
  .ovl.show .sheet{transform:translateY(0);}
  .sheet h2{font-size:16px;font-weight:700;margin:2px 0 14px;text-align:center;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .gi{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;background:none;border:none;font-family:inherit;color:var(--tq-ink);}
  .gi .c{width:56px;height:56px;border-radius:50%;background:var(--soft);display:flex;align-items:center;justify-content:center;color:var(--tq-ink);transition:transform .12s;}
  .gi:active .c{transform:scale(.92);}
  .gi .c svg{width:26px;height:26px;}
  .gi .c.none{background:#fff;border:1.6px dashed #c2d8d7;color:#9bb7b8;}
  .gi span{font-size:11.5px;font-weight:600;}
  .setrow{display:flex;align-items:center;gap:12px;padding:12px 6px;border-bottom:1px solid var(--line);cursor:pointer;width:100%;background:none;border-left:none;border-right:none;border-top:none;font-family:inherit;color:var(--tq-ink);text-align:right;}
  .setrow .ar{width:42px;height:42px;border-radius:50%;background:var(--soft);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .setrow .ar svg{width:21px;height:21px;}
  .setrow .dr{font-weight:700;}
  .setrow .cur{margin-inline-start:auto;font-size:13px;color:#7a9a9b;font-weight:600;}
  .compass{position:relative;width:250px;height:250px;margin:10px auto 16px;}

function buildStage(row){
  [...stage.querySelectorAll('.bigav,.bigname,.dirc,.rail')].forEach(e=>e.remove());
  targets=[];
  const r=row.querySelector('.av').getBoundingClientRect();
  cx=r.left+r.width/2; cy=r.top+r.height/2;
  bigEl=document.createElement('div');bigEl.className='bigav';
  bigEl.textContent=row.querySelector('.av').textContent;
  bigEl.style.left=cx+'px';bigEl.style.top=cy+'px';stage.appendChild(bigEl);
  const nm=document.createElement('div');nm.className='bigname';
  nm.textContent=row.querySelector('.nm').textContent;
  nm.style.left=cx+'px';nm.style.top=(cy-62)+'px';stage.appendChild(nm);
  const lh=(cfg.hand==='left');
  const sgn=lh?1:-1;
  const ndx=sgn*0.7071, ndy=0.7071;
  const list=cfg.share.slice(0,3);
  const GAPX=92, STEP=80;
  list.forEach((appId,i)=>{
    const app=byId(appId);
    const el=document.createElement('div');el.className='dirc';
    el.innerHTML=`<div class="coin">${app?app.ic:ICON.plus}</div><div class="lbl">${app?escapeHtml(app.label):'הוסף'}</div>`;
    const x=cx+sgn*GAPX+ndx*(i*STEP), y=cy+ndy*(i*STEP);
    el.style.left=x+'px';el.style.top=y+'px';stage.appendChild(el);
    targets.push({kind:'app', id:appId, x, y, coinEl:el.querySelector('.coin'), dirc:el});
  });

function applyProximity(px,py){
  let best=null,bestD=1e9;
  targets.forEach(t=>{
    const d=Math.hypot(px-t.x,py-t.y);
    const ramp=Math.max(0,1-d/INF);
    t.coinEl.style.transform='scale('+(1+MAXB*ramp*ramp).toFixed(3)+')';
    if(d<bestD){bestD=d;best=t;}
  });
  const moved=Math.hypot(px-cx,py-cy);
  const sel=(best && bestD<SELECT && moved>TRIGGER)?best:null;
  targets.forEach(t=>{const on=(t===sel);if(t.kind==='rail')t.ritem.classList.toggle('hot',on);else t.dirc.classList.toggle('hot',on);});
  return sel;
}

      fg.style.transition='transform .25s ease-out';fg.style.transform='translateX(-115%)';
      const h0=m.offsetHeight;m.style.maxHeight=h0+'px';void m.offsetWidth;m.style.transition='opacity .25s, max-height .3s ease, margin .3s';m.style.maxHeight='0';m.style.opacity='0';m.style.marginBottom='0';
      mgRemovePerson(person);const j=g.indexOf(person);if(j>=0)g.splice(j,1);
      if(sel.get(gi)===person&&g.length)sel.set(gi,g[0]);
      if(navigator.vibrate)navigator.vibrate(12);
      setTimeout(()=>{m.remove();renderList();if(g.length<2){groupEl.remove();}else{mgUpdateSel(groupEl,sel.get(gi));}mgRefresh(sc);toast('נמחק');},300);
    }else{
      fg.style.transition='transform .2s';fg.style.transform='';
      if(!moved){sel.set(gi,person);mgUpdateSel(groupEl,person);}
    }
  };
  fg.addEventListener('pointerup',end);fg.addEventListener('pointercancel',end);
}
function openMerge(){
  const groups=computeMergeGroups();
  const sc=openScreen('<div class="scr-head"><button class="scr-back" aria-label="חזרה">'+ICN_BACK+'</button><h2>מיזוג כפילויות ('+groups.length+')</h2></div><div class="scr-body" id="dupBody"></div>');
  const dupBody=sc.querySelector('#dupBody');
  if(!groups.length){dupBody.innerHTML='<div class="dup-empty">לא נמצאו כפילויות 🎉</div>';return;}
  const sel=new Map();
  groups.forEach((g,gi)=>{
    sel.set(gi,g[0]);
    const groupEl=document.createElement('div');groupEl.className='dup-group';
    const title=document.createElement('div');title.className='dup-title';title.textContent=g.length+' כפילויות — בחר מי יישמר';groupEl.appendChild(title);
    g.slice().forEach(person=>{
      const m=document.createElement('div');m.className='dup-member'+(person===g[0]?' selected':'');
      m.innerHTML='<div class="dm-bg">'+ICON.broomDel+'</div><div class="dm-fg"><span class="dm-hint">'+ICON.broomDel+'</span><span class="dm-av">'+escapeHtml(initials(person.name))+'</span><div class="dm-txt"><div class="dm-n">'+escapeHtml(person.name)+'</div><div class="dm-s">'+escapeHtml(person.phone||person.msg||'')+'</div></div><span class="dm-keep">יישמר</span></div>';
      attachMergeMember(m,person,gi,sel,groupEl,g,sc);
      groupEl.appendChild(m);
    });
    const acts=document.createElement('div');acts.className='dup-actions';
    const bMerge=document.createElement('button');bMerge.className='mbtn merge';bMerge.textContent='מזג';
    const bSkip=document.createElement('button');bSkip.className='mbtn skip';bSkip.textContent='לא כפילויות';
    bMerge.onclick=()=>{openMergePicker(g,sel.get(gi),()=>{groupEl.style.transition='opacity .25s, transform .25s';groupEl.style.opacity='0';groupEl.style.transform='translateY(-8px)';setTimeout(()=>{groupEl.remove();mgRefresh(sc);},260);});};
    bSkip.onclick=()=>{groupEl.style.transition='opacity .2s';groupEl.style.opacity='0';setTimeout(()=>{groupEl.remove();mgRefresh(sc);},210);};
    acts.appendChild(bMerge);acts.appendChild(bSkip);groupEl.appendChild(acts);
    dupBody.appendChild(groupEl);
  });
}
function openMergePicker(group,keep,onDone){
  const phones=[...new Set(group.map(p=>p.phone).filter(Boolean))];
  const emails=[...new Set(group.map(p=>p.email).filter(Boolean))];
  const names=[...new Set(group.map(p=>p.name).filter(Boolean))];
  const vals={names,phones,emails};
  const sel={names:new Set([keep.name||names[0]].filter(Boolean)),phones:new Set(phones),emails:new Set(emails)};
  const xsvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>';
  const section=(key,title,arr,ltr)=>{if(!arr.length)return '';const same=arr.length===1?' <span class="mp-same">(זהה בכולם)</span>':'';return '<div class="mp-section"><h3>'+title+same+'</h3>'+arr.map((v,i)=>'<div class="mp-opt'+(sel[key].has(v)?' on':'')+'" data-key="'+key+'" data-idx="'+i+'"><span class="mp-chk">'+ICON.check+'</span><span class="mp-v'+(ltr?' ltr':'')+'">'+escapeHtml(v)+'</span></div>').join('')+'</div>';};
  const ov=document.createElement('div');ov.className='mpovl';
  ov.innerHTML='<div class="mp-sheet"><div class="sheet-head"><button class="sheet-x" aria-label="סגור">'+xsvg+'</button><h2 style="flex:1;margin:0;text-align:center;">מה לשמור במיזוג?</h2><span style="width:32px;flex:0 0 auto;"></span></div><p class="mp-hint">סמן מה לשמור. ערך שזהה בכולם נשמר פעם אחת; בערכים שונים אפשר לשמור כמה.</p>'+section('names','שם',names,false)+section('phones','טלפונים',phones,true)+section('emails','מיילים',emails,true)+'<button class="mp-confirm" id="mpDo">אשר מיזוג</button></div>';
  document.body.appendChild(ov);
  requestAnimationFrame(()=>ov.classList.add('show'));
  const close=()=>{ov.classList.remove('show');setTimeout(()=>ov.remove(),260);};
  ov.querySelector('.sheet-x').onclick=close;
  ov.addEventListener('click',e=>{if(e.target===ov)close();});
  ov.querySelectorAll('.mp-opt').forEach(o=>{o.onclick=()=>{const k=o.dataset.key,v=vals[k][+o.dataset.idx];if(sel[k].has(v))sel[k].delete(v);else sel[k].add(v);o.classList.toggle('on',sel[k].has(v));};});
  ov.querySelector('#mpDo').onclick=()=>{
    const sp=phones.filter(v=>sel.phones.has(v)),se=emails.filter(v=>sel.emails.has(v));
    keep.phone=sp[0]||'';keep.phones=sp;keep.email=se[0]||'';keep.emails=se;
    group.forEach(p=>{if(p!==keep)mgRemovePerson(p);});
    renderList();close();if(navigator.vibrate)navigator.vibrate(10);toast('מוזג');if(onDone)onDone();
  };
}
function openShareBank(person){
  if(!person)return;
  const xsvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>';
  const cells=CATALOG.map(a=>'<button class="gi" data-app="'+a.id+'"><span class="c">'+a.ic+'</span><span>'+escapeHtml(a.label)+'</span></button>').join('');
  const ov=document.createElement('div');ov.className='mpovl';
  ov.innerHTML='<div class="mp-sheet"><div class="sheet-head"><button class="sheet-x" aria-label="סגור">'+xsvg+'</button><h2 style="flex:1;margin:0;text-align:center;">שיתוף לאפליקציה</h2><span style="width:32px;flex:0 0 auto;"></span></div><div class="grid">'+cells+'</div></div>';
  document.body.appendChild(ov);requestAnimationFrame(()=>ov.classList.add('show'));
  const close=()=>{ov.classList.remove('show');setTimeout(()=>ov.remove(),260);};
  ov.querySelector('.sheet-x').onclick=close;ov.addEventListener('click',e=>{if(e.target===ov)close();});
  ov.querySelectorAll('.gi').forEach(b=>b.onclick=()=>{fire(b.dataset.app,person);close();});
}
function doReset(){['myshare_cfg','myshare_stats','contacts_view','myshare_onboarded'].forEach(k=>{try{localStorage.removeItem(k);}catch(e){}});location.reload();}
function openResetConfirm(){
  const xsvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>';
  const ov=document.createElement('div');ov.className='mpovl';
  ov.innerHTML='<div class="mp-sheet"><div class="sheet-head"><button class="sheet-x" aria-label="סגור">'+xsvg+'</button><h2 style="flex:1;margin:0;text-align:center;">איפוס האפליקציה</h2><span style="width:32px;flex:0 0 auto;"></span></div><p class="mp-hint" id="rsHint">כל ההגדרות והנתונים יימחקו והאפליקציה תחזור למצב התחלתי.</p><button class="mp-confirm" id="rsBtn" style="background:#d23b30">אפס</button></div>';
  document.body.appendChild(ov);requestAnimationFrame(()=>ov.classList.add('show'));
  const close=()=>{ov.classList.remove('show');setTimeout(()=>ov.remove(),260);};
  ov.querySelector('.sheet-x').onclick=close;ov.addEventListener('click',e=>{if(e.target===ov)close();});
  let stage=1;
  ov.querySelector('#rsBtn').onclick=()=>{if(stage===1){stage=2;ov.querySelector('#rsHint').textContent='בטוח לחלוטין? הפעולה בלתי הפיכה.';ov.querySelector('#rsBtn').textContent='כן, אפס סופית';}else{doReset();}};
}
function homeEnter(){const h=document.getElementById('home');if(!h)return;h.style.zIndex='75';h.classList.remove('enter');void h.offsetWidth;h.classList.add('enter');setTimeout(()=>{h.classList.remove('enter');h.style.zIndex='';},560);}
function closeScreen(sc){if(!sc)return;sc.classList.remove('show');setTimeout(()=>sc.remove(),560);homeEnter();}
function goHome(){
  const scr=document.querySelectorAll('.scr');
  if(scr.length){scr.forEach(s=>{s.classList.remove('show');setTimeout(()=>s.remove(),560);});homeEnter();}
  closeSheet();closeSearch();
}
function foldPaletteRow(pb){const sw=[...pb.querySelectorAll('.pal-sw')];const n=sw.length;sw.forEach((s,i)=>{s.style.transitionDelay=((n-1-i)*0.04).toFixed(2)+'s';s.style.transform='scale(0)';});setTimeout(()=>{if(pb&&pb.parentNode)pb.remove();},60+n*40+300);}
function openPaletteRow(itemEl){
  const bar=document.querySelector('.hbar');if(!bar)return;
  const ex=bar.querySelector('.palbar');if(ex){ex.remove();return;}
  const lh=(cfg.hand==='left');
  const rect=itemEl.getBoundingClientRect();
  const sgn=lh?1:-1;
  const D=0.7071, cxi=rect.left+rect.width/2, cyi=rect.top+rect.height/2;
  const OFFSET=54, STEP=40, SW=34;
  const baseX=cxi+(-sgn*D)*OFFSET, baseY=cyi+(D)*OFFSET;
  const dx=sgn*D, dy=D;
  const pb=document.createElement('div');pb.className='palbar';
  pb.innerHTML=PALETTES.map((p,i)=>{
    const x=Math.round(baseX+dx*i*STEP-SW/2), y=Math.round(baseY+dy*i*STEP-SW/2);
    return `<button class="pal-sw${i===cfg.palette?' on':''}" data-i="${i}" style="left:${x}px;top:${y}px;transition-delay:${(i*0.03).toFixed(2)}s;background:linear-gradient(180deg,${p.top},${p.bot})" aria-label="${escapeHtml(p.name)}"></button>`;
  }).join('');
  bar.appendChild(pb);
  requestAnimationFrame(()=>pb.classList.add('show'));
  pb.querySelectorAll('.pal-sw').forEach(b=>b.onclick=(e)=>{e.stopPropagation();cfg.palette=+b.dataset.i;applyPalette(cfg.palette);saveCfg();if(navigator.vibrate)navigator.vibrate(6);foldPaletteRow(pb);setTimeout(()=>closeHbar(),200);});
}
function closeHbar(cb){
  const bd=document.querySelector('.hbar-backdrop');if(!bd)return;
  const bar=bd.querySelector('.hbar');if(bar&&bar.classList.contains('closing'))return;
  if(bar){bar.classList.remove('run');bar.classList.add('closing');}
  bd.style.transition='background .45s ease .28s';
  bd.classList.remove('show');
  menuFab.classList.remove('open');setFab(false);
  setTimeout(()=>{bd.remove();if(typeof cb==='function')cb();},780);
}
function openHbar(){
  if(document.querySelector('.hbar-backdrop'))return;
  const items=[
    {ic:ICON.home,     label:'בית',              fn:goHome},
    {ic:ICON.search,   label:'חיפוש',            fn:openSearch},
    {ic:ICON.shareapp, label:'שיתוף',            fn:openSettings},
    {ic:ICON.palette,  label:'פלטת צבעים',       pal:true},
    {ic:(cfg.hand==='left'?ICON.phoneL:ICON.phoneR), label:(cfg.hand==='left'?'יד ימין':'יד שמאל'), hand:1},
    {ic:'<svg viewBox="72 34 102 102" fill="none" stroke="currentColor"><g transform="translate(96 86) rotate(28) scale(0.8)" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"><line x1="0" y1="-52" x2="0" y2="-4"/><path d="M-12 4 H12 L22 42 Q0 50 -22 42 Z" stroke-width="6"/><line x1="-4" y1="9" x2="-8" y2="44" stroke-width="4"/><line x1="6" y1="9" x2="10" y2="44" stroke-width="4"/></g><rect x="86.5" y="79" width="18" height="9" rx="4" transform="rotate(28 95 83)" fill="currentColor"/><g fill="currentColor"><circle cx="110" cy="126" r="6"/><circle cx="128" cy="126" r="5"/><circle cx="146" cy="126" r="4"/></g></svg>', label:'סדר פסח', fn:openSeder, big:1}
  ];
  const n=items.length;
  const lh = (cfg.hand==='left');
  const posProp = lh ? 'left' : 'right';
  const dirX = lh ? -1 : 1;
  const cxFab = lh ? (window.innerWidth-43) : 43;
  const cyFab = 53;
  const ang = 45*Math.PI/180;
  const L = 70;
  const vStep = L*Math.sin(ang);
  const hStep = L*Math.cos(ang);
  const bd=document.createElement('div');bd.className='hbar-backdrop';
  const bar=document.createElement('div');bar.className='hbar'+(lh?' hand-left':'');
  bar.innerHTML=items.map((it,i)=>{
    const k=i+1;
    const cx=cxFab+dirX*k*hStep, cy=cyFab+k*vStep;
    const off=Math.round(lh ? (cx-25) : (window.innerWidth-cx-25));
    const bottom=Math.round(cy-25);
    const dur=(0.62+i*0.09).toFixed(2), cdur=(0.42+i*0.05).toFixed(2);
    return `<button class="hm-item" style="${posProp}:${off}px;bottom:${bottom}px;--dur:${dur}s;--cdur:${cdur}s;--i:${i};--r:${n-1-i}" data-i="${i}"${it.cycle?' data-cycle="1"':""}><span class="hm-ic${it.big?' big':''}">${it.ic}</span><span class="hm-label">${escapeHtml(it.label)}</span></button>`;
  }).join('');
  bd.appendChild(bar);document.body.appendChild(bd);
  menuFab.classList.add('open');setFab(true);
  const fab=document.getElementById('menuFab');
  const fr=fab.getBoundingClientRect();
  const fcx=fr.left+fr.width/2, fcy=fr.top+fr.height/2;
  bar.querySelectorAll('.hm-item').forEach(el=>{
    const ic=el.querySelector('.hm-ic');
    const ir=ic.getBoundingClientRect(), er=el.getBoundingClientRect();
    const icx=ir.left+ir.width/2, icy=ir.top+ir.height/2;
    el.style.setProperty('--sx',Math.round(fcx-icx)+'px');
    el.style.setProperty('--sy',Math.round(fcy-icy)+'px');
    el.style.transformOrigin=Math.round(icx-er.left)+'px '+Math.round(icy-er.top)+'px';
  });
  requestAnimationFrame(()=>{bd.classList.add('show');bar.classList.add('run');});
  const close=cb=>closeHbar(cb);
  bd.addEventListener('click',e=>{if(e.target===bd||e.target===bar)close();});
  bar.querySelectorAll('.hm-item').forEach(b=>{b.onclick=()=>{if(bar.classList.contains('closing'))return;const it=items[+b.dataset.i];if(it.pal){if(navigator.vibrate)navigator.vibrate(8);b.classList.remove('tapped');void b.offsetWidth;b.classList.add('tapped');setTimeout(()=>b.classList.remove('tapped'),200);openPaletteRow(b);return;}if(it.hand){if(navigator.vibrate)navigator.vibrate(10);b.classList.add('tapped');closeHbar();setTimeout(doHandFlip,800);return;}if(it.cycle){it.fn();paintCycleCoin(b.querySelector('.hm-ic'));b.classList.remove('tapped');void b.offsetWidth;b.classList.add('tapped');setTimeout(()=>b.classList.remove('tapped'),200);if(navigator.vibrate)navigator.vibrate(8);return;}b.classList.add('tapped');if(navigator.vibrate)navigator.vibrate(10);closeHbar();setTimeout(it.fn,210);};});
}
const welcomeEl=document.getElementById('welcome');
function hideWelcome(){welcomeEl.classList.add('hide');}
document.getElementById('welSample').onclick=()=>{localStorage.setItem('myshare_onboarded','1');hideWelcome();};
document.getElementById('welGoogle').onclick=()=>{localStorage.setItem('myshare_onboarded','1');hideWelcome();toast('סנכרון מ‑Google יחובר בגרסת האנדרואיד');};
if(!localStorage.getItem('myshare_onboarded'))welcomeEl.classList.remove('hide');
