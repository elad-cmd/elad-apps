<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Z_Sweep</title>
<meta name="theme-color" content="#14231F">
<link rel="manifest" href="myshare.webmanifest">
<link rel="icon" type="image/png" sizes="64x64" href="myshare-favicon-64.png">
<link rel="icon" type="image/png" sizes="192x192" href="myshare-192.png">
<link rel="apple-touch-icon" href="myshare-apple-180.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Z_Sweep">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap">
<style>
  :root{
    --tq:#7BBFC0; --tq-deep:#00C2A8; --tq-ink:#1E5A64; --white:#ffffff; --tq-top:#0C2A2B; --tq-bot:#1C4B4D;
    --soft:#EAF5F4; --dim:rgba(8,40,42,.42);
    /* ---- Sweep design tokens (single source of truth) ---- */
    --bg:#14231F; --bg-2:#101E1A;
    --surface:#1E332C; --surface-2:#274139;
    --line:rgba(255,255,255,.05); --line-strong:rgba(255,255,255,.10);
    --accent:#19B597; --accent-deep:#0E8A72; --accent-ink:#04241C;
    --avatar-bg:#254541; --avatar-ink:#79D9C2;
    --text:#EAF3F1; --text-2:#93A8A2; --text-3:#647873;
    --late:#E0A45C; --late-bg:rgba(224,164,92,.14); --ok:#33C6A6; --ok-bg:rgba(51,198,166,.14);
    --today:#E0A45C; --today-bg:rgba(224,164,92,.10);
    --call-out:#4FA588; --call-in:#9BB0AA; --call-missed:#D98A6E;
    --r-lg:22px; --r-md:16px; --r-sm:12px;
    font-family:'Heebo',system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;}
  html{background:var(--bg);}
  body{background:var(--bg);color:var(--text);overflow:hidden;-webkit-user-select:none;user-select:none;touch-action:none;}

  .top{padding:16px 18px 6px;}
  .top h1{font-size:18px;font-weight:700;letter-spacing:-.2px;}
  .brand{text-align:center;line-height:1;margin:4px 0 2px;}
  .logo{display:inline-flex;align-items:center;justify-content:center;gap:11px;height:40px;direction:ltr;vertical-align:middle;}
  .logo .word{font-size:26px;font-weight:300;letter-spacing:.5px;color:var(--text);}
  .logo .dots{position:relative;width:24px;height:24px;}
  .logo .dots span{position:absolute;border-radius:50%;background:var(--accent);}
  .logo .dots span:nth-child(1){left:0;bottom:0;width:4px;height:4px;opacity:.40;}
  .logo .dots span:nth-child(2){left:9px;bottom:9px;width:5.5px;height:5.5px;opacity:.70;}
  .logo .dots span:nth-child(3){left:17px;bottom:17px;width:7.5px;height:7.5px;opacity:1;}
  .seg{margin-top:12px;display:flex;width:100%;gap:0;position:relative;z-index:6;background:var(--surface);border-radius:16px;padding:5px;}
  .seg-ind{position:absolute;top:5px;bottom:5px;left:5px;width:30%;background:var(--accent);border-radius:12px;z-index:0;transition:left .28s cubic-bezier(.22,1,.36,1), width .28s cubic-bezier(.22,1,.36,1);}
  .seg-btn{flex:1;position:relative;z-index:1;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--text-2);padding:9px 0;border-radius:12px;cursor:pointer;transition:color .2s;}
  .seg-btn svg{width:22px;height:22px;}
  .seg-btn.on{color:var(--accent-ink);}
  .scr{position:fixed;inset:0;z-index:70;background:var(--bg);color:var(--text);transform:translateX(100%);transition:transform .52s cubic-bezier(.34,1.45,.5,1);display:flex;flex-direction:column;}
  .scr.show{transform:none;}
  .scr-head{display:flex;align-items:center;gap:10px;padding:16px 18px 8px;}
  .scr-head h2{font-size:18px;font-weight:700;flex:1;text-align:center;padding:0 52px;}
  .scr-back{position:absolute;z-index:12;bottom:33px;width:46px;height:46px;border-radius:50%;border:none;background:rgba(255,255,255,.16);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  body.hand-right .scr-back{right:18px;left:auto;}
  body.hand-left .scr-back{left:18px;right:auto;}
  .scr-back svg{width:20px;height:20px;}
  .scr-body{flex:1;overflow-y:auto;padding:6px 18px 90px;}
  .scr.scr-bottom .scr-body{display:flex;flex-direction:column;}
  .scr.scr-bottom .scr-body::before{content:"";margin-top:auto;}
  .scr.ct-scr .scr-body{display:block;justify-content:flex-start;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:120px;}
  .seder-intro{color:rgba(255,255,255,.85);font-size:14px;line-height:1.6;margin:4px 0 18px;}
  .opt{display:flex;align-items:center;gap:14px;width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:16px;margin-bottom:12px;cursor:pointer;color:#fff;font-family:inherit;text-align:right;transition:transform .12s, background .15s;}
  .opt:active{transform:scale(.98);background:rgba(255,255,255,.13);}
  .opt .oic{width:46px;height:46px;border-radius:50%;background:#fff;color:var(--tq-ink);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .opt .oic svg{width:30px;height:30px;}
  .opt .otitle{font-size:16px;font-weight:700;display:block;}
  .opt .odesc{font-size:12.5px;color:rgba(255,255,255,.78);margin-top:2px;display:block;}
  .opt .ostep{margin-inline-start:auto;font-size:12px;font-weight:700;color:var(--tq-ink);background:#fff;border-radius:999px;padding:3px 9px;flex:0 0 auto;}
  .chip{margin-top:8px;display:inline-flex;align-items:center;gap:7px;background:var(--white);color:var(--tq-ink);font-size:12.5px;font-weight:600;padding:5px 12px;border-radius:10px;max-width:100%;}
  .chip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .chip svg{width:15px;height:15px;flex:0 0 auto;}

  .list{position:absolute;inset:84px 0 0 0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;touch-action:pan-y;display:flex;flex-direction:column;align-items:stretch;gap:8px;padding:14px 0 120px;}
  .row{position:relative;flex:0 0 auto;width:100%;height:58px;touch-action:pan-y;transition:opacity .22s ease,background .15s ease;border-radius:var(--r-md);}
  .row:active{background:var(--surface);}
  .row .av{position:absolute;top:50%;transform:translateY(-50%);width:46px;height:46px;border-radius:50%;background:var(--avatar-bg);color:var(--avatar-ink);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;overflow:hidden;touch-action:none;cursor:pointer;}
  .row .late-dot{position:absolute;top:50%;transform:translateY(-50%);width:9px;height:9px;border-radius:50%;background:var(--late);box-shadow:0 0 8px 1px rgba(224,164,92,.85),0 0 2px 0 rgba(224,164,92,.9);pointer-events:none;z-index:4;animation:lateGlow 2.4s ease-in-out infinite;}
  body.hand-right .row .late-dot{left:16px;}
  body.hand-left .row .late-dot{right:16px;}
  @keyframes lateGlow{0%,100%{box-shadow:0 0 8px 1px rgba(224,164,92,.85),0 0 2px 0 rgba(224,164,92,.9);}50%{box-shadow:0 0 12px 2px rgba(224,164,92,1),0 0 3px 0 rgba(224,164,92,1);}}
  .row .av svg{width:22px;height:22px;}
  .av-img{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;object-fit:cover;z-index:1;box-shadow:inset 0 0 0 1px var(--line-strong);}
  .dial-row-new .av{color:var(--accent);}
  body.hand-right .row .av{right:16px;}
  body.hand-left .row .av{left:16px;}
  .row .av.av-miss{box-shadow:0 0 0 2px var(--call-missed);}
  .row .meta{position:absolute;top:50%;transform:translateY(-50%);}
  body.hand-right .row .meta{right:75px;left:44px;text-align:right;}
  body.hand-left .row .meta{left:75px;right:44px;text-align:left;}
  .row .ml{line-height:1.3;}
  .row .nm{display:inline-block;max-width:100%;font-size:16px;font-weight:400;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:bottom;}
  .row .sub{display:inline-block;max-width:100%;font-size:13px;font-weight:400;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:bottom;}
  .row .rowchev{position:absolute;top:50%;transform:translateY(-50%);width:22px;height:22px;color:var(--text-3);pointer-events:none;}
  body.hand-right .row .rowchev{left:16px;}
  body.hand-left .row .rowchev{right:16px;transform:translateY(-50%) scaleX(-1);}
  .row.rec .rowchev{display:none;}
  .ract-ic{display:inline-flex;width:14px;height:14px;vertical-align:-2px;margin-inline-end:5px;}
  .ract-ic svg{width:14px;height:14px;}
  body.picking .row{opacity:.18;}
  body.picking .row.active{opacity:0;}

  .stage{position:fixed;inset:0;z-index:40;pointer-events:none;opacity:0;transition:opacity .34s ease;}
  .stage.show{opacity:1;pointer-events:auto;}
  .stage .veil{position:absolute;inset:0;background:var(--dim);}
  .bigav{position:absolute;z-index:6;width:54px;height:54px;border-radius:50%;background:var(--avatar-bg);border:1.5px solid rgba(255,255,255,.34);color:var(--avatar-ink);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;transform:translate(-50%,-50%);will-change:left,top;box-shadow:0 0 14px 3px rgba(120,232,214,.28), 0 8px 20px -10px rgba(8,50,50,.5);}
  .bigav::after{content:"";position:absolute;inset:-11px;border-radius:50%;background:radial-gradient(circle, rgba(120,232,214,.22) 0%, rgba(120,232,214,0) 70%);filter:blur(5px);z-index:-1;pointer-events:none;}
  .bigname{position:absolute;transform:translate(-50%,0);font-size:14px;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.3);white-space:nowrap;}

  .dirc{position:absolute;width:50px;height:50px;transform:translate(-50%,-50%);animation:coinIn .26s cubic-bezier(.22,1,.36,1) both;}
  @keyframes coinIn{0%{opacity:0;transform:translate(-50%,-50%) scale(.5);}100%{opacity:1;transform:translate(-50%,-50%) scale(1);}}
  .dirc .coin{width:50px;height:50px;border-radius:50%;background:var(--coin-bg,var(--white));color:var(--tq-ink);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 22px -8px rgba(8,50,50,.55);transition:transform .13s ease-out, box-shadow .13s ease-out, background .13s, color .13s;will-change:transform;}
  .dirc .coin svg{width:24px;height:24px;}
  .dirc .lbl{position:absolute;top:50%;right:calc(100% + 10px);transform:translateY(-50%);line-height:1;white-space:nowrap;font-size:12px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.45);}
  .dirc.add .coin{background:var(--white);border:1.6px dashed var(--tq-deep);color:var(--tq-deep);}
  .dirc.hot .coin{background:var(--tq-deep);color:#fff;box-shadow:0 16px 34px -8px rgba(8,50,50,.85);}
  .dirc.bank{width:36px;height:36px;}
  .dirc.bank .coin{width:36px;height:36px;background:transparent;border:1.6px solid rgba(255,255,255,.6);color:rgba(255,255,255,.85);box-shadow:none;}
  .dirc.bank .coin svg{width:17px;height:17px;}
  .dirc.bank.hot .coin{background:var(--tq-deep);border-color:var(--tq-deep);color:#fff;transform:scale(1.12);}
  .dirc.bank .lbl{right:auto;left:50%;top:100%;transform:translate(-50%,5px);background:none;padding:0;}
  .dirc.hot .lbl{opacity:1;font-weight:800;background:var(--tq-deep);color:#fff;padding:3px 9px;border-radius:9px;}


  .fab-menu{position:fixed;bottom:10px;left:16px;right:auto;z-index:95;backface-visibility:hidden;-webkit-backface-visibility:hidden;box-sizing:content-box;width:50px;height:50px;border-radius:50%;border:1px solid var(--line-strong);cursor:pointer;background:var(--surface);color:var(--text-2);box-shadow:none;transition:transform .12s;transform-origin:50% 80%;}
  .dotmorph{position:absolute;inset:0;transform-origin:50% 50%;transition:transform .55s cubic-bezier(.34,1.4,.5,1);}
  .dm{position:absolute;left:0;top:0;width:5px;height:5px;border-radius:50%;background:#fff;transition:transform .5s cubic-bezier(.34,1.4,.5,1);will-change:transform;}
  .fab-menu.left{left:auto;right:16px;}
  .fab-menu.fab-off{opacity:0;pointer-events:none;}
  .fab-menu:active{transform:scale(.9);}
  .fab-menu svg{width:22px;height:22px;color:#fff;}
  .fab-search{position:fixed;bottom:88px;left:19px;right:auto;z-index:94;width:48px;height:48px;border-radius:50%;border:1.6px solid rgba(255,255,255,.72);cursor:pointer;background:transparent;color:#fff;box-shadow:none;display:flex;align-items:center;justify-content:center;transition:transform .12s ease, opacity .2s ease;}
  .fab-search.left{left:auto;right:19px;}
  .fab-search svg{width:22px;height:22px;color:#fff;}
  .fab-search:active{transform:scale(.9);}
  .fab-search.hidden{opacity:0;pointer-events:none;transform:scale(.5);}
  @keyframes fabHop{
    0%{transform:translate(0,0) scale(1,1);}
    8%{transform:translate(calc(var(--dx)*0.04),5px) scale(1.18,0.84);}
    26%{transform:translate(calc(var(--dx)*0.30),-32px) scale(0.86,1.16);}
    42%{transform:translate(calc(var(--dx)*0.52),3px) scale(1.18,0.84);}
    58%{transform:translate(calc(var(--dx)*0.70),-20px) scale(0.9,1.12);}
    72%{transform:translate(calc(var(--dx)*0.85),3px) scale(1.14,0.88);}
    87%{transform:translate(calc(var(--dx)*0.96),-9px) scale(0.96,1.05);}
    100%{transform:translate(var(--dx),0) scale(1,1);}
  }

  .hbar-backdrop{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,0);transition:background .45s ease;}
  .hbar-backdrop.show{background:rgba(0,0,0,.92);}
  .hbar{position:fixed;inset:0;z-index:91;pointer-events:none;}
  .hm-item{position:absolute;pointer-events:auto;background:none;border:none;cursor:pointer;width:50px;height:50px;padding:0;opacity:0;}
  .hbar.run .hm-item{animation:hmIn var(--dur,.5s) linear both;}
  .hbar.closing .hm-item{animation:hmOut var(--cdur,.4s) cubic-bezier(.5,.04,.7,.32) both;animation-delay:calc(var(--r,0)*.04s);}
  @keyframes hmIn{
    0%{opacity:0.00;transform:translate(calc(var(--sx,0px) * 1.0000),calc(var(--sy,0px) * 1.0000)) scale(0.600);}
    4.5%{opacity:0.25;transform:translate(calc(var(--sx,0px) * 0.8972),calc(var(--sy,0px) * 0.8972)) scale(0.641);}
    9.1%{opacity:0.51;transform:translate(calc(var(--sx,0px) * 0.6689),calc(var(--sy,0px) * 0.6689)) scale(0.732);}
    13.6%{opacity:0.76;transform:translate(calc(var(--sx,0px) * 0.4112),calc(var(--sy,0px) * 0.4112)) scale(0.836);}
    18.2%{opacity:1.00;transform:translate(calc(var(--sx,0px) * 0.1851),calc(var(--sy,0px) * 0.1851)) scale(0.926);}
    22.7%{opacity:1.00;transform:translate(calc(var(--sx,0px) * 0.0197),calc(var(--sy,0px) * 0.0197)) scale(0.992);}
    27.3%{opacity:1.00;transform:translate(calc(var(--sx,0px) * -0.0794),calc(var(--sy,0px) * -0.0794)) scale(1.032);}
    31.8%{opacity:1.00;transform:translate(calc(var(--sx,0px) * -0.1216),calc(var(--sy,0px) * -0.1216)) scale(1.049);}
    36.4%{opacity:1.00;transform:translate(calc(var(--sx,0px) * -0.1230),calc(var(--sy,0px) * -0.1230)) scale(1.049);}
    40.9%{opacity:1.00;transform:translate(calc(var(--sx,0px) * -0.1007),calc(var(--sy,0px) * -0.1007)) scale(1.040);}
    45.5%{opacity:1.00;transform:translate(calc(var(--sx,0px) * -0.0689),calc(var(--sy,0px) * -0.0689)) scale(1.028);}
    50%{opacity:1.00;transform:translate(calc(var(--sx,0px) * -0.0375),calc(var(--sy,0px) * -0.0375)) scale(1.015);}
    54.5%{opacity:1.00;transform:translate(calc(var(--sx,0px) * -0.0124),calc(var(--sy,0px) * -0.0124)) scale(1.005);}
    59.1%{opacity:1.00;transform:translate(calc(var(--sx,0px) * 0.0045),calc(var(--sy,0px) * 0.0045)) scale(0.998);}
    63.6%{opacity:1.00;transform:translate(calc(var(--sx,0px) * 0.0133),calc(var(--sy,0px) * 0.0133)) scale(0.995);}
    68.2%{opacity:1.00;transform:translate(calc(var(--sx,0px) * 0.0160),calc(var(--sy,0px) * 0.0160)) scale(0.994);}
    72.7%{opacity:1.00;transform:translate(calc(var(--sx,0px) * 0.0145),calc(var(--sy,0px) * 0.0145)) scale(0.994);}
    77.3%{opacity:1.00;transform:translate(calc(var(--sx,0px) * 0.0109),calc(var(--sy,0px) * 0.0109)) scale(0.996);}
    81.8%{opacity:1.00;transform:translate(calc(var(--sx,0px) * 0.0067),calc(var(--sy,0px) * 0.0067)) scale(0.997);}
    86.4%{opacity:1.00;transform:translate(calc(var(--sx,0px) * 0.0031),calc(var(--sy,0px) * 0.0031)) scale(0.999);}
    90.9%{opacity:1.00;transform:translate(calc(var(--sx,0px) * 0.0004),calc(var(--sy,0px) * 0.0004)) scale(1.000);}
    95.5%{opacity:1.00;transform:translate(calc(var(--sx,0px) * -0.0012),calc(var(--sy,0px) * -0.0012)) scale(1.000);}
    100%{opacity:1.00;transform:translate(calc(var(--sx,0px) * 0.0000),calc(var(--sy,0px) * 0.0000)) scale(1.000);}
  }
  @keyframes hmOut{0%{opacity:1;transform:translate(0,0) scale(1);}18%{transform:translate(0,0) scale(1.08);}100%{opacity:0;transform:translate(var(--sx,0),var(--sy,0)) scale(.4);}}
  .hm-ic{width:50px;height:50px;border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 22px -8px rgba(8,50,50,.6);color:var(--tq-ink);transition:transform .16s cubic-bezier(.34,1.56,.64,1), background .16s ease, color .16s ease;}
  .hm-item.tapped .hm-ic{transform:scale(1.22);background:var(--tq-deep);color:#fff;box-shadow:0 16px 34px -8px rgba(8,50,50,.75);}
  .hm-ic svg{width:23px;height:23px;}
  .hm-ic.big svg{width:34px;height:34px;}
  .hm-label{position:absolute;top:50%;right:56px;transform:translateY(-50%);line-height:1;white-space:nowrap;font-size:13.5px;font-weight:700;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.8),0 0 2px rgba(0,0,0,.5);}
  .palbar{position:fixed;inset:0;z-index:92;pointer-events:none;opacity:0;transition:opacity .2s ease;}
  .palbar.show{opacity:1;}
  .pal-sw{position:absolute;pointer-events:auto;width:34px;height:34px;border-radius:50%;border:2px solid rgba(255,255,255,.6);cursor:pointer;padding:0;box-shadow:0 6px 16px -6px rgba(0,0,0,.55);transform:scale(.5);transition:transform .28s cubic-bezier(.34,1.5,.5,1);}
  .palbar.show .pal-sw{transform:scale(1);}
  .pal-sw.on{border-color:#fff;border-width:3px;}
  .hbar.hand-left .hm-label{right:auto;left:56px;}

  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);max-width:calc(100vw - 28px);text-align:center;background:var(--tq-ink);color:#fff;padding:11px 20px;border-radius:14px;font-weight:600;font-size:14px;z-index:99;opacity:0;transition:opacity .2s;pointer-events:none;box-shadow:0 12px 28px -10px rgba(0,0,0,.4);}
  body.hand-left .toast{left:50%;right:auto;transform:translateX(-50%);}
  .toast.show{opacity:1;}

  .hint{position:fixed;bottom:30px;right:18px;left:84px;text-align:center;font-size:12px;color:rgba(255,255,255,.85);z-index:5;}

  .ovl{position:fixed;inset:0;z-index:60;background:rgba(8,40,42,0);transition:background .2s;display:flex;align-items:flex-end;justify-content:center;pointer-events:none;}
  .ovl.show{background:rgba(8,40,42,.45);pointer-events:auto;}
  .sheet{width:100%;max-width:520px;background:#fff;color:var(--tq-ink);border-radius:22px 22px 0 0;padding:16px 16px 26px;transform:translateY(100%);transition:transform .5s cubic-bezier(.34,1.45,.5,1);max-height:82%;overflow-y:auto;}
  .ovl.show .sheet{transform:translateY(0);}
  .sheet h2{font-size:16px;font-weight:700;margin:2px 0 14px;text-align:center;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}

  #voiceFab svg{width:22px;height:22px;}

  .vc-cancel{background:rgba(255,255,255,.14);border:none;color:#fff;padding:10px 26px;border-radius:22px;font:inherit;font-size:14px;cursor:pointer;}

function dqPhones(p){return (p.phones&&p.phones.length)?p.phones:(p.phone?[p.phone]:[]);}

function dqNoName(p){const n=String(p.name||'').trim();return !n||n==='(ללא שם)';}
function dqNoPhone(p){return !dqPhones(p).filter(x=>String(x).trim()).length;}
function dqNoEmail(p){return !dqEmails(p).filter(x=>String(x).trim()).length;}

function bulkNormalizePhones(){

  PEOPLE.forEach(p=>{let ch=false;const _op=(p.phone||((p.phones&&p.phones[0])||''))||'';const _on=p.name||'';if(p.phone){const v=normIL(p.phone);if(v!==p.phone){p.phone=v;ch=true;}}if(p.phones&&p.phones.length){p.phones=p.phones.map(x=>{const v=normIL(x);if(v!==x)ch=true;return v;});}if(ch){n++;nativeUpdateContact(p,{name:_on,phone:_op});}});

function formatPhone(raw){
  const c=normIL(raw);if(!c)return c;
  if(c.charAt(0)==='+')return c;
  const d=c.replace(/\D/g,'');

const TRIGGER=30, INF=140, MAXB=0, SELECT=80;
const stage=document.getElementById('stage');
let picking=false, cx=0, cy=0, curRow=null, bigEl=null, targets=[];

function buildStage(row){
  [...stage.querySelectorAll('.bigav,.bigname,.dirc')].forEach(e=>e.remove());
  targets=[];
  const r=row.querySelector('.av').getBoundingClientRect();
  cx=r.left+r.width/2; cy=r.top+r.height/2;
  bigEl=document.createElement('div');bigEl.className='bigav';
  bigEl.textContent=row.querySelector('.av').textContent;
  bigEl.style.left=cx+'px';bigEl.style.top=cy+'px';stage.appendChild(bigEl);
  const nm=document.createElement('div');nm.className='bigname';
  nm.textContent=row.querySelector('.nm').textContent;
  nm.style.left=cx+'px';nm.style.top=(cy-48)+'px';stage.appendChild(nm);
  const lh=(cfg.hand==='left');
  const sgn=lh?1:-1;
  const ndx=sgn*0.7071, ndy=0.7071;
  const list=cfg.share.slice(0,3);
  const GAPX=92, STEP=80;
  list.forEach((appId,i)=>{
    const app=byId(appId);
    const el=document.createElement('div');el.className='dirc';
    el.innerHTML=`<div class="coin"${app&&app.c?` style="--coin-bg:${app.c};color:#fff"`:''}>${app?app.ic:ICON.plus}</div><div class="lbl">${app?escapeHtml(app.label):'הוסף'}</div>`;
    const x=cx+sgn*GAPX+ndx*(i*STEP), y=cy+ndy*(i*STEP);
    el.style.left=x+'px';el.style.top=y+'px';stage.appendChild(el);
    targets.push({kind:'app', id:appId, x, y, coinEl:el.querySelector('.coin'), dirc:el});
  });
  const plusEl=document.createElement('div');plusEl.className='dirc bank';
  plusEl.innerHTML='<div class="coin">'+ICON.more+'</div><div class="lbl">עוד</div>';
  const pcx=lh?(window.innerWidth-42):42, pcy=window.innerHeight/2;
  plusEl.style.left=pcx+'px';plusEl.style.top=pcy+'px';stage.appendChild(plusEl);
  targets.push({kind:'app', id:'__bank__', x:pcx, y:pcy, coinEl:plusEl.querySelector('.coin'), dirc:plusEl});
}

function applyProximity(px,py){
  let best=null,bestD=1e9;
  targets.forEach(t=>{
    const d=Math.hypot(px-t.x,py-t.y);
    const ramp=Math.max(0,1-d/INF);
    t.coinEl.style.transform='scale('+(1+MAXB*ramp*ramp).toFixed(3)+')';
    if(d<bestD){bestD=d;best=t;}
  });
  const moved=Math.hypot(px-cx,py-cy);
  const sel=(best && bestD<SELECT && moved>TRIGGER)?best:null;
  targets.forEach(t=>{t.dirc.classList.toggle('hot',(t===sel));});
  return sel;
}

function startPick(row,px,py){
  picking=true;curRow=row;row.classList.add('active');
  stage.style.zIndex=(document.querySelector('.srch.show')||document.querySelector('.scr'))?'95':'';
  document.body.classList.add('picking');buildStage(row);stage.classList.add('show');
  if(navigator.vibrate)navigator.vibrate(12);moveBig(px,py);
}
function moveBig(px,py){if(!bigEl)return;bigEl.style.left=px+'px';bigEl.style.top=py+'px';applyProximity(px,py);}
function resetPick(){stage.classList.remove('show');stage.style.zIndex='';document.body.classList.remove('picking');if(curRow)curRow.classList.remove('active');picking=false;curRow=null;}
function endPick(px,py){
  if(!picking)return;
  const sel=applyProximity(px,py);
  const person=curRow?(curRow._person||CURRENT[+curRow.dataset.i]||{}):{};
  resetPick();
  if(!sel)return;
  if(navigator.vibrate)navigator.vibrate(8);
  if(sel.id==='__bank__'){openShareBank(person);return;}
  if(!sel.id){openShareBank(person);return;}

}
function _ccSplit(d){for(let n=3;n>=1;n--){if(d.length>n&&_CCODES.has(d.slice(0,n)))return [d.slice(0,n),d.slice(n)];}return [d.slice(0,2),d.slice(2)];}
function normIL(p){let s=String(p||'').replace(/[()\s\-]/g,'');if(s.indexOf('+972')===0)return '0'+s.slice(4).replace(/\D/g,'');if(s.charAt(0)==='+'){const d=s.slice(1).replace(/\D/g,'');const r=_ccSplit(d);return '+'+r[0]+(r[1]?('-'+r[1]):'');}return s.replace(/\D/g,'');}
function fire(appId,person){
  const k=statKey(person);if(k){STATS[k]=(STATS[k]||0)+1;saveStats();}
  if(appId==='waze'){openWaze(getAddr(person));return;}
  if(appId==='savecontact'){openAddContact({name:person.name||'',phone:normIL(person.phone||((person.phones&&person.phones[0])||'')),email:(person.email||((person.emails&&person.emails[0])||''))});return;}
  if(appId==='deletecontact'){const nm=person.name||'איש הקשר';uiConfirm('למחוק את «'+nm+'»? יימחק גם מהטלפון/Google.',()=>{nativeDeleteContact(person);savePeople();renderList();if(navigator.vibrate)navigator.vibrate(12);toast('איש הקשר נמחק');});return;}
  logInteraction(person,appId);
  const app=byId(appId);
  if(BRIDGE&&BRIDGE.shareTo){
    try{BRIDGE.shareTo(appId,JSON.stringify({name:person.name||'',phone:person.phone||'',email:person.email||''}),SHARED);}catch(e){}
  }else{fireWeb(appId,person);}
}
function intlDigits(p){let d=String(p||'').replace(/\D/g,'');if(d.charAt(0)==='0')d='972'+d.slice(1);return d;}
function fireWeb(appId,person){
  const text=(typeof SHARED!=='undefined'&&SHARED)?SHARED:'';
  const phoneRaw=(person.phone||((person.phones&&person.phones[0])||'')).replace(/[^0-9+]/g,'');
  const email=person.email||((person.emails&&person.emails[0])||'');
  const enc=encodeURIComponent;
  const go=u=>{try{location.href=u;}catch(e){}};
  const openTab=u=>{let w=null;try{w=window.open(u,'_blank','noopener');}catch(e){}if(!w)go(u);};
  switch(appId){
    case 'whatsapp':{const n=intlDigits(phoneRaw);if(!n){toast('אין מספר טלפון');return;}openTab('https://wa.me/'+n+(text?('?text='+enc(text)):''));return;}
    case 'telegram':{openTab(text?('https://t.me/share/url?url='+enc(text)):'https://t.me');return;}
    case 'sms':{if(!phoneRaw){toast('אין מספר טלפון');return;}const sep=/android/i.test(navigator.userAgent)?'?':'&';go('sms:'+phoneRaw+(text?(sep+'body='+enc(text)):''));return;}
    case 'mail':{go('mailto:'+email+(text?('?body='+enc(text)):''));return;}
    case 'call':{if(!phoneRaw){toast('אין מספר טלפון');return;}if(BRIDGE&&BRIDGE.callNumber){BRIDGE.callNumber(phoneRaw);}else{go('tel:'+phoneRaw);}return;}
    case 'copy':{const c=text||[person.name,phoneRaw,email].filter(Boolean).join(' · ');if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(c).then(()=>toast('הועתק')).catch(()=>toast('לא ניתן להעתיק'));}else{toast('לא ניתן להעתיק');}return;}
    default:{const data={text:text||[person.name,phoneRaw,email].filter(Boolean).join(' · '),title:'שיתוף'};if(navigator.share){navigator.share(data).catch(()=>{});}else if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(data.text).then(()=>toast('הועתק (אין שיתוף ישיר בדפדפן)')).catch(()=>toast('שיתוף לא נתמך'));}else{toast('שיתוף לא נתמך בדפדפן');}return;}
  }
}

function wirePick(container,onTap){
  let pRow=null,pX=0,pY=0,pTimer=0,pStarted=false,tRow=null,tX=0,tY=0;
  const clr=()=>{if(pTimer){clearTimeout(pTimer);pTimer=0;}pRow=null;pStarted=false;};
  container.addEventListener('pointerdown',e=>{const av=e.target.closest('.av');if(av){const row=av.closest('.row');if(!row)return;if(row._person&&row._person._addnew){tRow=row;tX=e.clientX;tY=e.clientY;return;}e.preventDefault();e.stopPropagation();if(document.activeElement&&document.activeElement.blur)document.activeElement.blur();pRow=row;pX=e.clientX;pY=e.clientY;pStarted=false;try{av.setPointerCapture(e.pointerId);}catch(_){}pTimer=setTimeout(()=>{pTimer=0;if(pRow){pStarted=true;startPick(pRow,pX,pY);}},80);}else{tRow=e.target.closest('.row');tX=e.clientX;tY=e.clientY;}});
  container.addEventListener('pointermove',e=>{if(pStarted&&picking){e.preventDefault();moveBig(e.clientX,e.clientY);return;}if(pRow&&!pStarted&&Math.hypot(e.clientX-pX,e.clientY-pY)>10){if(pTimer){clearTimeout(pTimer);pTimer=0;}pStarted=true;startPick(pRow,pX,pY);moveBig(e.clientX,e.clientY);}});
  container.addEventListener('pointerup',e=>{if(pTimer){clearTimeout(pTimer);pTimer=0;}if(pStarted&&picking){e.stopPropagation();endPick(e.clientX,e.clientY);clr();tRow=null;return;}if(pRow){e.stopPropagation();const p=pRow._person||null;clr();tRow=null;if(p&&onTap)onTap(p);return;}if(tRow&&!picking){const dx=e.clientX-tX,dy=e.clientY-tY,r=tRow;tRow=null;if((r._person&&r._person._addnew)||(Math.abs(dx)<8&&Math.abs(dy)<8)){const p=r._person||null;if(p&&onTap)onTap(p);}}});
  container.addEventListener('pointercancel',()=>{if(pTimer){clearTimeout(pTimer);pTimer=0;}if(picking)resetPick();clr();tRow=null;});
}

let plY=0,plBase=0,plOn=false,pullOffset=0,plArmed=false,plVel=0,plLastY=0,plLastT=0,plRAF=0,MAXPULL=600;

listEl.addEventListener('touchstart',e=>{if(editMode||tabLock)return;if(picking||pendStarted||e.target.closest('.av')){plArmed=false;plOn=false;return;}if(plRAF){cancelAnimationFrame(plRAF);plRAF=0;}computeMax();plArmed=(listEl.scrollTop<=0||pullOffset>0);plOn=false;plY=e.touches[0].clientY;plLastY=plY;plLastT=Date.now();plVel=0;plBase=pullOffset;},{passive:true});
listEl.addEventListener('touchmove',e=>{if(!plArmed||picking||pendStarted)return;const cy=e.touches[0].clientY;const dy=cy-plY;if(!plOn){if((dy>4&&listEl.scrollTop<=0)||pullOffset>0){plOn=true;listEl.style.transition='none';}else{if(dy<-2||listEl.scrollTop>0)plArmed=false;return;}}const now=Date.now();const dt=(now-plLastT)||16;plVel=(cy-plLastY)/dt*16;plLastY=cy;plLastT=now;const target=plBase+dy;if(target<=0){setPull(0);plOn=false;plArmed=false;return;}e.preventDefault();setPull(target);},{passive:false});

function buildMyVcardShare(c){
