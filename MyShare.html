<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Z_Sweep</title>
<meta name="theme-color" content="#0C2A2B">
<link rel="manifest" href="myshare.webmanifest">
<link rel="icon" type="image/png" sizes="64x64" href="myshare-favicon-64.png">
<link rel="icon" type="image/png" sizes="192x192" href="myshare-192.png">
<link rel="apple-touch-icon" href="myshare-apple-180.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Z_Sweep">
<style>
  :root{
    --tq:#7BBFC0; --tq-deep:#00C2A8; --tq-ink:#1E5A64; --white:#ffffff; --tq-top:#0C2A2B; --tq-bot:#1C4B4D;
    --soft:#EAF5F4; --line:#e7f0ef; --dim:rgba(8,40,42,.42);
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;}
  html{background:var(--tq-top);}
  body{background:linear-gradient(180deg,var(--tq-top),var(--tq-bot));color:var(--white);overflow:hidden;-webkit-user-select:none;user-select:none;touch-action:none;}

  .top{padding:16px 18px 6px;}
  .top h1{font-size:18px;font-weight:700;letter-spacing:-.2px;}
  .brand{text-align:center;line-height:1;margin:4px 0 2px;}
  .brandlogo{height:38px;width:auto;display:inline-block;vertical-align:middle;filter:drop-shadow(0 2px 14px rgba(0,194,168,.35));}
  .seg{margin-top:10px;display:flex;width:100%;gap:0;position:relative;background:rgba(255,255,255,.1);border-radius:14px;padding:3px;}
  .seg-ind{position:absolute;top:3px;bottom:3px;left:3px;width:30%;background:#fff;border-radius:11px;z-index:0;transition:left .32s cubic-bezier(.22,1,.36,1), width .32s cubic-bezier(.22,1,.36,1);}
  .seg-btn{flex:1;position:relative;z-index:1;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:rgba(255,255,255,.85);padding:9px 0;border-radius:11px;cursor:pointer;transition:color .2s;}
  .seg-btn svg{width:20px;height:20px;}
  .seg-btn.on{color:var(--tq-ink);}
  .scr{position:fixed;inset:0;z-index:70;background:linear-gradient(180deg,var(--tq-top),var(--tq-bot));color:#fff;transform:translateX(100%);transition:transform .52s cubic-bezier(.34,1.45,.5,1);display:flex;flex-direction:column;}
  .scr.show{transform:none;}
  .scr-head{display:flex;align-items:center;gap:10px;padding:16px 18px 8px;}
  .scr-head h2{font-size:18px;font-weight:700;flex:1;}
  .scr-back{position:absolute;z-index:12;bottom:33px;width:46px;height:46px;border-radius:50%;border:none;background:rgba(255,255,255,.16);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  body.hand-right .scr-back{right:18px;left:auto;}
  body.hand-left .scr-back{left:18px;right:auto;}
  .scr-back svg{width:20px;height:20px;}
  .scr-body{flex:1;overflow-y:auto;padding:6px 18px 90px;}
  .scr.scr-bottom .scr-body{display:flex;flex-direction:column;justify-content:flex-end;}
  .seder-intro{color:rgba(255,255,255,.85);font-size:14px;line-height:1.6;margin:4px 0 18px;}
  .opt{display:flex;align-items:center;gap:14px;width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:16px;margin-bottom:12px;cursor:pointer;color:#fff;font-family:inherit;text-align:right;transition:transform .12s, background .15s;}
  .opt:active{transform:scale(.98);background:rgba(255,255,255,.13);}
  .opt .oic{width:46px;height:46px;border-radius:50%;background:#fff;color:var(--tq-ink);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .opt .oic svg{width:30px;height:30px;}
  .opt .otitle{font-size:16px;font-weight:700;display:block;}
  .opt .odesc{font-size:12.5px;color:rgba(255,255,255,.78);margin-top:2px;display:block;}
  .opt .ostep{margin-inline-start:auto;font-size:12px;font-weight:700;color:var(--tq-ink);background:#fff;border-radius:999px;padding:3px 9px;flex:0 0 auto;}
  .chip{margin-top:8px;display:inline-flex;align-items:center;gap:7px;background:var(--white);color:var(--tq-ink);font-size:12.5px;font-weight:600;padding:5px 12px;border-radius:10px;max-width:100%;}
  .chip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .chip svg{width:15px;height:15px;flex:0 0 auto;}

  .list{position:absolute;inset:84px 0 0 0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;touch-action:pan-y;display:flex;flex-direction:column;align-items:stretch;gap:14px;padding:18px 0 120px;}
  .row{position:relative;flex:0 0 auto;width:100%;height:58px;touch-action:pan-y;transition:opacity .22s ease;}
  .row .av{position:absolute;top:50%;transform:translateY(-50%);width:54px;height:54px;border-radius:50%;background:var(--white);color:var(--tq-ink);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;box-shadow:0 8px 18px -10px rgba(8,50,50,.5);touch-action:none;cursor:pointer;}
  .row .av svg{width:24px;height:24px;}
  .dial-row-new .av{color:var(--tq-deep);}
  body.hand-right .row .av{right:14px;}
  body.hand-left .row .av{left:14px;}
  .row .meta{position:absolute;top:50%;transform:translateY(-50%);}
  body.hand-right .row .meta{right:82px;left:16px;text-align:right;}
  body.hand-left .row .meta{left:82px;right:16px;text-align:left;}
  .row .ml{line-height:1.32;}
  .row .nm{display:inline-block;max-width:100%;font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:bottom;}
  .row .sub{display:inline-block;max-width:100%;font-size:12.5px;font-weight:400;color:rgba(255,255,255,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:bottom;}
  body.picking .row{opacity:.18;}
  body.picking .row.active{opacity:0;}

  .stage{position:fixed;inset:0;z-index:40;pointer-events:none;opacity:0;transition:opacity .34s ease;}
  .stage.show{opacity:1;pointer-events:auto;}
  .stage .veil{position:absolute;inset:0;background:var(--dim);}
  .bigav{position:absolute;z-index:6;width:81px;height:81px;border-radius:50%;background:var(--white);border:2.5px solid var(--tq-deep);color:var(--tq-ink);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;transform:translate(-50%,-50%);will-change:left,top;box-shadow:0 0 14px 2px rgba(255,255,255,.18), 0 16px 34px -12px rgba(8,50,50,.6);}
  .bigav::after{content:"";position:absolute;inset:-22px;border-radius:50%;background:radial-gradient(circle, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 70%);filter:blur(6px);z-index:-1;pointer-events:none;}
  .bigname{position:absolute;transform:translate(-50%,0);font-size:14px;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.3);white-space:nowrap;}

  .dirc{position:absolute;width:50px;height:50px;transform:translate(-50%,-50%);animation:coinIn .26s cubic-bezier(.22,1,.36,1) both;}
  @keyframes coinIn{0%{opacity:0;transform:translate(-50%,-50%) scale(.5);}100%{opacity:1;transform:translate(-50%,-50%) scale(1);}}
  .dirc .coin{width:50px;height:50px;border-radius:50%;background:var(--white);color:var(--tq-ink);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 22px -8px rgba(8,50,50,.55);transition:transform .13s ease-out, box-shadow .13s ease-out, background .13s, color .13s;will-change:transform;}
  .dirc .coin svg{width:24px;height:24px;}
  .dirc .lbl{position:absolute;top:50%;right:calc(100% + 10px);transform:translateY(-50%);line-height:1;white-space:nowrap;font-size:12px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.45);}
  .dirc.add .coin{background:var(--white);border:1.6px dashed var(--tq-deep);color:var(--tq-deep);}
  .dirc.hot .coin{background:var(--tq-deep);color:#fff;box-shadow:0 16px 34px -8px rgba(8,50,50,.85);}
  .dirc.bank{width:36px;height:36px;}
  .dirc.bank .coin{width:36px;height:36px;background:transparent;border:1.6px solid rgba(255,255,255,.6);color:rgba(255,255,255,.85);box-shadow:none;}
  .dirc.bank .coin svg{width:17px;height:17px;}
  .dirc.bank.hot .coin{background:var(--tq-deep);border-color:var(--tq-deep);color:#fff;transform:scale(1.12);}
  .dirc.bank .lbl{right:auto;left:50%;top:100%;transform:translate(-50%,5px);background:none;padding:0;}
  .dirc.hot .lbl{opacity:1;font-weight:800;background:var(--tq-deep);color:#fff;padding:3px 9px;border-radius:9px;}


  .fab-menu{position:fixed;bottom:26px;left:16px;right:auto;z-index:95;backface-visibility:hidden;-webkit-backface-visibility:hidden;width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;background:var(--white);color:var(--tq-ink);box-shadow:0 20px 44px 2px rgba(0,0,0,.72), 0 8px 18px rgba(0,0,0,.6);transition:transform .12s;transform-origin:50% 80%;}
  .dotmorph{position:absolute;inset:0;transform-origin:50% 50%;transition:transform .55s cubic-bezier(.34,1.4,.5,1);}
  .dm{position:absolute;left:0;top:0;width:5px;height:5px;border-radius:50%;background:var(--tq-ink);transition:transform .5s cubic-bezier(.34,1.4,.5,1);will-change:transform;}
  .fab-menu.left{left:auto;right:16px;}
  .fab-menu:active{transform:scale(.9);}
  .fab-menu svg{width:24px;height:24px;color:var(--tq-ink);}
  .fab-search{position:fixed;bottom:88px;left:19px;right:auto;z-index:94;width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;background:var(--white);color:var(--tq-ink);box-shadow:0 16px 34px 2px rgba(0,0,0,.6),0 6px 14px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;transition:transform .12s ease, opacity .2s ease;}
  .fab-search.left{left:auto;right:19px;}
  .fab-search svg{width:22px;height:22px;color:var(--tq-ink);}
  .fab-search:active{transform:scale(.9);}
  .fab-search.hidden{opacity:0;pointer-events:none;transform:scale(.5);}
  @keyframes fabHop{
    0%{transform:translate(0,0) scale(1,1);}
    8%{transform:translate(calc(var(--dx)*0.04),5px) scale(1.18,0.84);}
    26%{transform:translate(calc(var(--dx)*0.30),-32px) scale(0.86,1.16);}
    42%{transform:translate(calc(var(--dx)*0.52),3px) scale(1.18,0.84);}
    58%{transform:translate(calc(var(--dx)*0.70),-20px) scale(0.9,1.12);}
    72%{transform:translate(calc(var(--dx)*0.85),3px) scale(1.14,0.88);}
    87%{transform:translate(calc(var(--dx)*0.96),-9px) scale(0.96,1.05);}
    100%{transform:translate(var(--dx),0) scale(1,1);}
  }

  .hbar-backdrop{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,0);transition:background .45s ease;}
  .hbar-backdrop.show{background:rgba(0,0,0,.92);}
  .hbar{position:fixed;inset:0;z-index:91;pointer-events:none;}
  .hm-item{position:absolute;pointer-events:auto;background:none;border:none;cursor:pointer;width:50px;height:50px;padding:0;opacity:0;}
  .hbar.run .hm-item{animation:hmIn var(--dur,.5s) linear both;}
  .hbar.closing .hm-item{animation:hmOut var(--cdur,.4s) cubic-bezier(.5,.04,.7,.32) both;animation-delay:calc(var(--r,0)*.04s);}
  @keyframes hmIn{
    0%{opacity:0.00;transform:translate(calc(var(--sx,0px) * 1.0000),calc(var(--sy,0px) * 1.0000)) scale(0.600);}
    4.5%{opacity:0.25;transform:translate(calc(var(--sx,0px) * 0.8972),calc(var(--sy,0px) * 0.8972)) scale(0.641);}
    9.1%{opacity:0.51;transform:translate(calc(var(--sx,0px) * 0.6689),calc(var(--sy,0px) * 0.6689)) scale(0.732);}
    13.6%{opacity:0.76;transform:translate(calc(var(--sx,0px) * 0.4112),calc(var(--sy,0px) * 0.4112)) scale(0.836);}
    18.2%{opacity:1.00;transform:translate(calc(var(--sx,0px) * 0.1851),calc(var(--sy,0px) * 0.1851)) scale(0.926);}
    22.7%{opacity:1.00;transform:translate(calc(var(--sx,0px) * 0.0197),calc(var(--sy,0px) * 0.0197)) scale(0.992);}
    27.3%{opacity:1.00;transform:translate(calc(var(--sx,0px) * -0.0794),calc(var(--sy,0px) * -0.0794)) scale(1.032);}
    31.8%{opacity:1.00;transform:translate(calc(var(--sx,0px) * -0.1216),calc(var(--sy,0px) * -0.1216)) scale(1.049);}
    36.4%{opacity:1.00;transform:translate(calc(var(--sx,0px) * -0.1230),calc(var(--sy,0px) * -0.1230)) scale(1.049);}
    40.9%{opacity:1.00;transform:translate(calc(var(--sx,0px) * -0.1007),calc(var(--sy,0px) * -0.1007)) scale(1.040);}
    45.5%{opacity:1.00;transform:translate(calc(var(--sx,0px) * -0.0689),calc(var(--sy,0px) * -0.0689)) scale(1.028);}
    50%{opacity:1.00;transform:translate(calc(var(--sx,0px) * -0.0375),calc(var(--sy,0px) * -0.0375)) scale(1.015);}
    54.5%{opacity:1.00;transform:translate(calc(var(--sx,0px) * -0.0124),calc(var(--sy,0px) * -0.0124)) scale(1.005);}
    59.1%{opacity:1.00;transform:translate(calc(var(--sx,0px) * 0.0045),calc(var(--sy,0px) * 0.0045)) scale(0.998);}
    63.6%{opacity:1.00;transform:translate(calc(var(--sx,0px) * 0.0133),calc(var(--sy,0px) * 0.0133)) scale(0.995);}
    68.2%{opacity:1.00;transform:translate(calc(var(--sx,0px) * 0.0160),calc(var(--sy,0px) * 0.0160)) scale(0.994);}
    72.7%{opacity:1.00;transform:translate(calc(var(--sx,0px) * 0.0145),calc(var(--sy,0px) * 0.0145)) scale(0.994);}
    77.3%{opacity:1.00;transform:translate(calc(var(--sx,0px) * 0.0109),calc(var(--sy,0px) * 0.0109)) scale(0.996);}
    81.8%{opacity:1.00;transform:translate(calc(var(--sx,0px) * 0.0067),calc(var(--sy,0px) * 0.0067)) scale(0.997);}
    86.4%{opacity:1.00;transform:translate(calc(var(--sx,0px) * 0.0031),calc(var(--sy,0px) * 0.0031)) scale(0.999);}
    90.9%{opacity:1.00;transform:translate(calc(var(--sx,0px) * 0.0004),calc(var(--sy,0px) * 0.0004)) scale(1.000);}
    95.5%{opacity:1.00;transform:translate(calc(var(--sx,0px) * -0.0012),calc(var(--sy,0px) * -0.0012)) scale(1.000);}
    100%{opacity:1.00;transform:translate(calc(var(--sx,0px) * 0.0000),calc(var(--sy,0px) * 0.0000)) scale(1.000);}
  }
  @keyframes hmOut{0%{opacity:1;transform:translate(0,0) scale(1);}18%{transform:translate(0,0) scale(1.08);}100%{opacity:0;transform:translate(var(--sx,0),var(--sy,0)) scale(.4);}}
  .hm-ic{width:50px;height:50px;border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 22px -8px rgba(8,50,50,.6);color:var(--tq-ink);transition:transform .16s cubic-bezier(.34,1.56,.64,1), background .16s ease, color .16s ease;}
  .hm-item.tapped .hm-ic{transform:scale(1.22);background:var(--tq-deep);color:#fff;box-shadow:0 16px 34px -8px rgba(8,50,50,.75);}
  .hm-ic svg{width:23px;height:23px;}
  .hm-ic.big svg{width:34px;height:34px;}
  .hm-label{position:absolute;top:50%;right:56px;transform:translateY(-50%);line-height:1;white-space:nowrap;font-size:13.5px;font-weight:700;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.8),0 0 2px rgba(0,0,0,.5);}
  .palbar{position:fixed;inset:0;z-index:92;pointer-events:none;opacity:0;transition:opacity .2s ease;}
  .palbar.show{opacity:1;}
  .pal-sw{position:absolute;pointer-events:auto;width:34px;height:34px;border-radius:50%;border:2px solid rgba(255,255,255,.6);cursor:pointer;padding:0;box-shadow:0 6px 16px -6px rgba(0,0,0,.55);transform:scale(.5);transition:transform .28s cubic-bezier(.34,1.5,.5,1);}
  .palbar.show .pal-sw{transform:scale(1);}
  .pal-sw.on{border-color:#fff;border-width:3px;}
  .hbar.hand-left .hm-label{right:auto;left:56px;}

  .toast{position:fixed;bottom:96px;left:43px;transform:translateX(-50%);max-width:calc(100vw - 28px);text-align:center;background:var(--tq-ink);color:#fff;padding:11px 20px;border-radius:14px;font-weight:600;font-size:14px;z-index:99;opacity:0;transition:opacity .2s;pointer-events:none;box-shadow:0 12px 28px -10px rgba(0,0,0,.4);}
  body.hand-left .toast{left:auto;right:43px;transform:translateX(50%);}
  .toast.show{opacity:1;}

  .hint{position:fixed;bottom:30px;right:18px;left:84px;text-align:center;font-size:12px;color:rgba(255,255,255,.85);z-index:5;}

  .ovl{position:fixed;inset:0;z-index:60;background:rgba(8,40,42,0);transition:background .2s;display:flex;align-items:flex-end;justify-content:center;pointer-events:none;}
  .ovl.show{background:rgba(8,40,42,.45);pointer-events:auto;}
  .sheet{width:100%;max-width:520px;background:#fff;color:var(--tq-ink);border-radius:22px 22px 0 0;padding:16px 16px 26px;transform:translateY(100%);transition:transform .5s cubic-bezier(.34,1.45,.5,1);max-height:82%;overflow-y:auto;}
  .ovl.show .sheet{transform:translateY(0);}
  .sheet h2{font-size:16px;font-weight:700;margin:2px 0 14px;text-align:center;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .gi{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;background:none;border:none;font-family:inherit;color:var(--tq-ink);}
  .gi .c{width:56px;height:56px;border-radius:50%;background:#bce0d0;display:flex;align-items:center;justify-content:center;color:var(--tq-ink);transition:transform .12s;}
  .gi:active .c{transform:scale(.92);}
  .gi .c svg{width:26px;height:26px;}
  .gi .c.none{background:#fff;border:1.6px dashed #c2d8d7;color:#9bb7b8;}
  .gi span{font-size:11.5px;font-weight:600;}
  .cr-hint{font-size:12.5px;color:#7a9a9b;text-align:center;margin-top:8px;}
  .favdiag{position:relative;width:200px;height:200px;margin:4px auto 2px;}
  .fav-coin{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-family:inherit;padding:0;}
  .fav-c{width:46px;height:46px;border-radius:50%;background:#fff;color:var(--tq-ink);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px -8px rgba(8,50,50,.45);transition:transform .12s;}
  .fav-c svg{width:23px;height:23px;}
  .fav-c.add{border:1.7px dashed var(--tq-deep);color:var(--tq-deep);}
  .fav-coin:active .fav-c{transform:scale(.9);}
  .fav-lbl{font-size:12px;font-weight:700;color:var(--tq-ink);max-width:84px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .fav3-0{left:80%;top:20%;}
  .fav3-1{left:50%;top:50%;}
  .fav3-2{left:20%;top:80%;}
  .sheet-head{display:flex;align-items:center;gap:8px;margin:2px 0 12px;}
  .sheet-x{width:32px;height:32px;flex:0 0 auto;border:none;background:rgba(8,40,42,.08);border-radius:50%;color:var(--tq-ink);cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .sheet-x svg{width:16px;height:16px;}
  .swatches{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;padding:6px 0 2px;}
  .sw{width:52px;height:52px;border-radius:50%;cursor:pointer;border:2.5px solid rgba(255,255,255,.55);box-shadow:0 6px 16px -6px rgba(0,0,0,.6);transition:transform .12s, border-color .12s;}
  .sw.on{border-color:#fff;border-width:3.5px;transform:scale(1.06);}
  .sw:active{transform:scale(.92);}
  .ovl.preview.show{background:transparent;backdrop-filter:none;-webkit-backdrop-filter:none;}
  .ovl.preview .sheet{background:transparent;box-shadow:none;color:#fff;}
  .ovl.bare.show{background:rgba(5,20,21,.93);}
  .ovl.bare .sheet{background:transparent;box-shadow:none;padding:0 16px 30px;}
  .ovl.bare .sheet h2{color:#fff;text-shadow:0 1px 8px rgba(0,0,0,.55);}
  .ovl.bare .fav-lbl{color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.5);}
  .ovl.bare .cr-hint{color:rgba(255,255,255,.82);}
  .ovl.bare .sheet-x{background:rgba(255,255,255,.2);color:#fff;}

function azScrub(clientY){

  const idx=Math.floor(fr*azLetters.length);

  azbar.querySelectorAll('.azl').forEach((s,k)=>s.classList.toggle('on',k===idx));
  const ci=azMap[L];const row=listEl.querySelector('.row[data-i="'+ci+'"]');

/* ===== רשימות לפי כלל ===== */
function personText(p){
  const parts=[p.name,p.org,p.msg];
  if(p.phones&&p.phones.length)parts.push(p.phones.join(' '));else if(p.phone)parts.push(p.phone);
  if(p.emails&&p.emails.length)parts.push(p.emails.join(' '));else if(p.email)parts.push(p.email);
  parts.push(getAddr(p));
  try{getFields(p).forEach(f=>{parts.push(f.l);parts.push(f.v);});}catch(e){}
  return parts.filter(Boolean).join(' ').toLowerCase();
}

/* ===== איכות נתונים (רשימות מיוחדות) ===== */
function dqPhones(p){return (p.phones&&p.phones.length)?p.phones:(p.phone?[p.phone]:[]);}
function dqEmails(p){return (p.emails&&p.emails.length)?p.emails:(p.email?[p.email]:[]);}

function dqNoPhone(p){return !dqPhones(p).filter(x=>String(x).trim()).length;}
function dqNoEmail(p){return !dqEmails(p).filter(x=>String(x).trim()).length;}

function bulkNormalizePhones(){

const TRIGGER=30, INF=140, MAXB=0, SELECT=80;
const stage=document.getElementById('stage');
let picking=false, cx=0, cy=0, curRow=null, bigEl=null, targets=[];

function buildStage(row){
  [...stage.querySelectorAll('.bigav,.bigname,.dirc')].forEach(e=>e.remove());
  targets=[];
  const r=row.querySelector('.av').getBoundingClientRect();
  cx=r.left+r.width/2; cy=r.top+r.height/2;
  bigEl=document.createElement('div');bigEl.className='bigav';
  bigEl.textContent=row.querySelector('.av').textContent;
  bigEl.style.left=cx+'px';bigEl.style.top=cy+'px';stage.appendChild(bigEl);
  const nm=document.createElement('div');nm.className='bigname';
  nm.textContent=row.querySelector('.nm').textContent;
  nm.style.left=cx+'px';nm.style.top=(cy-62)+'px';stage.appendChild(nm);
  const lh=(cfg.hand==='left');
  const sgn=lh?1:-1;
  const ndx=sgn*0.7071, ndy=0.7071;
  const list=cfg.share.slice(0,3);
  const GAPX=92, STEP=80;
  list.forEach((appId,i)=>{
    const app=byId(appId);
    const el=document.createElement('div');el.className='dirc';
    el.innerHTML=`<div class="coin">${app?app.ic:ICON.plus}</div><div class="lbl">${app?escapeHtml(app.label):'הוסף'}</div>`;
    const x=cx+sgn*GAPX+ndx*(i*STEP), y=cy+ndy*(i*STEP);
    el.style.left=x+'px';el.style.top=y+'px';stage.appendChild(el);
    targets.push({kind:'app', id:appId, x, y, coinEl:el.querySelector('.coin'), dirc:el});
  });
  const plusEl=document.createElement('div');plusEl.className='dirc bank';
  plusEl.innerHTML='<div class="coin">'+ICON.more+'</div><div class="lbl">עוד</div>';
  const pcx=lh?(window.innerWidth-42):42, pcy=window.innerHeight/2;
  plusEl.style.left=pcx+'px';plusEl.style.top=pcy+'px';stage.appendChild(plusEl);
  targets.push({kind:'app', id:'__bank__', x:pcx, y:pcy, coinEl:plusEl.querySelector('.coin'), dirc:plusEl});
}

function applyProximity(px,py){
  let best=null,bestD=1e9;
  targets.forEach(t=>{
    const d=Math.hypot(px-t.x,py-t.y);
    const ramp=Math.max(0,1-d/INF);
    t.coinEl.style.transform='scale('+(1+MAXB*ramp*ramp).toFixed(3)+')';
    if(d<bestD){bestD=d;best=t;}
  });
  const moved=Math.hypot(px-cx,py-cy);
  const sel=(best && bestD<SELECT && moved>TRIGGER)?best:null;
  targets.forEach(t=>{t.dirc.classList.toggle('hot',(t===sel));});
  return sel;
}

  document.body.classList.add('picking');buildStage(row);stage.classList.add('show');

function flipFirstContacts(newHand,n){   // PHASE B: cascade the first N on-screen contacts across (accordion)

  const items=[];

  if(!items.length){
    document.body.classList.toggle('hand-left',newHand==='left');
    document.body.classList.toggle('hand-right',newHand!=='left');
    return;
  }
  const first=items.map(o=>{o.el.style.transition='none';o.el.style.transform='';return o.el.getBoundingClientRect();});
  document.body.classList.toggle('hand-left',newHand==='left');
  document.body.classList.toggle('hand-right',newHand!=='left');

  items.forEach((o,k)=>{const dx=first[k].left-last[k].left;o.el.style.transform=o.el.classList.contains('av')?('translate('+dx+'px,-50%)'):('translateX('+dx+'px)');});

function normEmail(e){return String(e||'').trim().toLowerCase();}
function normPhone(p){const d=String(p||'').replace(/\D/g,'');return d.length>=7?d.slice(-9):'';}
function normName(n){try{return String(n||'').toLowerCase().replace(/[^\p{L}\p{N}\s]/gu,'').trim().split(/\s+/).filter(Boolean).sort().join(' ');}catch(e){return String(n||'').toLowerCase().replace(/[^a-z0-9\u0590-\u05ff\s]/g,'').trim().split(/\s+/).filter(Boolean).sort().join(' ');}}
function personDetails(p){const ph=(p.phones&&p.phones.length)?p.phones:(p.phone?[p.phone]:[]);const em=(p.emails&&p.emails.length)?p.emails:(p.email?[p.email]:[]);return [...new Set([...ph,...em].filter(Boolean))];}
function computeMergeGroups(){
  const recs=PEOPLE.slice();
  const parent=recs.map((_,i)=>i);
  const find=x=>{while(parent[x]!==x){parent[x]=parent[parent[x]];x=parent[x];}return x;};
  const uni=(a,b)=>{parent[find(a)]=find(b);};
  const byKey={};
  const link=(k,i)=>{if(!k)return;if(byKey[k]!==undefined)uni(byKey[k],i);else byKey[k]=i;};
  recs.forEach((r,i)=>{
    const ph=(r.phones&&r.phones.length)?r.phones:[r.phone];
    const em=(r.emails&&r.emails.length)?r.emails:[r.email];
    ph.forEach(p=>{const k=normPhone(p);if(k)link('p:'+k,i);});
    em.forEach(e=>{const k=normEmail(e);if(k)link('e:'+k,i);});
    const nk=normName(r.name);if(nk)link('n:'+nk,i);
  });
  const groups={};
  recs.forEach((r,i)=>{const root=find(i);(groups[root]=groups[root]||[]).push(r);});
  return Object.values(groups).filter(g=>g.length>=2);
}

function _csvSplit(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"'){if(q&&l[i+1]==='"'){c+='"';i++;}else q=!q;}else if(ch===','&&!q){r.push(c);c='';}else c+=ch;}r.push(c);return r;}
function parseCSVContacts(t){const lines=t.split(/\r?\n/).filter(x=>x.trim());if(!lines.length)return[];const hdr=_csvSplit(lines[0]).map(h=>h.toLowerCase().trim());const find=(...keys)=>hdr.findIndex(h=>keys.some(k=>h.includes(k)));const iName=find('name','שם'),iGiven=find('given','first'),iFamily=find('family','last'),iPhone=find('phone','tel','mobile','טלפון','נייד'),iEmail=find('mail','דוא'),iOrg=find('organization','company','חברה','ארגון');const out=[];for(let i=1;i<lines.length;i++){const c=_csvSplit(lines[i]);const g=(x)=>x>=0&&c[x]?c[x].trim():'';let name=g(iName);if(!name)name=(g(iGiven)+' '+g(iFamily)).trim();const ph=g(iPhone),em=g(iEmail),org=g(iOrg);if(name||ph||em)out.push({name:name||'(ללא שם)',phone:ph,email:em,org:org,msg:'',fav:false,last:0});}return out;}
function qpDecode(str){const b=[];for(let i=0;i<str.length;i++){const c=str[i];if(c==='='){const h=str.substr(i+1,2);if(/^[0-9A-Fa-f]{2}$/.test(h)){b.push(parseInt(h,16));i+=2;}else b.push(c.charCodeAt(0));}else b.push(c.charCodeAt(0));}try{return new TextDecoder('utf-8').decode(new Uint8Array(b));}catch(e){return str;}}
function splitVCards(t){const out=[];const re=/BEGIN:VCARD[\s\S]*?END:VCARD/gi;let m;while((m=re.exec(t)))out.push(m[0]);return out;}
function parseVBlock(block){
  const phys=block.split(/\r\n|\n/);const L=[];
  for(const ln of phys){if((ln.startsWith(' ')||ln.startsWith('\t'))&&L.length)L[L.length-1]+=ln.slice(1);else L.push(ln);}
  const L2=[];for(let i=0;i<L.length;i++){let line=L[i];if(/quoted-printable/i.test(line)){while(line.endsWith('=')&&i+1<L.length)line=line.slice(0,-1)+L[++i];}L2.push(line);}
  const rec={emails:[],phones:[],name:'',org:''};let fn='',nf='';
  for(const line of L2){const ci=line.indexOf(':');if(ci<0)continue;const left=line.slice(0,ci),val=line.slice(ci+1);
    const segs=left.split(';');const prop=segs[0].toUpperCase();const isQP=segs.slice(1).some(p=>/quoted-printable/i.test(p));const dec=v=>isQP?qpDecode(v):v;
    if(prop==='FN')fn=dec(val).trim();else if(prop==='N')nf=dec(val);
    else if(prop==='EMAIL'){const e=val.trim();if(e)rec.emails.push(e);}
    else if(prop==='TEL'){const t=val.trim();if(t)rec.phones.push(t);}
    else if(prop==='ORG')rec.org=dec(val).split(';').filter(Boolean).join(' ').trim();}
  if(fn)rec.name=fn;else if(nf){const p=nf.split(';');rec.name=[p[1]||'',p[2]||'',p[0]||''].map(s=>s.trim()).filter(Boolean).join(' ');}
  rec.email=rec.emails[0]||'';rec.phone=rec.phones[0]||'';return rec;
}
function parseVCards(t){const out=[];splitVCards(t).forEach(b=>{const r=parseVBlock(b);if(r.name||r.phone||r.email)out.push({name:r.name||'(ללא שם)',phone:r.phone,email:r.email,org:r.org,phones:r.phones,emails:r.emails,msg:'',fav:false,last:0});});return out;}
