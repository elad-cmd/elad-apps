<!doctype html>
<html lang="he" dir="rtl"><head><meta charset="utf-8"><title>Sweep · עורך</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Assistant:wght@400;600;700&display=swap">
<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:#2b3036;font-family:'Assistant',system-ui,sans-serif;color:#e7ecf0;overflow:hidden}
.app{display:flex;height:100vh}
/* ===== side toolbar ===== */
.side{width:226px;flex:0 0 226px;background:#21262b;border-left:1px solid #14171a;display:flex;flex-direction:column;height:100vh}
.side .brand{padding:12px 14px;font-family:'Poppins';font-weight:800;font-size:18px;color:#fff;letter-spacing:.5px;border-bottom:1px solid #14171a}
.side .brand small{font-family:'Assistant';font-weight:600;font-size:11px;color:#8b95a0;display:block;letter-spacing:0}
.tabs{display:flex;gap:2px;padding:8px 8px 0}
.tabs button{flex:1;background:#2b3036;color:#cfd6dd;border:1px solid #353c43;border-bottom:none;border-radius:8px 8px 0 0;padding:8px 4px;font-size:12.5px;cursor:pointer}
.tabs button.on{background:#323a41;color:#fff;border-color:#46505a}
.panel{flex:1;overflow:auto;padding:12px;border-top:1px solid #46505a;margin-top:-1px}
.tabpane{display:none;flex-direction:column;gap:10px}
.tabpane.on{display:flex}
.grp{display:flex;flex-wrap:wrap;gap:6px}
.lbl{font-size:11px;color:#8b95a0;margin:2px 0 -2px}
button.tool{background:#323a41;color:#fff;border:1px solid #46505a;border-radius:8px;padding:8px 10px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}
button.tool:hover{background:#3a434b}
button.tool.on{background:#2aa8ff;border-color:#2aa8ff;color:#fff}
button.tool.wide{width:100%;justify-content:center}
input[type=range]{width:100%;accent-color:#2aa8ff}
input[type=color]{width:38px;height:30px;border:1px solid #46505a;border-radius:8px;background:#323a41;cursor:pointer;padding:2px}
.row{display:flex;align-items:center;gap:8px}
.foot{border-top:1px solid #14171a;padding:8px;display:flex;flex-direction:column;gap:8px}
.foot .row{justify-content:space-between}
.swatch{width:24px;height:24px;border-radius:6px;border:2px solid #fff;cursor:pointer}
.swatches{display:flex;flex-wrap:wrap;gap:5px}
/* ===== canvas ===== */
.main{flex:1;display:flex;flex-direction:column;height:100vh;min-width:0}
.topbar{height:42px;flex:0 0 42px;background:#262c31;border-bottom:1px solid #14171a;display:flex;align-items:center;gap:10px;padding:0 12px;font-size:13px;color:#aeb7bf}
.topbar .sp{flex:1}
.topbar button{background:#323a41;color:#fff;border:1px solid #46505a;border-radius:7px;padding:5px 10px;font-size:13px;cursor:pointer}
.topbar button:hover{filter:brightness(1.12)}
.wrap{flex:1;overflow:auto;display:flex;justify-content:safe center;align-items:flex-start;padding:24px;min-height:0}
.zoomsizer{position:relative}
.stage{position:absolute;top:0;left:0;width:1000px;height:700px;background:#fff;box-shadow:0 18px 50px rgba(0,0,0,.45);container-type:inline-size;overflow:hidden}
.stage.draw{cursor:crosshair}
.svglayer{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2}
.obj{position:absolute;transform-origin:center;cursor:grab;z-index:5;user-select:none;-webkit-user-select:none;touch-action:none}
.stage.draw .obj{pointer-events:none}
.obj.sel{outline:1.5px solid #2aa8ff;outline-offset:2px;z-index:9998!important}
.stage.multi .obj.sel .h{display:none}
.obj .h{position:absolute;width:14px;height:14px;background:#2aa8ff;border:2px solid #fff;border-radius:3px;display:none;z-index:10000;touch-action:none;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.obj.sel .h{display:block}
.h.n{top:-7px;left:50%;margin-left:-7px;cursor:ns-resize}.h.s{bottom:-7px;left:50%;margin-left:-7px;cursor:ns-resize}
.h.e{top:50%;right:-7px;margin-top:-7px;cursor:ew-resize}.h.w{top:50%;left:-7px;margin-top:-7px;cursor:ew-resize}
.h.ne{top:-7px;right:-7px;cursor:nesw-resize}.h.nw{top:-7px;left:-7px;cursor:nwse-resize}
.h.se{bottom:-7px;right:-7px;cursor:nwse-resize}.h.sw{bottom:-7px;left:-7px;cursor:nesw-resize}
.h.rot{top:-30px;left:50%;margin-left:-7px;cursor:grab;background:#2ecc71;border-radius:50%}
.h.rot::before{content:"";position:absolute;left:50%;top:14px;width:2px;height:14px;background:#2ecc71;margin-left:-1px}
.obj svg,.obj img{pointer-events:none;display:block;width:100%;height:100%}
.txt{font-family:'Poppins','Assistant',sans-serif;font-weight:800;color:#1c2330;white-space:nowrap;line-height:1}
.txt.edit{outline:2px dashed #2aa8ff;cursor:text}
.cropframe{position:absolute;border:2px solid #fff;outline:1px solid #000;box-shadow:0 0 0 4000px rgba(0,0,0,.5);z-index:10001;pointer-events:none}
.obj .ch{position:absolute;width:15px;height:15px;background:#111;border:2px solid #fff;z-index:10002;pointer-events:auto}
.ch.n{top:-8px;left:50%;margin-left:-8px;cursor:ns-resize}.ch.s{bottom:-8px;left:50%;margin-left:-8px;cursor:ns-resize}.ch.e{top:50%;right:-8px;margin-top:-8px;cursor:ew-resize}.ch.w{top:50%;left:-8px;margin-top:-8px;cursor:ew-resize}.ch.ne{top:-8px;right:-8px;cursor:nesw-resize}.ch.nw{top:-8px;left:-8px;cursor:nwse-resize}.ch.se{bottom:-8px;right:-8px;cursor:nwse-resize}.ch.sw{bottom:-8px;left:-8px;cursor:nesw-resize}
.marquee{position:absolute;border:1px solid #2aa8ff;background:rgba(42,168,255,.12);z-index:10002;pointer-events:none}
.flash{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#2aa8ff;color:#fff;padding:8px 16px;border-radius:8px;z-index:99;font-size:14px}
</style></head>
<body>
<div class="app">
 <div class="side">
  <div class="brand">Sweep<small>עורך עיצוב</small></div>
  <div class="tabs">
   <button data-tab="arrange" class="on">סדר</button>
   <button data-tab="text">טקסט</button>
   <button data-tab="shapes">צורות</button>
   <button data-tab="draw">ציור</button>
  </div>
  <div class="panel">
   <div class="tabpane on" id="pane-arrange">
    <div class="lbl">בחירה</div>
    <button class="tool wide on" id="tSelect">🖱 כלי בחירה</button>
    <div class="lbl">יישור (2+ אובייקטים)</div>
    <div class="grp">
     <button class="tool" data-al="left" title="שמאל">⇤</button><button class="tool" data-al="cx" title="מרכז">↔</button><button class="tool" data-al="right" title="ימין">⇥</button>
     <button class="tool" data-al="top" title="למעלה">⤒</button><button class="tool" data-al="cy" title="אמצע">↕</button><button class="tool" data-al="bottom" title="למטה">⤓</button>
    </div>
    <div class="lbl">סדר ופעולות</div>
    <div class="grp">
     <button class="tool" id="bFront">קדימה</button><button class="tool" id="bBack">אחורה</button>
     <button class="tool" id="bDup">שכפל</button><button class="tool" id="bDel">מחק</button><button class="tool" id="bCrop">✂ חיתוך</button>
    </div>
   </div>
   <div class="tabpane" id="pane-text">
    <button class="tool wide" id="bAddText">＋ הוסף טקסט</button>
    <div class="lbl">גודל גופן (אובייקט נבחר)</div>
    <input type="range" id="fontRange" min="8" max="200" value="48">
    <div class="lbl">צבע טקסט</div>
    <div class="row"><input type="color" id="textColor" value="#1c2330"><button class="tool" id="textApply">החל על נבחר</button></div>
   </div>
   <div class="tabpane" id="pane-shapes">
    <div class="lbl">הוסף צורה</div>
    <div class="grp">
     <button class="tool" data-shape="rect">⬛ ריבוע</button>
     <button class="tool" data-shape="circle">⬤ עיגול</button>
     <button class="tool" data-shape="tri">▲ משולש</button>
    </div>
    <button class="tool wide" id="bAddImg">🖼 הוסף תמונה</button><input type="file" id="imgFile" accept="image/*" style="display:none">
    <div class="lbl">צבע מילוי</div>
    <div class="row"><input type="color" id="shapeColor" value="#2aa8ff"><button class="tool" id="shapeApply">החל על נבחר</button></div>
    <div class="lbl">קצוות: גרור פינות=פרופורציונלי, דפנות=מתיחת צלע</div>
   </div>
   <div class="tabpane" id="pane-draw">
    <button class="tool wide" id="tPen">✏ עט</button>
    <button class="tool wide" id="tErase">🩹 מחק ציור</button>
    <button class="tool wide on" id="tDrawLayer">שכבת ציור: מעל האובייקטים</button>
    <div class="lbl">עובי עט</div>
    <input type="range" id="penWidth" min="1" max="40" value="5">
    <div class="lbl">צבע</div>
    <div class="row">
      <input type="color" id="penColor" value="#1c2330">
      <button class="tool" id="tEyedrop" title="טפטפת">💧 טפטפת</button>
    </div>
    <div class="swatches" id="swatches"></div>
    <button class="tool wide" id="clearDraw">נקה את כל הציור</button>
   </div>
  </div>
  <div class="foot">
   <div class="row">
    <button class="tool" id="bUndo" title="בטל (Ctrl+Z)">↶ בטל</button>
    <button class="tool" id="bRedo" title="חזור (Ctrl+Y)">↷ חזור</button>
   </div>
   <div class="row">
    <button class="tool" id="bPNG">הורד PNG</button>
    <button class="tool" id="bReset">אפס</button>
   </div>
  </div>
 </div>
 <div class="main">
  <div class="topbar">
   <button id="zOut">−</button><input type="range" id="zRange" min="20" max="300" value="100" style="flex:1;max-width:300px"><span id="zLabel">100%</span><button id="zIn">＋</button><button id="zFit">התאם</button>
   <span class="sp"></span>
   <span id="hint">בחר/גרור · Shift+קליק לבחירה מרובה · גרירת רקע = מלבן בחירה</span>
  </div>
  <div class="wrap" id="wrap"><div class="zoomsizer" id="zoomsizer"><div class="stage" id="stage">
   <svg class="svglayer" id="svglayer" viewBox="0 0 1000 700" preserveAspectRatio="none"></svg>
  </div></div></div>
 </div>
</div>

function clone(o){return JSON.parse(JSON.stringify(o));}
function esc(t){return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function uid(p){return (p||'o')+'_'+(seq++);}

/* ---------- render ---------- */
const HND=['n','s','e','w','ne','nw','se','sw','rot'];
function shapeSVG(o){const c=o.color;
 if(o.shape==='rect')return '<svg viewBox="0 0 100 100" preserveAspectRatio="none"><rect width="100" height="100" fill="'+c+'"/></svg>';
 if(o.shape==='circle')return '<svg viewBox="0 0 100 100" preserveAspectRatio="none"><ellipse cx="50" cy="50" rx="50" ry="50" fill="'+c+'"/></svg>';
 return '<svg viewBox="0 0 100 100" preserveAspectRatio="none"><polygon points="50,0 100,100 0,100" fill="'+c+'"/></svg>';}
function objInner(o){
 if(o.kind==='text')return '<div class="txt" style="font-size:'+o.fs+'px;color:'+o.color+'">'+esc(o.text)+'</div>';
 if(o.kind==='svg')return o.svg;
 if(o.kind==='image')return '<img src="'+o.src+'" style="width:100%;height:100%;display:block">';
 return shapeSVG(o);
}
const CR8=['n','s','e','w','ne','nw','se','sw'];
function isCrop(o){return o.kind==='image'||o.kind==='svg'||o.kind==='shape';}
function handlesHTML(){return HND.map(h=>'<span class="h '+h+'"></span>').join('');}
function cropHTML(){return CR8.map(h=>'<span class="ch '+h+'"></span>').join('');}
function render(){
 [...stage.querySelectorAll('.obj')].forEach(e=>e.remove());
 objs.forEach(o=>{
  const d=document.createElement('div');d.className='obj';d.dataset.id=o.id;d.style.zIndex=o.z||5;
  d.style.transform='rotate('+(o.r||0)+'deg)';
  const cr=o.crop||{l:0,t:0,r:0,b:0};
  if(o.kind==='text'){d.style.left=o.x+'px';d.style.top=o.y+'px';d.innerHTML=objInner(o)+handlesHTML();}
  else if(cropTarget===o.id){
   d.style.left=o.x+'px';d.style.top=o.y+'px';d.style.width=o.w+'px';d.style.height=o.h+'px';d.style.overflow='visible';
   d.innerHTML='<div style="position:absolute;inset:0">'+objInner(o)+'</div><div class="cropframe" style="left:'+cr.l+'px;top:'+cr.t+'px;right:'+cr.r+'px;bottom:'+cr.b+'px">'+cropHTML()+'</div>';
  } else {
   d.style.left=(o.x+cr.l)+'px';d.style.top=(o.y+cr.t)+'px';d.style.width=(o.w-cr.l-cr.r)+'px';d.style.height=(o.h-cr.t-cr.b)+'px';d.style.overflow='hidden';
   d.innerHTML='<div style="position:absolute;left:'+(-cr.l)+'px;top:'+(-cr.t)+'px;width:'+o.w+'px;height:'+o.h+'px">'+objInner(o)+'</div>'+handlesHTML();
  }
  stage.appendChild(d);wire(d,o);
 });
 applySel();
}
function renderStrokes(){
 svglayer.innerHTML=strokes.map(s=>'<path d="'+ptsPath(s.pts)+'" fill="none" stroke="'+s.color+'" stroke-width="'+s.width+'" stroke-linecap="round" stroke-linejoin="round"/>').join('');
}
function ptsPath(p){if(!p.length)return'';return 'M'+p.map(q=>q[0].toFixed(1)+' '+q[1].toFixed(1)).join(' L');}

/* ---------- selection ---------- */
function applySel(){[...stage.querySelectorAll('.obj')].forEach(e=>e.classList.toggle('sel',selected.includes(e.dataset.id)));stage.classList.toggle('multi',selected.length>1);sel=selected.length===1?objs.find(o=>o.id===selected[0]):null;}
function selectOnly(id){selected=[id];applySel();}
function toggleSel(id){const i=selected.indexOf(id);if(i>=0)selected.splice(i,1);else selected.push(id);applySel();}
function clearSel(){selected=[];applySel();}

/* ---------- history ---------- */
let history=[], hi=-1;
function snap(){return {objs:clone(objs),strokes:clone(strokes)};}
function commit(){history=history.slice(0,hi+1);history.push(snap());hi=history.length-1;if(history.length>60){history.shift();hi--;}}
function restore(st){objs=clone(st.objs);strokes=clone(st.strokes);selected=selected.filter(id=>objs.some(o=>o.id===id));render();renderStrokes();}
function undo(){if(hi>0){hi--;restore(history[hi]);flash('בוטל');}}
function redo(){if(hi<history.length-1){hi++;restore(history[hi]);flash('שוחזר');}}

/* ---------- geometry helpers ---------- */
function localPt(cx,cy){const r=stage.getBoundingClientRect();return [(cx-r.left)/r.width*SW,(cy-r.top)/r.height*SH];}
function sx(dpx){const r=stage.getBoundingClientRect();return dpx/r.width*SW;}
function sy(dpx){const r=stage.getBoundingClientRect();return dpx/r.height*SH;}

/* ---------- wire object: drag / resize / rotate / edit ---------- */
function wire(d,o){
 d.addEventListener('mousedown',ev=>{
  if(mode!=='select'||cropTarget)return;
  if(ev.target.classList.contains('h')||ev.target.classList.contains('ch')||d.classList.contains('edit'))return;
  ev.preventDefault();
  if(ev.shiftKey){toggleSel(o.id);return;}
  if(!selected.includes(o.id))selectOnly(o.id);
  const px=ev.clientX,py=ev.clientY;
  const grp=selected.map(id=>{const oo=objs.find(x=>x.id===id);return{oo,ox:oo.x,oy:oo.y};});
  function mv(e){const dx=sx(e.clientX-px),dy=sy(e.clientY-py);grp.forEach(g=>{g.oo.x=g.ox+dx;g.oo.y=g.oy+dy;});render();}
  function up(){document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);commit();}
  document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
 });
 d.querySelectorAll('.h').forEach(h=>{const dir=[...h.classList].find(c=>c!=='h');
  h.addEventListener('mousedown',ev=>{ev.preventDefault();ev.stopPropagation();selectOnly(o.id);(dir==='rot'?startRotate:startResize)(d,o,dir,ev);});});
 d.querySelectorAll('.ch').forEach(h=>{const dir=[...h.classList].find(c=>c!=='ch');h.addEventListener('mousedown',ev=>{ev.preventDefault();ev.stopPropagation();startCrop(o,dir,ev);});});
 d.addEventListener('dblclick',ev=>{if(o.kind!=='text')return;const t=d.querySelector('.txt');t.contentEditable=true;t.classList.add('edit');d.classList.add('edit');t.focus();
  const fin=()=>{t.contentEditable=false;t.classList.remove('edit');d.classList.remove('edit');o.text=t.textContent;commit();t.removeEventListener('blur',fin);};t.addEventListener('blur',fin);ev.stopPropagation();});
}
function startResize(d,o,dir,ev){
 const rct=d.getBoundingClientRect();const startW=o.w,startH=o.h,startFs=o.fs,ox=o.x,oy=o.y,px=ev.clientX,py=ev.clientY;
 const sW=Math.max(rct.width,10),sH=Math.max(rct.height,10);
 function mv(e){const dx=e.clientX-px,dy=e.clientY-py;
  if(o.kind==='text'){let f=1+((dir.includes('e')?dx:dir.includes('w')?-dx:0)+(dir.includes('s')?dy:dir.includes('n')?-dy:0))/Math.max(sW,sH,40)*1.6;o.fs=Math.max(6,startFs*f);}
  else{if(dir.includes('e'))o.w=Math.max(6,startW+sx(dx));if(dir.includes('w')){o.w=Math.max(6,startW-sx(dx));o.x=ox+sx(dx);}if(dir.includes('s'))o.h=Math.max(6,startH+sy(dy));if(dir.includes('n')){o.h=Math.max(6,startH-sy(dy));o.y=oy+sy(dy);}}
  render();}
 function up(){document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);commit();}
 document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
}
function startRotate(d,o,ev){const rct=d.getBoundingClientRect();const cx=rct.left+rct.width/2,cy=rct.top+rct.height/2;
 function mv(e){let a=Math.atan2(e.clientY-cy,e.clientX-cx)*180/Math.PI+90;if(e.shiftKey)a=Math.round(a/15)*15;o.r=Math.round(a);render();}
 function up(){document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);commit();}
 document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
}

/* ---------- add objects ---------- */
function addText(){const o={id:uid('t'),kind:'text',x:SW/2-60,y:SH/2,fs:54,color:$('textColor').value,r:0,z:++zTop,text:'טקסט'};objs.push(o);render();selectOnly(o.id);commit();}
function addShape(shape){const o={id:uid('sh'),kind:'shape',shape,x:SW/2-70,y:SH/2-70,w:140,h:140,color:$('shapeColor').value,r:0,z:++zTop};objs.push(o);render();selectOnly(o.id);commit();}

/* ---------- drawing ---------- */
function startStroke(ev){ev.preventDefault();const s={color:pen.color,width:pen.width,pts:[localPt(ev.clientX,ev.clientY)]};strokes.push(s);
 function mv(e){s.pts.push(localPt(e.clientX,e.clientY));renderStrokes();}
 function up(){document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);if(s.pts.length<2)s.pts.push([s.pts[0][0]+0.5,s.pts[0][1]+0.5]);renderStrokes();commit();}
 document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);}
function startErase(ev){ev.preventDefault();
 function hit(e){const[x,y]=localPt(e.clientX,e.clientY);const before=strokes.length;strokes=strokes.filter(s=>!s.pts.some(p=>Math.hypot(p[0]-x,p[1]-y)<(s.width/2+10)));if(strokes.length!==before)renderStrokes();}
 hit(ev);
 function mv(e){hit(e);}
 function up(){document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);commit();}
 document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);}

/* ---------- marquee ---------- */
stage.addEventListener('mousedown',ev=>{
 if(mode==='pen'){startStroke(ev);return;}
 if(mode==='erase'){startErase(ev);return;}
 if(!(ev.target===stage||ev.target===svglayer))return;
 ev.preventDefault();const base=ev.shiftKey?selected.slice():[];if(!ev.shiftKey)clearSel();
 const r=stage.getBoundingClientRect(),px=ev.clientX,py=ev.clientY;
 const box=document.createElement('div');box.className='marquee';stage.appendChild(box);
 function mv(e){const x1=Math.min(px,e.clientX),y1=Math.min(py,e.clientY),x2=Math.max(px,e.clientX),y2=Math.max(py,e.clientY);
  box.style.left=((x1-r.left)/r.width*SW)+'px';box.style.top=((y1-r.top)/r.height*SH)+'px';box.style.width=((x2-x1)/r.width*SW)+'px';box.style.height=((y2-y1)/r.height*SH)+'px';
  const ns=base.slice();[...stage.querySelectorAll('.obj')].forEach(el=>{const b=el.getBoundingClientRect();if(b.right>=x1&&b.left<=x2&&b.bottom>=y1&&b.top<=y2&&!ns.includes(el.dataset.id))ns.push(el.dataset.id);});selected=ns;applySel();}
 function up(){box.remove();document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);}
 document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
});

/* ---------- align ---------- */
function alignSel(type){if(selected.length<2){flash('בחר 2+ אובייקטים');return;}
 const items=selected.map(id=>({o:objs.find(x=>x.id===id),el:stage.querySelector('[data-id="'+id+'"]')})).map(it=>({...it,r:it.el.getBoundingClientRect()}));
 const sr=stage.getBoundingClientRect();
 const L=Math.min(...items.map(i=>i.r.left)),R=Math.max(...items.map(i=>i.r.right)),T=Math.min(...items.map(i=>i.r.top)),B=Math.max(...items.map(i=>i.r.bottom));
 const cx=(L+R)/2,cy=(T+B)/2;
 items.forEach(i=>{let d=0,v=false;
  if(type==='left')d=L-i.r.left;else if(type==='right')d=R-i.r.right;else if(type==='cx')d=cx-(i.r.left+i.r.width/2);
  else if(type==='top'){d=T-i.r.top;v=true;}else if(type==='bottom'){d=B-i.r.bottom;v=true;}else if(type==='cy'){d=cy-(i.r.top+i.r.height/2);v=true;}
  if(v)i.o.y+=d/sr.height*SH;else i.o.x+=d/sr.width*SW;});
 render();commit();}

/* ---------- zoom ---------- */
function setZoom(z){z=Math.max(.15,Math.min(3,z));zoom=z;const cb=$('zoomsizer');cb.style.transformOrigin='top left';cb.style.transform='scale('+z+')';cb.style.width=(SW*z)+'px';cb.style.height=(SH*z)+'px';$('zLabel').textContent=Math.round(z*100)+'%';$('zRange').value=Math.round(z*100);}
function fitScreen(){const aw=wrap.clientWidth-30,ah=wrap.clientHeight-30;setZoom(Math.min(aw/SW,ah/SH));}

/* ---------- tabs + tools ---------- */
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{
 document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
 document.querySelectorAll('.tabpane').forEach(p=>p.classList.remove('on'));$('pane-'+b.dataset.tab).classList.add('on');
 if(b.dataset.tab!=='draw')setMode('select');
});
function setMode(m){mode=m;stage.classList.toggle('draw',m==='pen'||m==='erase');
 $('tPen').classList.toggle('on',m==='pen');$('tErase').classList.toggle('on',m==='erase');$('tSelect').classList.toggle('on',m==='select');
 $('hint').textContent=m==='pen'?'מצב עט: גרור לציור':m==='erase'?'מצב מחק: גרור על קווים למחיקה':'בחר/גרור · Shift לבחירה מרובה';}
$('tSelect').onclick=()=>setMode('select');
$('tPen').onclick=()=>setMode(mode==='pen'?'select':'pen');
$('tErase').onclick=()=>setMode(mode==='erase'?'select':'erase');
$('bAddText').onclick=addText;
document.querySelectorAll('[data-shape]').forEach(b=>b.onclick=()=>addShape(b.dataset.shape));
document.querySelectorAll('[data-al]').forEach(b=>b.onclick=()=>alignSel(b.dataset.al));
$('bFront').onclick=()=>{selected.forEach(id=>{objs.find(o=>o.id===id).z=++zTop;});render();commit();};
$('bBack').onclick=()=>{selected.forEach(id=>{const o=objs.find(o2=>o2.id===id);o.z=1;});render();commit();};
$('bDup').onclick=()=>{const n=[];selected.forEach(id=>{const o=clone(objs.find(o2=>o2.id===id));o.id=uid('c');o.x+=20;o.y+=20;o.z=++zTop;objs.push(o);n.push(o.id);});if(n.length){selected=n;render();commit();}};
$('bDel').onclick=()=>{objs=objs.filter(o=>!selected.includes(o.id));clearSel();render();commit();};
$('bCrop').onclick=toggleCrop;
$('bAddImg').onclick=()=>$('imgFile').click();
$('imgFile').onchange=e=>{if(e.target.files[0])addImageFile(e.target.files[0]);e.target.value='';};
$('fontRange').oninput=e=>{if(sel&&sel.kind==='text'){sel.fs=+e.target.value;render();}};
$('fontRange').onchange=()=>commit();
$('textApply').onclick=()=>{if(sel&&sel.kind==='text'){sel.color=$('textColor').value;render();commit();}};
$('shapeApply').onclick=()=>{selected.forEach(id=>{const o=objs.find(o2=>o2.id===id);if(o.kind==='shape')o.color=$('shapeColor').value;});render();commit();};
$('penWidth').oninput=e=>pen.width=+e.target.value;
$('penColor').oninput=e=>{pen.color=e.target.value;};
$('clearDraw').onclick=()=>{if(strokes.length){strokes=[];renderStrokes();commit();}};
$('tEyedrop').onclick=async()=>{if(!window.EyeDropper){flash('הטפטפת נתמכת ב-Chrome');return;}try{const r=await new EyeDropper().open();pen.color=r.sRGBHex;$('penColor').value=r.sRGBHex;flash('נבחר '+r.sRGBHex);}catch(e){}};
$('bUndo').onclick=undo;$('bRedo').onclick=redo;
$('bReset').onclick=()=>{if(confirm('לאפס הכל?')){objs=clone(DEF_OBJS);strokes=[];clearSel();render();renderStrokes();commit();fitScreen();}};
$('zIn').onclick=()=>setZoom(zoom+0.05);$('zOut').onclick=()=>setZoom(zoom-0.05);$('zRange').oninput=e=>setZoom(e.target.value/100);$('zFit').onclick=fitScreen;
window.addEventListener('resize',fitScreen);
/* swatches */
const SWCOLORS=['#1c2330','#2aa8ff','#ff5d5d','#2ecc71','#f1c40f','#9b59b6','#ff8c42','#ffffff'];
$('swatches').innerHTML=SWCOLORS.map(c=>'<span class="swatch" style="background:'+c+'" data-c="'+c+'"></span>').join('');
$('swatches').querySelectorAll('.swatch').forEach(s=>s.onclick=()=>{pen.color=s.dataset.c;$('penColor').value=s.dataset.c;});

/* keyboard */
document.addEventListener('keydown',e=>{
 if(e.target.isContentEditable)return;
 if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='z'){e.preventDefault();e.shiftKey?redo():undo();return;}
 if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='y'){e.preventDefault();redo();return;}
 if(e.key==='Escape'){if(cropTarget){cropTarget=null;render();}else clearSel();return;}
 if(!selected.length)return;
 const step=e.shiftKey?10:1;
 const A={ArrowLeft:[-step,0],ArrowRight:[step,0],ArrowUp:[0,-step],ArrowDown:[0,step]};
 if(A[e.key]){const[dx,dy]=A[e.key];selected.forEach(id=>{const o=objs.find(o2=>o2.id===id);o.x+=dx;o.y+=dy;});render();e.preventDefault();}
 else if(e.key==='Delete'){objs=objs.filter(o=>!selected.includes(o.id));clearSel();render();commit();}
});
function startCrop(o,dir,ev){o.crop=o.crop||{l:0,t:0,r:0,b:0};const c0={...o.crop},px=ev.clientX,py=ev.clientY;
 function mv(e){const dx=sx(e.clientX-px),dy=sy(e.clientY-py);let l=c0.l,t=c0.t,r=c0.r,b=c0.b;
  if(dir.includes('w'))l=Math.max(0,Math.min(o.w-r-12,c0.l+dx));
  if(dir.includes('e'))r=Math.max(0,Math.min(o.w-l-12,c0.r-dx));
  if(dir.includes('n'))t=Math.max(0,Math.min(o.h-b-12,c0.t+dy));
  if(dir.includes('s'))b=Math.max(0,Math.min(o.h-t-12,c0.b-dy));
  o.crop={l,t,r,b};render();}
 function up(){document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);commit();}
 document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);}
function toggleCrop(){if(cropTarget){cropTarget=null;render();commit();flash('חיתוך הוחל');return;}
 if(!sel||!isCrop(sel)){flash('בחר תמונה/צורה לחיתוך');return;}cropTarget=sel.id;render();flash('מצב חיתוך: גרור את הידיות השחורות. לחץ שוב לסיום');}
function addImageFile(f){const r=new FileReader();r.onload=()=>{const im=new Image();im.onload=()=>{let w=im.width,h=im.height;const m=Math.min(420/w,420/h,1);w=Math.round(w*m);h=Math.round(h*m);objs.push({id:uid('img'),kind:'image',x:Math.round(SW/2-w/2),y:Math.round(SH/2-h/2),w,h,r:0,z:++zTop,src:r.result,crop:{l:0,t:0,r:0,b:0}});render();commit();};im.src=r.result;};r.readAsDataURL(f);}
function setDrawLayer(){svglayer.style.zIndex=drawOnTop?5000:1;const b=$('tDrawLayer');b.textContent=drawOnTop?'שכבת ציור: מעל האובייקטים':'שכבת ציור: מתחת לאובייקטים';b.classList.toggle('on',drawOnTop);}
$('tDrawLayer').onclick=()=>{drawOnTop=!drawOnTop;setDrawLayer();flash(drawOnTop?'הציור מעל — אפשר לצייר על הלוגו':'הציור מתחת לאובייקטים');};
function flash(t){const e=document.createElement('div');e.className='flash';e.textContent=t;document.body.appendChild(e);setTimeout(()=>e.remove(),1200);}

/* ---------- PNG export (browser-native, RTL-safe) ---------- */
$('bPNG').onclick=()=>{clearSel();
 const css=document.querySelector('style').textContent;
 const clone2=stage.cloneNode(true);clone2.querySelectorAll('.h,.marquee').forEach(e=>e.remove());clone2.style.transform='none';
 const xhtml=new XMLSerializer().serializeToString(clone2);
 const svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+SW+'" height="'+SH+'"><foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml" style="width:'+SW+'px;height:'+SH+'px;background:#fff"><style><![CDATA['+css+']]></style>'+xhtml+'</div></foreignObject></svg>';
 const img=new Image();img.onload=()=>{const c=document.createElement('canvas');c.width=SW*2;c.height=SH*2;const x=c.getContext('2d');x.fillStyle='#fff';x.fillRect(0,0,c.width,c.height);x.setTransform(2,0,0,2,0,0);x.drawImage(img,0,0);c.toBlob(b=>{const a=document.createElement('a');a.download='sweep.png';a.href=URL.createObjectURL(b);a.click();},'image/png');};
 img.onerror=()=>flash('שגיאה ביצוא');img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);};

/* ---------- init ---------- */
objs=clone(DEF_OBJS);render();renderStrokes();setDrawLayer();commit();setTimeout(fitScreen,30);
</script>
</body></html>
