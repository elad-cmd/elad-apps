buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 23
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.24"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

// React Native injects the oss.sonatype.org snapshots repository, which is frequently
// unavailable and returns HTTP 504 (Gateway Time-out), breaking dependency resolution for
// stable releases. All our dependencies live on mavenCentral()/google(), so strip that
// repo from every project to make builds resilient to the outage.
allprojects {
    afterEvaluate { proj ->
        proj.repositories.removeAll { repo ->
            repo instanceof org.gradle.api.artifacts.repositories.MavenArtifactRepository &&
                repo.url != null && repo.url.toString().contains('oss.sonatype.org')
        }
    }
}
