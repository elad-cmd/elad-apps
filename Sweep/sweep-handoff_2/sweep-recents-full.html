<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sweep — נראו לאחרונה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14231F; --surface:#1E332C; --surface-2:#274139;
    --line:rgba(255,255,255,.05); --line-strong:rgba(255,255,255,.10);
    --accent:#19B597; --accent-deep:#0E8A72; --accent-ink:#04241C;
    --avatar-bg:#254541; --avatar-ink:#79D9C2;
    --text:#EAF3F1; --text-2:#93A8A2; --text-3:#647873;
    --out:#4FA588; --in:#9BB0AA; --missed:#D98A6E;
    --dock-h:78px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Heebo',sans-serif;background:#000;color:var(--text);display:flex;justify-content:center;min-height:100vh;padding:20px}
  .phone{width:390px;max-width:100%;height:844px;max-height:92vh;background:var(--bg);border-radius:44px;overflow:hidden;position:relative;display:flex;flex-direction:column;box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 0 10px #0a0f0e,0 0 0 11px #1c2a27}

  .sbar{height:44px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 26px;font-size:14px;font-weight:600}
  .batt{border:1.4px solid var(--text-2);border-radius:4px;width:23px;height:11px;display:inline-flex;align-items:center;padding:1.5px;opacity:.8}
  .batt i{display:block;height:100%;width:45%;background:var(--text);border-radius:1px}

  header{flex:none;padding:4px 18px 0}
  .logo{display:flex;align-items:center;justify-content:center;gap:11px;height:38px;direction:ltr}
  .logo .word{font-size:26px;font-weight:300;letter-spacing:.5px;color:var(--text)}
  .logo .dots{position:relative;width:24px;height:24px}
  .logo .dots span{position:absolute;border-radius:50%;background:var(--accent)}
  .logo .dots span:nth-child(1){left:0;bottom:0;width:4px;height:4px;opacity:.4}
  .logo .dots span:nth-child(2){left:9px;bottom:9px;width:5.5px;height:5.5px;opacity:.7}
  .logo .dots span:nth-child(3){left:17px;bottom:17px;width:7.5px;height:7.5px;opacity:1}

  .tabs{margin-top:12px;display:flex;gap:4px;background:var(--surface);border-radius:16px;padding:5px}
  .tab{flex:1;height:40px;border:0;background:transparent;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--text-2);cursor:pointer}
  .tab svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8}
  .tab.on{background:var(--accent);color:var(--accent-ink)}

  .seg{margin-top:12px;display:flex;gap:8px}
  .seg button{flex:none;height:34px;padding:0 16px;border-radius:11px;border:1px solid var(--line-strong);background:transparent;color:var(--text-2);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer}
  .seg button.on{background:var(--accent);color:var(--accent-ink);border-color:transparent;font-weight:600}

  .list{flex:1;overflow-y:auto;padding:4px 8px calc(var(--dock-h) + 14px);scrollbar-width:none}
  .list::-webkit-scrollbar{display:none}
  .daylabel{font-size:13px;font-weight:600;color:var(--text-3);padding:14px 14px 4px}

  .row{display:flex;align-items:center;gap:13px;padding:11px 12px;border-radius:14px;position:relative;cursor:pointer}
  .row+.row::before{content:"";position:absolute;top:0;right:69px;left:12px;height:1px;background:var(--line)}
  .row:active{background:var(--surface)}
  .avatar{width:46px;height:46px;border-radius:50%;flex:none;background:var(--avatar-bg);display:flex;align-items:center;justify-content:center;color:var(--avatar-ink);font-size:15px;font-weight:600;overflow:hidden}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .avatar.unknown{background:#26332f;color:var(--text-3)}
  .info{flex:1;min-width:0}
  .info .name{font-size:16px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .info .name .cnt{color:var(--text-3);font-weight:400;font-size:14px}
  .info .sub2{display:flex;align-items:center;gap:7px;margin-top:3px;font-size:13px;color:var(--text-2)}
  .ci{width:15px;height:15px;flex:none}
  .call-btn{flex:none;width:38px;height:38px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center}
  .call-btn svg{width:18px;height:18px;stroke:var(--out);fill:none;stroke-width:1.8}

  .dock{position:absolute;left:0;right:0;bottom:0;height:var(--dock-h);background:linear-gradient(to top,var(--bg) 62%,transparent);display:flex;align-items:center;justify-content:space-around;padding:0 22px 14px;z-index:4}
  .fab{width:50px;height:50px;border-radius:50%;border:1px solid var(--line-strong);background:var(--surface);color:var(--text-2);display:flex;align-items:center;justify-content:center}
  .fab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
  .fab.pri{background:var(--accent-deep);border-color:transparent;color:#EAFFF9;width:56px;height:56px}
</style>
</head>
<body>
  <div class="phone">
    <div class="sbar"><span>13:03</span><span style="display:flex;gap:6px;align-items:center"><span class="batt"><i></i></span>33</span></div>

    <header>
      <div class="logo"><div class="dots"><span></span><span></span><span></span></div><div class="word">Sweep</div></div>
      <div class="tabs">
        <button class="tab on"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></button>
        <button class="tab"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"/></svg></button>
        <button class="tab"><svg viewBox="0 0 24 24"><path d="M12 3.5l2.6 5.3 5.9.9-4.3 4.1 1 5.8L12 17.7 6.8 20.4l1-5.8-4.3-4.1 5.9-.9z"/></svg></button>
      </div>
      <div class="seg">
        <button class="on">הכל</button>
        <button>שלא נענו</button>
      </div>
    </header>

    <div class="list">
      <div class="daylabel">היום</div>

      <div class="row">
        <div class="avatar">לכ</div>
        <div class="info"><div class="name">ליאור כהן</div>
          <div class="sub2"><svg class="ci" viewBox="0 0 24 24" style="color:var(--out)"><path d="M6 18L18 6M18 6H10M18 6V14" stroke="currentColor" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg><span>14:32</span></div>
        </div>
      </div>

      <div class="row">
        <div class="avatar">מק</div>
        <div class="info"><div class="name">מיכל קושרובסקי <span class="cnt">(2)</span></div>
          <div class="sub2"><svg class="ci" viewBox="0 0 24 24" style="color:var(--missed)"><path d="M18 6L6 18M6 18H14M6 18V10" stroke="currentColor" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg><span>11:08</span></div>
        </div>
      </div>

      <div class="row">
        <div class="avatar">א</div>
        <div class="info"><div class="name">אבא</div>
          <div class="sub2"><svg class="ci" viewBox="0 0 24 24" style="color:var(--in)"><path d="M18 6L6 18M6 18H14M6 18V10" stroke="currentColor" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg><span>09:15</span></div>
        </div>
      </div>

      <div class="daylabel">אתמול</div>

      <div class="row">
        <div class="avatar"><img src="https://i.pravatar.cc/120?img=32"></div>
        <div class="info"><div class="name">נטע הלרמן</div>
          <div class="sub2"><svg class="ci" viewBox="0 0 24 24" style="color:var(--out)"><path d="M6 18L18 6M18 6H10M18 6V14" stroke="currentColor" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg><span>21:40</span></div>
        </div>
      </div>

      <div class="row">
        <div class="avatar unknown">?</div>
        <div class="info"><div class="name" style="direction:ltr;text-align:right">+972 54-303-6138</div>
          <div class="sub2"><svg class="ci" viewBox="0 0 24 24" style="color:var(--missed)"><path d="M18 6L6 18M6 18H14M6 18V10" stroke="currentColor" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg><span>18:22</span></div>
        </div>
      </div>

      <div class="row">
        <div class="avatar"><img src="https://i.pravatar.cc/120?img=45"></div>
        <div class="info"><div class="name">אתי דימנט מדיקמפ</div>
          <div class="sub2"><svg class="ci" viewBox="0 0 24 24" style="color:var(--in)"><path d="M18 6L6 18M6 18H14M6 18V10" stroke="currentColor" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg><span>13:05</span></div>
        </div>
      </div>

      <div class="daylabel">מוקדם יותר</div>

      <div class="row">
        <div class="avatar">יב</div>
        <div class="info"><div class="name">יעל בייביסיטרית (נטע)</div>
          <div class="sub2"><svg class="ci" viewBox="0 0 24 24" style="color:var(--out)"><path d="M6 18L18 6M18 6H10M18 6V14" stroke="currentColor" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg><span>יום ב׳</span></div>
        </div>
      </div>

      <div class="row">
        <div class="avatar">לה</div>
        <div class="info"><div class="name">לילך הירשפלד</div>
          <div class="sub2"><svg class="ci" viewBox="0 0 24 24" style="color:var(--in)"><path d="M18 6L6 18M6 18H14M6 18V10" stroke="currentColor" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg><span>יום א׳</span></div>
        </div>
      </div>
    </div>

    <div class="dock">
      <button class="fab"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></button>
      <button class="fab"><svg viewBox="0 0 24 24"><circle cx="6" cy="6" r="1.5"/><circle cx="12" cy="6" r="1.5"/><circle cx="18" cy="6" r="1.5"/><circle cx="6" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="18" cy="12" r="1.5"/><circle cx="6" cy="18" r="1.5"/><circle cx="12" cy="18" r="1.5"/><circle cx="18" cy="18" r="1.5"/></svg></button>
      <button class="fab pri"><svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M6 11a6 6 0 0 0 12 0M12 17v3"/></svg></button>
      <button class="fab"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6.5"/><path d="M20 20l-4-4"/></svg></button>
      <button class="fab"><svg viewBox="0 0 24 24"><circle cx="6.5" cy="17.5" r="1.7" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="2.1" fill="currentColor" stroke="none"/><circle cx="17.5" cy="6.5" r="2.5" fill="currentColor" stroke="none"/></svg></button>
    </div>
  </div>
</body>
</html>
