<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sweep — ימי הולדת קרובים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14231F; --surface:#1E332C; --surface-2:#274139;
    --line:rgba(255,255,255,.05); --line-strong:rgba(255,255,255,.10);
    --accent:#19B597; --accent-deep:#0E8A72;
    --avatar-bg:#254541; --avatar-ink:#79D9C2;
    --text:#EAF3F1; --text-2:#93A8A2; --text-3:#647873;
    --today:#E0A45C; --today-bg:rgba(224,164,92,.10);
    --dock-h:80px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Heebo',sans-serif;background:#000;color:var(--text);display:flex;justify-content:center;min-height:100vh;padding:20px}
  .phone{width:390px;max-width:100%;height:844px;max-height:92vh;background:var(--bg);border-radius:44px;overflow:hidden;position:relative;display:flex;flex-direction:column;box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 0 10px #0a0f0e,0 0 0 11px #1c2a27}

  .sbar{height:44px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 26px;font-size:14px;font-weight:600}
  .batt{border:1.4px solid var(--text-2);border-radius:4px;width:23px;height:11px;display:inline-flex;align-items:center;padding:1.5px;opacity:.8}
  .batt i{display:block;height:100%;width:45%;background:var(--text);border-radius:1px}

  .topbar{flex:none;display:flex;align-items:center;justify-content:center;height:52px;font-size:18px;font-weight:700}

  .list{flex:1;overflow-y:auto;padding:4px 8px calc(var(--dock-h) + 12px);scrollbar-width:none}
  .list::-webkit-scrollbar{display:none}

  .row{display:flex;align-items:center;gap:13px;padding:12px;border-radius:16px;position:relative;cursor:pointer}
  .row+.row::before{content:"";position:absolute;top:0;right:69px;left:12px;height:1px;background:var(--line)}
  .row:active{background:var(--surface)}
  .row.today{background:var(--today-bg)}

  .avatar{width:46px;height:46px;border-radius:50%;flex:none;background:var(--avatar-bg);display:flex;align-items:center;justify-content:center;color:var(--avatar-ink);font-size:15px;font-weight:600;overflow:hidden}
  .avatar img{width:100%;height:100%;object-fit:cover}

  .info{flex:1;min-width:0}
  .info .name{font-size:16px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .info .meta{font-size:13px;color:var(--text-2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row.today .info .name{color:var(--today);font-weight:600}
  .row.today .info .meta{color:var(--today)}

  .cal{flex:none;display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line-strong);color:var(--text-2);border-radius:11px;padding:8px 12px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:.15s}
  .cal:active{background:var(--surface-2)}
  .cal svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}
  .row.today .cal{background:var(--today);border-color:transparent;color:#2A1B0C;font-weight:600}

  .dock{position:absolute;left:0;right:0;bottom:0;height:var(--dock-h);background:linear-gradient(to top,var(--bg) 62%,transparent);display:flex;align-items:center;justify-content:space-around;padding:0 40px 14px;z-index:4}
  .fab{width:50px;height:50px;border-radius:50%;border:1px solid var(--line-strong);background:var(--surface);color:var(--text-2);display:flex;align-items:center;justify-content:center}
  .fab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
  .fab.pri{background:var(--accent-deep);border-color:transparent;color:#EAFFF9;width:56px;height:56px}
</style>
</head>
<body>
  <div class="phone">
    <div class="sbar"><span>20:04</span><span style="display:flex;gap:6px;align-items:center"><span class="batt"><i></i></span>29</span></div>
    <div class="topbar">ימי הולדת קרובים</div>

    <div class="list">

      <div class="row today">
        <div class="avatar">א</div>
        <div class="info"><div class="name">אבא 🎂</div><div class="meta">היום! · 04/07</div></div>
        <button class="cal"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M8 3v4M16 3v4M12 13v4M10 15h4"/></svg>ליומן</button>
      </div>

      <div class="row">
        <div class="avatar">לכ</div>
        <div class="info"><div class="name">ליאור כהן</div><div class="meta">בעוד 152 ימים · 03/12</div></div>
        <button class="cal"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M8 3v4M16 3v4M12 13v4M10 15h4"/></svg>ליומן</button>
      </div>

      <div class="row">
        <div class="avatar">מע</div>
        <div class="info"><div class="name">מיכל עוז ארי</div><div class="meta">בעוד 161 ימים · 12/12</div></div>
        <button class="cal"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M8 3v4M16 3v4M12 13v4M10 15h4"/></svg>ליומן</button>
      </div>

      <div class="row">
        <div class="avatar">ב</div>
        <div class="info"><div class="name">בן</div><div class="meta">בעוד 208 ימים · 28/01</div></div>
        <button class="cal"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M8 3v4M16 3v4M12 13v4M10 15h4"/></svg>ליומן</button>
      </div>

      <div class="row">
        <div class="avatar">א</div>
        <div class="info"><div class="name">אמא</div><div class="meta">בעוד 237 ימים · 26/02</div></div>
        <button class="cal"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M8 3v4M16 3v4M12 13v4M10 15h4"/></svg>ליומן</button>
      </div>

      <div class="row">
        <div class="avatar">מר</div>
        <div class="info"><div class="name">מיקה — רומא</div><div class="meta">בעוד 282 ימים · 12/04</div></div>
        <button class="cal"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M8 3v4M16 3v4M12 13v4M10 15h4"/></svg>ליומן</button>
      </div>

      <div class="row">
        <div class="avatar">קש</div>
        <div class="info"><div class="name">קרן שחר כברי מדיקמפ</div><div class="meta">בעוד 349 ימים · 18/06</div></div>
        <button class="cal"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M8 3v4M16 3v4M12 13v4M10 15h4"/></svg>ליומן</button>
      </div>

      <div class="row">
        <div class="avatar">אד</div>
        <div class="info"><div class="name">אתי דימנט מדיקמפ</div><div class="meta">בעוד 361 ימים · 30/06</div></div>
        <button class="cal"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M8 3v4M16 3v4M12 13v4M10 15h4"/></svg>ליומן</button>
      </div>

    </div>

    <div class="dock">
      <button class="fab" aria-label="חזור"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></button>
      <button class="fab pri" aria-label="סייען קולי"><svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M6 11a6 6 0 0 0 12 0M12 17v3"/></svg></button>
      <button class="fab" aria-label="תפריט"><svg viewBox="0 0 24 24"><circle cx="6.5" cy="17.5" r="1.7" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="2.1" fill="currentColor" stroke="none"/><circle cx="17.5" cy="6.5" r="2.5" fill="currentColor" stroke="none"/></svg></button>
    </div>
  </div>
</body>
</html>
