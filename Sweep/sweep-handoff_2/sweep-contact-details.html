<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sweep — פרטי איש קשר</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14231F; --surface:#1E332C; --surface-2:#274139;
    --line:rgba(255,255,255,.05); --line-strong:rgba(255,255,255,.10);
    --accent:#19B597; --accent-deep:#0E8A72;
    --avatar-bg:#254541; --avatar-ink:#79D9C2;
    --text:#EAF3F1; --text-2:#93A8A2; --text-3:#647873;
    --dock-h:80px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Heebo',sans-serif;background:#000;color:var(--text);display:flex;justify-content:center;min-height:100vh;padding:20px}
  .phone{width:390px;max-width:100%;height:844px;max-height:92vh;background:var(--bg);border-radius:44px;overflow:hidden;position:relative;display:flex;flex-direction:column;box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 0 10px #0a0f0e,0 0 0 11px #1c2a27}

  .sbar{height:44px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 26px;font-size:14px;font-weight:600}
  .batt{border:1.4px solid var(--text-2);border-radius:4px;width:23px;height:11px;display:inline-flex;align-items:center;padding:1.5px;opacity:.8}
  .batt i{display:block;height:100%;width:45%;background:var(--text);border-radius:1px}

  .topbar{flex:none;display:flex;align-items:center;justify-content:center;height:50px;font-size:18px;font-weight:700}

  .scroll{flex:1;overflow-y:auto;padding:2px 18px calc(var(--dock-h) + 14px);scrollbar-width:none}
  .scroll::-webkit-scrollbar{display:none}

  /* hero */
  .hero{position:relative;display:flex;flex-direction:column;align-items:center;padding:18px 0 6px}
  .hero .fav{position:absolute;top:8px;left:4px;width:42px;height:42px;border-radius:50%;background:var(--surface);border:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .hero .fav svg{width:21px;height:21px;fill:var(--accent)}
  .avatar-lg{width:100px;height:100px;border-radius:50%;background:var(--avatar-bg);display:flex;align-items:center;justify-content:center;color:var(--avatar-ink);font-size:40px;font-weight:600;overflow:hidden}
  .avatar-lg img{width:100%;height:100%;object-fit:cover}
  .hero .nm{font-size:24px;font-weight:700;margin-top:14px}
  .hero .acc{font-size:13px;color:var(--text-3);margin-top:5px;direction:ltr}

  /* field row: [action right] [field flex] [copy left] */
  .field{display:flex;align-items:center;gap:12px;margin-top:12px}
  .field .box{flex:1;min-width:0;background:var(--surface);border-radius:14px;padding:12px 15px;min-height:56px;display:flex;flex-direction:column;justify-content:center}
  .field .box .lbl{font-size:11.5px;color:var(--text-3)}
  .field .box .val{font-size:16px;font-weight:500;margin-top:2px;direction:ltr;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .field.empty .box .val{color:var(--text-3);font-weight:400}
  .field .box.rtl .val{direction:rtl}

  .field .acts{display:flex;gap:8px;flex:none}
  .abtn{width:44px;height:44px;border-radius:50%;border:0;background:var(--surface-2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
  .abtn:active{background:#31504a}
  .abtn svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:1.7}
  .field.empty .abtn svg{stroke:var(--text-3)}

  .copy{width:26px;flex:none;display:flex;align-items:center;justify-content:center;background:none;border:0;cursor:pointer}
  .copy svg{width:17px;height:17px;stroke:var(--text-3);fill:none;stroke-width:1.7}

  .divider{height:1px;background:var(--line);margin:14px 6px 2px}

  /* add value */
  .addval{display:flex;justify-content:flex-start;margin-top:12px}
  .addval button{width:44px;height:44px;border-radius:50%;border:0;background:var(--accent-deep);color:#EAFFF9;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .addval svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2.2}

  .sec-t{font-size:13px;font-weight:600;color:var(--text-3);padding:22px 4px 8px}
  .addfield{width:100%;border:1px solid var(--line-strong);background:var(--surface);color:var(--text);border-radius:14px;padding:14px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer}

  .days{display:flex;justify-content:space-between;gap:6px;margin-top:2px}
  .day{width:38px;height:38px;border-radius:50%;border:1px solid var(--line-strong);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--text-3)}
  .day.on{background:var(--accent-deep);border-color:transparent;color:#EAFFF9}

  .lastline{font-size:12.5px;color:var(--text-3);text-align:center;margin-top:20px}

  .dock{position:absolute;left:0;right:0;bottom:0;height:var(--dock-h);background:linear-gradient(to top,var(--bg) 62%,transparent);display:flex;align-items:center;justify-content:space-around;padding:0 40px 14px;z-index:4}
  .fab{width:50px;height:50px;border-radius:50%;border:1px solid var(--line-strong);background:var(--surface);color:var(--text-2);display:flex;align-items:center;justify-content:center}
  .fab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
  .fab.pri{background:var(--accent-deep);border-color:transparent;color:#EAFFF9;width:56px;height:56px}
</style>
</head>
<body>
  <div class="phone">
    <div class="sbar"><span>19:59</span><span style="display:flex;gap:6px;align-items:center"><span class="batt"><i></i></span>28</span></div>
    <div class="topbar">פרטי איש קשר</div>

    <div class="scroll">
      <!-- hero -->
      <div class="hero">
        <button class="fav"><svg viewBox="0 0 24 24"><path d="M12 3.5l2.6 5.3 5.9.9-4.3 4.1 1 5.8L12 17.7 6.8 20.4l1-5.8-4.3-4.1 5.9-.9z"/></svg></button>
        <div class="avatar-lg">לכ</div>
        <div class="nm">ליאור כהן</div>
        <div class="acc">psychometry.campus@gmail.com</div>
      </div>

      <div class="divider"></div>

      <!-- phone (filled) -->
      <div class="field">
        <div class="acts">
          <button class="abtn" aria-label="וואטסאפ"><svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 0 0-8 13l-1 5 5-1a9 9 0 1 0 4-17z"/></svg></button>
          <button class="abtn" aria-label="חייג"><svg viewBox="0 0 24 24"><path d="M5 4c-1 6 9 16 15 15l-1-4-4-1-2 2c-2-1-4-3-5-5l2-2-1-4z"/></svg></button>
        </div>
        <div class="box"><div class="val">+972 50-252-0595</div></div>
        <button class="copy" aria-label="העתק"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/></svg></button>
      </div>

      <!-- email (empty) -->
      <div class="field empty">
        <div class="acts">
          <button class="abtn" aria-label="מייל"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M4 7l8 6 8-6"/></svg></button>
        </div>
        <div class="box"><div class="val">הוסף מייל</div></div>
        <span class="copy"></span>
      </div>

      <!-- address (filled) -->
      <div class="field">
        <div class="acts">
          <button class="abtn" aria-label="ניווט"><svg viewBox="0 0 24 24"><path d="M3 11l18-8-8 18-2-8-8-2z"/></svg></button>
        </div>
        <div class="box rtl"><div class="val">אדומים 34 אילת</div></div>
        <button class="copy" aria-label="העתק"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/></svg></button>
      </div>

      <!-- birthday (filled) -->
      <div class="field">
        <div class="acts">
          <button class="abtn" aria-label="יום הולדת"><svg viewBox="0 0 24 24"><path d="M4 20h16v-6H4z"/><path d="M4 14c2 0 2-2 4-2s2 2 4 2 2-2 4-2 2 2 4 2"/><path d="M12 6v4M12 4v0"/></svg></button>
        </div>
        <div class="box rtl"><div class="val">3 בדצמבר 1981</div></div>
        <button class="copy" aria-label="העתק"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/></svg></button>
      </div>

      <div class="addval"><button aria-label="הוסף ערך"><svg viewBox="0 0 24 24"><path d="M12 6v12M6 12h12"/></svg></button></div>

      <!-- custom fields -->
      <div class="sec-t">שדות מותאמים</div>
      <button class="addfield">+ הוסף שדה</button>

      <!-- free days -->
      <div class="sec-t">ימים פנויים</div>
      <div class="days">
        <div class="day on">א</div><div class="day">ב</div><div class="day on">ג</div><div class="day">ד</div><div class="day on">ה</div><div class="day">ו</div><div class="day">ש</div>
      </div>

      <div class="lastline">מגע אחרון · שיחה יוצאת · 01/06/26 13:36</div>
    </div>

    <!-- dock: sub-screen -->
    <div class="dock">
      <button class="fab" aria-label="חזור"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></button>
      <button class="fab pri" aria-label="סייען קולי"><svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M6 11a6 6 0 0 0 12 0M12 17v3"/></svg></button>
      <button class="fab" aria-label="תפריט"><svg viewBox="0 0 24 24"><circle cx="6.5" cy="17.5" r="1.7" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="2.1" fill="currentColor" stroke="none"/><circle cx="17.5" cy="6.5" r="2.5" fill="currentColor" stroke="none"/></svg></button>
    </div>
  </div>
</body>
</html>
