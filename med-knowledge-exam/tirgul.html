<script>
const OFFICIAL = [
  {subj:"biochem", q:"חוקרים בודדו חלבון חדש, חלבון X. בג'ל SDS-PAGE נמצא שבתנאים מחזרים (reducing) החלבון מופיע במשקל 24 kDa, ובתנאים לא-מחזרים (non-reducing) במשקל 48 kDa. אנליזה בג'ל פילטרציה הראתה משקל מולקולרי של כ-100 kDa. באיזו מסקנה תומכים הממצאים?",
   o:["חלבון X יוצר אגרגטים בתמיסה","חלבון X הוא הטרודימר של תת-יחידה גדולה ותת-יחידה קטנה","חלבון X הוא דימר של שני דימרים","חלבון X הוא הומוטטרמר שכל תת-יחידותיו קשורות בקשרים די-סולפידיים"], a:2,
   e:"מחזר נותן 24 kDa (מונומר). לא-מחזר נותן 48 kDa, כלומר שתי תת-יחידות קשורות בקשר די-סולפידי. נייטיב כ-100 kDa, כלומר ארבע תת-יחידות. אלה שני דימרים די-סולפידיים שמתאגדים זה לזה לא-קוולנטית. תשובה ד נשללת: אילו כל התת-יחידות היו קשורות די-סולפידית, התנאי הלא-מחזר היה מראה כ-96 ולא 48."},
  {subj:"cell", q:"איזה מאפיין משותף לשלושת סוגי הסיבים המרכיבים את שלד התא?",
   o:["שלושתם קובעים את צורת התא","שלושתם יוצרים פולימרים סיביים","שלושתם חשובים לחוזק המכני של התא","שלושתם בעלי יכולת לפעול עם חלבוני מנוע"], a:1,
   e:"מיקרו-חוטים, חוטי ביניים ומיקרו-צינוריות כולם פולימרים סיביים של תת-יחידות חלבון. חוטי הביניים אינם פועלים עם חלבוני מנוע, ולכן ד אינו משותף לכולם."},
  {subj:"cell", q:"איזה מאפיין של נוגדנים מסביר את השימוש הנפוץ בהם בעבודה מיקרוסקופית?",
   o:["הם יכולים לזהות מולקולות ספציפיות","הם יכולים לשאת חומר צבע פלואורסצנטי","הם יכולים לחדור לתאים ולרקמות ביעילות","הם יציבים לאורך זמן ב-37 מעלות"], a:0,
   e:"הבסיס לשימוש בנוגדנים בסימון מיקרוסקופי הוא הזיהוי הסלקטיבי של מולקולת מטרה ספציפית."},
  {subj:"cell", q:"חוקרים מבקשים לעקוב אחר מיקום חלבון בתא ולקבוע את גודלו בעזרת מיקרוסקופ פלואורסצנטי. באיזו מגבלה הם צפויים להיתקל?",
   o:["לא ניתן לזהות חלבונים קטנים","לא ניתן לזהות חלבונים ספציפיים","לא ניתן לקבוע את גודל החלבון","לא ניתן לקבוע את מיקומו התוך-תאי"], a:2,
   e:"בשל מגבלת הרזולוציה של מיקרוסקופיית אור, אפשר לאתר את מיקום החלבון אך לא לקבוע את גודלו."},
  {subj:"physio", q:"מבין המנגנונים השומרים על ריכוז סידן נמוך בתא, מהו החשוב ביותר להרפיית שריר השלד לאחר התכווצות?",
   o:["יציאת סידן דרך תעלות סידן תלויות-מתח","יציאת סידן דרך משאבת Ca-ATPase של ממברנת התא","הוצאת סידן כנגד כניסת נתרן על ידי משחלף נתרן-סידן","ספיגת סידן אל המאגרים התוך-תאיים על ידי משאבת Ca-ATPase"], a:3,
   e:"ההרפיה דורשת הורדה מהירה של הסידן הציטוזולי, והמנגנון העיקרי הוא ספיגתו חזרה אל הרשת הסרקופלזמית על ידי משאבת Ca-ATPase (SERCA)."},
  {subj:"mol", q:"איזה עיקרון עומד בבסיס שיטת ריצוף ה-DNA של סנגר?",
   o:["הגברה אקספוננציאלית של עותקי מולקולת ה-DNA","סיום מוקדם של סינתזת גדיל DNA משלים","יצירת שברים בשלד הפוספו-סוכרי","סינתזת גדיל RNA משלים"], a:1,
   e:"שיטת סנגר מבוססת על סיום מוקדם (chain termination) של סינתזת הגדיל המשלים, באמצעות דידאוקסי-נוקלאוטידים החסרים קבוצת 3-OH."},
  {subj:"mol", q:"באיזה תהליך מולקולרי פועל האנזים רזולבאז (resolvase)?",
   o:["רפליקציה","טרנסקריפציה","רקומבינציה","טרנספוזיציה"], a:2,
   e:"רזולבאז פותר (resolves) מבני הולידיי, שלב ברקומבינציה."},
  {subj:"cell", q:"מהו אחד השלבים הראשונים באחד ממסלולי התגובה לחלבונים לא-מקופלים (UPR)?",
   o:["ביקוע מקטע חוצה-ממברנה של גורם שעתוק","גליקוזילציה של גורם שעתוק","זרחון סרין ותראונין בגורם שעתוק","קיפול שגוי של גורם שעתוק"], a:0,
   e:"באחד ממסלולי ה-UPR, גורם השעתוק ATF6 עובר ביקוע של המקטע חוצה-הממברנה, שמשחרר את החלק הפעיל שלו אל הגרעין."},
  {subj:"cell", q:"איזה מתהליכי הטרנספורט עלול להיפגם עקב פגם בחלבוני SNARE?",
   o:["פינוציטוזה","אקזוציטוזה","פגוציטוזה","אנדוציטוזה מתווכת-רצפטור"], a:1,
   e:"חלבוני SNARE מתווכים את היתוך השלפוחית עם ממברנת המטרה, תהליך אקזוציטוזה."},
  {subj:"mol", q:"בתיקון שברים דו-גדיליים ב-DNA ברקומבינציה, כיצד נקרא האנזים שמייצב את המבנה החד-גדילי ומאפשר את פלישת הגדיל?",
   o:["RAD51","RAD52","RAD53","RAD59"], a:0,
   e:"RAD51 מצפה את הגדיל החד-גדילי ויוצר את הסליל שמאפשר את פלישת הגדיל (strand invasion) אל הכרומוזום ההומולוגי."},
  {subj:"biochem", q:"איזו טענה לגבי הכרת סובסטרט על ידי אנזים נכונה תמיד?",
   o:["יש ספציפיות לרצף חומצות האמינו של הסובסטרט","יש סטריאו-ספציפיות","יש זיקה גבוהה לתוצר","יש ספציפיות לסביבה שבה האנזים פועל"], a:1,
   e:"סטריאו-ספציפיות נכונה תמיד: אנזימים מבחינים בין סטריאו-איזומרים. זיקה גבוהה לתוצר דווקא הייתה מעכבת את הקטליזה."},
  {subj:"biochem", q:"מה מאפיין את תגובת הפירוק של פרוקטוז-1,6-ביספוספט לשתי טריאוזות?",
   o:["בלתי הפיכה, אך אינה השלב המחייב של הגליקוליזה","בלתי הפיכה ומהווה את השלב המחייב","הפיכה ומהווה את השלב המחייב","הפיכה ואינה השלב המחייב של הגליקוליזה"], a:3,
   e:"תגובת האלדולאז (פיצול לשתי טריאוזות) היא הפיכה ואינה השלב המחייב. השלב המחייב הוא PFK-1 (פרוקטוז-6-פוספט לפרוקטוז-1,6-ביספוספט)."},
  {subj:"biochem", q:"דרך איזה מתווך לא מתרחשת העברת פרוטונים בין שני צדי הממברנה הפנימית של המיטוכונדריה?",
   o:["קומפלקס II (Succinate dehydrogenase)","קומפלקס V (ATP synthase)","קומפלקס III (Cytochrome bc1)","קומפלקס IV (Cytochrome c oxidase)"], a:0,
   e:"קומפלקס II (Succinate dehydrogenase) מזין אלקטרונים לשרשרת אך אינו משאבת פרוטונים. קומפלקסים I, III ו-IV מעבירים פרוטונים; דרך קומפלקס V הם זורמים חזרה ומניעים את ייצור ה-ATP."},
  {subj:"cell", q:"חוקרת מחקה (deleted) את הרצף המקודד לצנטרומר בכרומוזומי שמר והשרתה חלוקה. מה תראה במיקרוסקופ?",
   o:["הכרומוזומים לא יימשכו אל תאי הבת","הכרומוזומים לא יעברו הכפלה כלל","הכרומוזומים לא יעברו הכפלה רק בקצוות","הכרומוזומים לא ישתנו כלל"], a:0,
   e:"בלי צנטרומר אין קינטוכור שאליו נקשרים חוטי הכישור, ולכן הכרומוזומים לא יופרדו ולא יימשכו אל תאי הבת."},
  {subj:"physio", q:"מדוע מיאלין מגביר את מהירות ההולכה?",
   o:["מוריד את הקיבול ואת התנגדות הממברנה","מוריד את הקיבול ומעלה את התנגדות הממברנה","מעלה את הקיבול ומוריד את התנגדות הממברנה","מעלה את הקיבול ואת התנגדות הממברנה"], a:1,
   e:"מיאלין מוריד את קיבול הממברנה ומעלה את התנגדותה. השילוב מאפשר הולכה קפיצנית (saltatory) מהירה בין מפרצי רנוויה."},
  {subj:"physio", q:"מה לא יגדיל את כוח כיווץ השריר?",
   o:["הפעלת יותר תאי עצב מוטוריים","הגדלת תדירות פוטנציאל הפעולה","הגדלת כמות הסידן התוך-תאי","עצבוב של סיב שריר אחד על ידי כמה תאי עצב"], a:3,
   e:"הכוח גדל על ידי גיוס יחידות מוטוריות נוספות, סיכום זמני (תדירות גבוהה) והעלאת סידן. עצבוב סיב בודד על ידי כמה תאי עצב אינו מנגנון פיזיולוגי להגדלת כוח."},
  {subj:"mol", q:"חוקר פירק מקטע DNA ל-100 נוקלאוטידים ומצא 40 מסוג G. כמה נוקלאוטידים מסוג T יש במקטע?",
   o:["10","20","40","60"], a:0,
   e:"ב-DNA דו-גדילי G=C, ולכן C=40. נותרו 20 נוקלאוטידים ל-A+T, וכיוון ש-A=T נקבל T=10."},
  {subj:"cell", q:"כיצד משפיע החלבון Cbl-c על קולטני טירוזין קינאז (RTK)?",
   o:["מזרחן אותם ומפחית את האנדוציטוזה","מזרחן אותם ומגביר את האנדוציטוזה","גורם ליוביקוויטינציה שלהם ומגביר את האנדוציטוזה","גורם ליוביקוויטינציה שלהם ומפחית את האנדוציטוזה"], a:2,
   e:"Cbl הוא ליגאז יוביקוויטין (E3). הוא מסמן את ה-RTK ביוביקוויטין ומגביר את האנדוציטוזה שלהם, מנגנון לוויסות כלפי מטה של האות."}
];

const root = document.getElementById('quizroot');
const banner = document.getElementById('banner');

function makeCard(it, idx, isOfficial){
  const card = document.createElement('div');
  card.className = 'quiz ' + (isOfficial ? 'is-official' : 'is-added');
  let tags = '<div class="tags">';
  if(isOfficial){
    tags += '<span class="quiz__tag quiz__tag--official"><i class="fa-solid fa-certificate"></i> שאלה רשמית לדוגמה</span>';
  } else {
    tags += '<span class="quiz__tag quiz__tag--added"><i class="fa-solid fa-pen"></i> שאלה לתרגול</span>';
    if(it.topic){ tags += '<span class="quiz__tag">' + it.topic + '</span>'; }
  }
  tags += '<span class="quiz__tag">שאלה ' + (idx+1) + '</span></div>';
  let html = tags + '<p class="quiz__q">' + it.q + '</p><div class="opts">';
  it.o.forEach(function(opt,oi){ html += '<button class="opt" data-i="'+oi+'">'+opt+'</button>'; });
  html += '</div><div class="feedback"></div>';
  card.innerHTML = html;
  const fb = card.querySelector('.feedback');
  const opts = card.querySelectorAll('.opt');
  opts.forEach(function(btn){
    btn.addEventListener('click', function(){
      if(card.dataset.done) return;
      card.dataset.done = '1';
      const i = +btn.dataset.i;
      opts.forEach(function(b){ b.disabled = true; });
      opts[it.a].classList.add('correct');
      if(i===it.a){
        fb.className='feedback show ok';
        fb.innerHTML='<i class="fa-solid fa-check"></i> נכון! ' + it.e;
      } else {
        btn.classList.add('wrong');
        fb.className='feedback show no';
        fb.innerHTML='<i class="fa-solid fa-xmark"></i> לא מדויק. ' + it.e;
      }
    });
  });
  return card;
}

function render(tab){
  root.innerHTML='';
  const officials = OFFICIAL.filter(function(it){ return it.subj===tab; });
  const bank = PRACTICE[tab] || [];
  const total = officials.length + bank.length;
  banner.innerHTML='<div class="alert alert--info" style="margin-bottom:16px"><span class="alert__icon"><i class="fa-solid fa-layer-group"></i></span><div class="alert__body"><span class="alert__title">'+SUBJ[tab]+' — '+total+' שאלות לתרגול</span><span class="quiz__tag quiz__tag--official"><i class="fa-solid fa-certificate"></i> '+officials.length+' שאלות רשמיות לדוגמה</span> <span class="quiz__tag quiz__tag--added"><i class="fa-solid fa-pen"></i> '+bank.length+' שאלות לתרגול</span></div></div>';
  let n=0;
  officials.forEach(function(it){ root.appendChild(makeCard(it,n++,true)); });
  bank.forEach(function(it){ root.appendChild(makeCard(it,n++,false)); });
}

const tabs=document.querySelectorAll('#tabs .tab');
function show(id){
  tabs.forEach(function(t){ t.classList.toggle('active', t.dataset.tab===id); });
  render(id);
}
tabs.forEach(function(t){ t.addEventListener('click', function(){ show(t.dataset.tab); history.replaceState(null,'','#'+t.dataset.tab); }); });
const valid = ['biochem','mol','cell','physio'];
const start = (location.hash && valid.indexOf(location.hash.slice(1))>=0) ? location.hash.slice(1) : 'biochem';
show(start);
</script>
