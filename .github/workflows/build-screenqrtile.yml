name: Build ScreenQrTile APK

# בונה את אפליקציית האנדרואיד ScreenQrTile ל-APK באופן אוטומטי.
# רץ אוטומטית בכל דחיפה ששינתה את תיקיית ScreenQrTile,
# וגם אפשר להפעיל ידנית מלשונית Actions (כפתור "Run workflow").

on:
  push:
    paths:
      - 'ScreenQrTile/**'
      - '.github/workflows/build-screenqrtile.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        working-directory: ScreenQrTile
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenQrTile-debug-apk
          path: ScreenQrTile/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
