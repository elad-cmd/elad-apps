name: Build Sweep APK

# בונה את אפליקציית אנשי הקשר Sweep (React Native) ל-APK באופן אוטומטי.
# רץ אוטומטית בכל דחיפה ששינתה את תיקיית Sweep,
# וגם אפשר להפעיל ידנית מלשונית Actions (כפתור "Run workflow").

on:
  push:
    paths:
      - 'Sweep/**'
      - 'MyShare.html'
      - '.github/workflows/build-sweep.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-sweep
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install JS dependencies
        working-directory: Sweep
        run: npm install

      - name: Sync MyShare.html into app assets
        run: |
          mkdir -p Sweep/android/app/src/main/assets
          cp MyShare.html Sweep/android/app/src/main/assets/myshare.html

      - name: Build release APK
        working-directory: Sweep/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace --init-script strip-sonatype.init.gradle

      - name: Rename APK to Sweep.apk
        working-directory: Sweep
        run: cp android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/Sweep.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sweep-apk
          path: Sweep/android/app/build/outputs/apk/release/Sweep.apk
          if-no-files-found: error

      - name: Publish APK as a downloadable Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sweep-latest
          name: Sweep — אפליקציית אנשי קשר
          files: Sweep/android/app/build/outputs/apk/release/Sweep.apk
