name: Build Transcribe APK

# בונה את אפליקציית התמלול (Transcribe) ל-APK באופן אוטומטי.
# רץ אוטומטית בכל דחיפה ששינתה את תיקיית Transcribe,
# וגם אפשר להפעיל ידנית מלשונית Actions (כפתור "Run workflow").

on:
  push:
    paths:
      - 'Transcribe/**'
      - '.github/workflows/build-transcribe.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-transcribe
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Inject app shared secret
        working-directory: Transcribe
        env:
          APP_SHARED_SECRET: ${{ secrets.APP_SHARED_SECRET }}
        run: |
          if [ -n "$APP_SHARED_SECRET" ]; then
            sed -i "s|__APP_SECRET__|$APP_SHARED_SECRET|g" app/src/main/java/com/transcribe/app/OpenAiTranscriber.kt
            echo "shared secret injected"
          else
            echo "WARNING: APP_SHARED_SECRET secret not set — proxy auth will fail until configured"
          fi

      - name: Build debug APK
        working-directory: Transcribe
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK to Transcribe.apk
        working-directory: Transcribe
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Transcribe.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Transcribe-apk
          path: Transcribe/app/build/outputs/apk/debug/Transcribe.apk
          if-no-files-found: error

      - name: Publish APK as a downloadable Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: transcribe-latest
          name: תמלול — אפליקציה
          files: Transcribe/app/build/outputs/apk/debug/Transcribe.apk
